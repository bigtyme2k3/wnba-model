name: WNBA Pregame Projections and Simulation

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), blank uses active Eastern slate'
        required: false
        default: ''
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 18 * * *'

concurrency:
  group: wnba-pregame-projections
  cancel-in-progress: false

jobs:
  project-and-simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repository
        run: |
          git fetch origin main
          git reset --hard origin/main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Resolve active slate
        run: |
          TARGET=$(python active_slate_date.py --date "${{ github.event.inputs.date }}")
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "SEASON_YEAR=${TARGET:0:4}" >> "$GITHUB_ENV"
          echo "Pregame target: $TARGET"
      - name: Validate projection and simulation chain
        run: |
          python -m py_compile collect_wehoop.py wnba_standings_fallback.py wnba_master_source_builder.py wnba_opponent_stat_rankings.py wnba_position_opponent_rankings.py wnba_pace_minutes_opponent_rankings.py wnba_minutes_projection_v2.py wnba_points_projection_v2.py wnba_rebounds_assists_projection_v2.py wnba_ancillary_projection_v2.py wnba_unified_player_simulation_v2.py wnba_matchup_intelligence.py wnba_game_market_model.py wnba_cross_market_top_plays.py wnba_full_game_simulation_v2.py wnba_prop_bet_cards.py wnba_prop_card_performance.py wnba_game_predictions_ledger.py patch_dashboard_v4_game_market_data.py patch_dashboard_v4_core_interactions.py patch_dashboard_v4_minutes_projection.py patch_dashboard_v4_points_projection.py patch_dashboard_v4_rebounds_assists_projection.py patch_dashboard_v4_ancillary_projection.py patch_dashboard_v4_unified_simulation.py patch_dashboard_v4_top_plays.py patch_dashboard_v4_prop_bet_cards.py patch_dashboard_v4_consolidated_navigation.py
      - name: Refresh schedule, player data, and master slate
        run: |
          python collect_wehoop.py --current --out data/raw
          python wnba_standings_fallback.py
          python wnba_master_source_builder.py --date "$TARGET"
      - name: Build opponent and pace context
        run: |
          python wnba_opponent_stat_rankings.py --date "$TARGET"
          python wnba_position_opponent_rankings.py --date "$TARGET"
          python wnba_pace_minutes_opponent_rankings.py --date "$TARGET"
      - name: Build current player projections
        run: |
          python wnba_minutes_projection_v2.py --date "$TARGET"
          python wnba_points_projection_v2.py --date "$TARGET"
          python wnba_rebounds_assists_projection_v2.py --date "$TARGET"
          python wnba_ancillary_projection_v2.py --date "$TARGET"
          python wnba_unified_player_simulation_v2.py --date "$TARGET"
      - name: Build game projections, trends, and simulations
        run: |
          python wnba_matchup_intelligence.py --date "$TARGET"
          python wnba_game_market_model.py --date "$TARGET"
          python wnba_cross_market_top_plays.py --date "$TARGET"
          python wnba_full_game_simulation_v2.py --date "$TARGET"
          python wnba_prop_bet_cards.py --date "$TARGET"
          python wnba_prop_card_performance.py archive --date "$TARGET"
          python wnba_prop_card_performance.py analyze --date "$TARGET"
          python wnba_game_predictions_ledger.py archive --date "$TARGET"
      - name: Verify current projections and simulation
        run: |
          python - <<'PY'
          import json, os
          target=os.environ['TARGET']
          game=json.load(open('data/dashboard/wnba_game_market_model.json'))
          full=json.load(open('data/dashboard/wnba_full_game_simulation_v2.json'))
          unified=json.load(open('data/dashboard/wnba_unified_player_simulation_v2.json'))
          cards=json.load(open('data/dashboard/wnba_prop_bet_cards.json'))
          perf=json.load(open('data/dashboard/wnba_prop_card_performance.json'))
          assert game.get('target_date') == target
          assert game.get('summary',{}).get('spread_predictions',0) > 0
          assert game.get('summary',{}).get('total_predictions',0) > 0
          assert full.get('summary',{}).get('games_simulated',0) > 0
          assert unified.get('target_date') == target
          assert cards.get('target_date') == target
          assert perf.get('summary',{}).get('archived',0) >= len(cards.get('ranked_cards',[]))
          print('PREGAME PROJECTIONS ACTIVE', game['summary'])
          print('FULL GAME SIMULATION ACTIVE', full['summary'])
          print('PLAYER SIMULATION ACTIVE', unified.get('summary'))
          print('PROP BET CARDS ACTIVE', cards.get('summary'))
          print('PROP CARD TRACKING ACTIVE', perf.get('summary'))
          PY
      - name: Patch and publish dashboard
        run: |
          test -s docs/index.html
          python patch_dashboard_v4_game_market_data.py
          python patch_dashboard_v4_core_interactions.py
          python patch_dashboard_v4_minutes_projection.py
          python patch_dashboard_v4_points_projection.py
          python patch_dashboard_v4_rebounds_assists_projection.py
          python patch_dashboard_v4_ancillary_projection.py
          python patch_dashboard_v4_unified_simulation.py
          python patch_dashboard_v4_top_plays.py
          python patch_dashboard_v4_prop_bet_cards.py
          python patch_dashboard_v4_consolidated_navigation.py
      - name: Verify dashboard projection display
        run: |
          python - <<'PY'
          from pathlib import Path
          html=Path('docs/index.html').read_text(encoding='utf-8')
          for marker in ('v4-game-market','v4-core-interactions-script','v4-unified-simulation','v4-prop-bet-cards-script','Player Props & Best Bets','Projected Margin','Projected Total'):
              assert marker in html, marker
          print('PREGAME DASHBOARD VERIFIED')
          PY
      - name: Publish pregame projections and simulations
        run: |
          git config user.name "WNBA Pregame Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Refresh WNBA pregame projections trends simulations and card archive" \
            'data/raw/boxscores_wehoop.csv' \
            'data/warehouse/wnba_*.json' \
            'data/dashboard/wnba_*.json' \
            'data/master/wnba_master.json' \
            'data/history/wnba_*.jsonl' \
            'docs/index.html'
