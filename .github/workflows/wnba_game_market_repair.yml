name: WNBA Spread Totals Repair

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), blank uses active Eastern slate'
        required: false
        default: ''
  schedule:
    - cron: '15 14 * * *'

concurrency:
  group: wnba-game-market-repair
  cancel-in-progress: false

jobs:
  build-and-archive:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repository
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Resolve active slate
        run: |
          TARGET=$(python active_slate_date.py --date "${{ github.event.inputs.date }}")
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
      - name: Validate repaired game chain
        run: python -m py_compile wnba_standings_fallback.py wnba_matchup_intelligence.py wnba_game_market_model.py wnba_game_predictions_ledger.py patch_dashboard_v4_game_market_data.py patch_dashboard_v4_mission_control.py
      - name: Repair missing standings source
        run: |
          python wnba_standings_fallback.py
          python - <<'PY'
          import json
          payload=json.load(open('data/warehouse/wnba_standings.json'))
          rows=payload.get('standings',payload) if isinstance(payload,dict) else payload
          assert isinstance(rows,list) and len(rows)>=10,len(rows) if isinstance(rows,list) else type(rows)
          print('TEAM STRENGTH SOURCE VERIFIED:',len(rows),'teams')
          PY
      - name: Rebuild independent spread and totals projections
        run: |
          python wnba_matchup_intelligence.py --date "${{ env.TARGET }}"
          python wnba_game_market_model.py --date "${{ env.TARGET }}"
          python wnba_game_predictions_ledger.py archive --date "${{ env.TARGET }}"
      - name: Verify predictions are independent and pregame
        run: |
          python - <<'PY'
          import json
          from datetime import datetime
          model=json.load(open('data/dashboard/wnba_game_market_model.json'))
          ledger=json.load(open('data/dashboard/wnba_game_predictions_ledger.json'))
          standings=json.load(open('data/warehouse/wnba_standings.json'))
          teams=standings.get('standings',standings) if isinstance(standings,dict) else standings
          assert len(teams)>=10
          assert model.get('target_date')=='${{ env.TARGET }}'
          assert model.get('summary',{}).get('spread_predictions',0)>0,model.get('summary')
          assert model.get('summary',{}).get('total_predictions',0)>0,model.get('summary')
          for game in model.get('games',[]):
              assert game.get('spread_source') not in {'market_baseline','unavailable'},game
              assert game.get('total_source') not in {'market_baseline','unavailable'},game
              assert game.get('projected_margin') is not None
              assert game.get('projected_total') is not None
          for row in ledger.get('today',[]):
              start=str(row.get('start_time') or '').replace('Z','+00:00')
              captured=str(row.get('captured_at_utc') or '').replace('Z','+00:00')
              if start and captured:
                  assert datetime.fromisoformat(captured) < datetime.fromisoformat(start),(row.get('game'),captured,start)
          print('REPAIRED GAME MODEL VERIFIED',model['summary'],ledger['summary'])
          PY
      - name: Patch existing dashboard without rebuilding it
        run: |
          test -s docs/index.html
          python patch_dashboard_v4_game_market_data.py
          python wnba_mission_control.py --date "${{ env.TARGET }}" --retry-count 0
          python patch_dashboard_v4_mission_control.py
      - name: Verify dashboard preservation
        run: |
          python - <<'PY'
          from pathlib import Path
          html=Path('docs/index.html').read_text(encoding='utf-8')
          for marker in ('Player Props','Best Bets','Results','V4 Health','v4-game-market'):
              assert marker in html,marker
          print('Dashboard modules preserved')
          PY
      - name: Publish repaired predictions
        run: |
          git config user.name "WNBA Game Model Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Publish repaired WNBA spread and totals predictions" \
            'data/warehouse/wnba_standings.json' \
            'data/dashboard/wnba_standings.json' \
            'data/warehouse/wnba_matchup_intelligence.json' \
            'data/dashboard/wnba_matchup_intelligence.json' \
            'data/warehouse/wnba_game_market_model.json' \
            'data/dashboard/wnba_game_market_model.json' \
            'data/warehouse/wnba_game_predictions_ledger.json' \
            'data/dashboard/wnba_game_predictions_ledger.json' \
            'data/history/wnba_game_predictions.jsonl' \
            'data/dashboard/wnba_mission_control.json' \
            'docs/index.html'
