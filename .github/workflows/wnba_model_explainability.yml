name: WNBA Model Explainability

on:
  workflow_dispatch:

jobs:
  manual-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate explainability engine
        run: |
          python -m py_compile wnba_model_explainability.py qa_model_explainability.py
          python qa_model_explainability.py
          TARGET=$(python active_slate_date.py)
          python wnba_model_explainability.py --date "$TARGET"
          echo "Manual validation only. Production dashboard publishing is owned by WNBA Version 4 Status."
