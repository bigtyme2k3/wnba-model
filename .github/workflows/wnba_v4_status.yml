name: WNBA Version 4 Status

on:
  workflow_dispatch:
  schedule:
    - cron: '45 13 * * *'
  push:
    branches: [main]
    paths:
      - 'qa_v4*.py'
      - 'qa_player_game_log_warehouse.py'
      - 'wnba_*.py'
      - 'collect_wehoop.py'
      - 'build_dashboard_v4.py'
      - 'patch_dashboard_v4_*.py'
      - 'config/v4_modules.json'
      - '.github/workflows/wnba_v4_status.yml'

concurrency:
  group: wnba-main-writer
  cancel-in-progress: false

jobs:
  build-v4-status:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repo
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate production files
        run: |
          python -m py_compile qa_v4.py qa_v4_outputs_v2.py qa_v4_acceptance.py qa_v4_foundation_acceptance.py qa_v4_feedback_acceptance.py qa_v4_intelligence_acceptance.py qa_player_game_log_warehouse.py collect_wehoop.py wnba_v4_status_engine.py wnba_play_by_play_layer.py wnba_player_game_log_warehouse.py wnba_player_game_log_archive.py wnba_player_game_log_backfill.py wnba_historical_play_by_play.py wnba_matchup_intelligence.py wnba_projection_ai.py wnba_game_market_model.py wnba_decision_engine_final.py wnba_portfolio_optimizer_v2.py wnba_risk_allocation.py wnba_closing_line_tracker.py wnba_results_grader.py wnba_self_learning.py wnba_reasoning_layer.py wnba_model_calibration.py wnba_feature_importance.py wnba_hyperparameter_optimizer.py wnba_daily_retraining.py wnba_ensemble_learning.py wnba_alt_streaks.py wnba_alt_streaks_correctness.py wnba_alt_streaks_warehouse_upgrade.py patch_dashboard_v4_alt_streaks.py
          bash -n scripts/atomic_generated_push.sh
      - name: Run all acceptance suites
        run: |
          python qa_v4_foundation_acceptance.py
          python qa_v4_acceptance.py
          python qa_v4_feedback_acceptance.py
          python qa_v4_intelligence_acceptance.py
          python qa_player_game_log_warehouse.py
      - name: Resolve target date
        run: |
          TARGET=$(python active_slate_date.py)
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "SEASON_YEAR=${TARGET:0:4}" >> "$GITHUB_ENV"
      - name: Collect current-season player boxscores
        run: python collect_wehoop.py --current --out data/raw
      - name: Build cumulative player game-log warehouse
        run: |
          python wnba_player_game_log_archive.py snapshot
          python wnba_play_by_play_layer.py --date "${{ env.TARGET }}"
          python wnba_player_game_log_warehouse.py --date "${{ env.TARGET }}"
          python wnba_player_game_log_archive.py merge
          python wnba_player_game_log_backfill.py --season "${{ env.SEASON_YEAR }}"
      - name: Collect and apply historical play by play
        run: |
          python wnba_historical_play_by_play.py --season "${{ env.SEASON_YEAR }}" --collect
          python wnba_historical_play_by_play.py --season "${{ env.SEASON_YEAR }}" --apply
      - name: Build prediction and feedback chain
        run: |
          python wnba_matchup_intelligence.py --date "${{ env.TARGET }}"
          python wnba_projection_ai.py --date "${{ env.TARGET }}"
          python wnba_game_market_model.py --date "${{ env.TARGET }}"
          python wnba_decision_engine_final.py --date "${{ env.TARGET }}"
          python wnba_portfolio_optimizer_v2.py --date "${{ env.TARGET }}"
          python wnba_risk_allocation.py --date "${{ env.TARGET }}"
          python wnba_closing_line_tracker.py --date "${{ env.TARGET }}" --stage snapshot
          python wnba_results_grader.py --date "${{ env.TARGET }}"
          python wnba_self_learning.py --date "${{ env.TARGET }}"
          python wnba_reasoning_layer.py --date "${{ env.TARGET }}"
      - name: Build intelligence and ALT Streaks
        run: |
          python wnba_model_calibration.py --date "${{ env.TARGET }}"
          python wnba_feature_importance.py --date "${{ env.TARGET }}"
          python wnba_hyperparameter_optimizer.py --date "${{ env.TARGET }}"
          python wnba_daily_retraining.py --date "${{ env.TARGET }}"
          python wnba_ensemble_learning.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_correctness.py
          python wnba_alt_streaks_warehouse_upgrade.py --date "${{ env.TARGET }}"
      - name: Build QA and V4 status
        run: |
          python qa_v4.py
          python qa_v4_outputs_v2.py --strict
          python wnba_v4_status_engine.py
      - name: Build and patch dashboard
        run: |
          python build_dashboard_v4.py
          python patch_dashboard_v4_team_context.py
          python patch_dashboard_v4_layout_and_slate.py
          python patch_dashboard_v4_prop_header.py
          python patch_dashboard_v4_game_filter.py
          python patch_dashboard_v4_player_props_polish.py
          python patch_dashboard_v4_qa_health.py
          python patch_dashboard_v4_game_market_data.py
          python patch_dashboard_v4_core_interactions.py
          python patch_dashboard_v4_alt_streaks.py
      - name: Verify V4 warehouse and ALT Streaks
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status=json.load(open('data/dashboard/wnba_v4_status.json'))
          alt=json.load(open('data/dashboard/wnba_alt_streaks.json'))
          logs=json.load(open('data/dashboard/wnba_player_game_logs.json'))
          pbp=json.load(open('data/raw/wnba_historical_play_by_play.json'))
          acceptance=json.load(open('data/dashboard/wnba_player_game_log_acceptance.json'))
          assert acceptance['status']=='green'
          assert logs.get('status')=='ok'
          assert logs.get('summary',{}).get('historical_backfill') is True
          assert logs.get('summary',{}).get('historical_pbp_backfill') is True
          assert logs.get('summary',{}).get('records',0)>0
          assert pbp.get('status')=='ok'
          ids=[r.get('record_id') for r in logs.get('records',[])]
          assert len(ids)==len(set(ids))
          for row in logs.get('records',[]):
              q=row['data_quality']['quarter_data_status']
              assert q in {'complete','partial','unavailable'}
              if q=='complete':
                  s=row['scoring']
                  assert sum(s[k] for k in ('q1_pts','q2_pts','q3_pts','q4_pts','ot_pts'))==s['total_pts']
              assert row['scoring']['free_throw_points']==row['scoring']['ftm']
          modules={m['id']:m for m in status['modules']}
          for i in range(1,26): assert modules[f'M{i:02d}']['production_ready']
          assert status['summary']['production_ready']==25
          assert alt.get('status')=='ok'
          assert alt.get('source')=='player_game_log_warehouse+daily_prop_market'
          for row in alt.get('rows',[]):
              assert row.get('history_source')=='player_game_log_warehouse'
              assert row['l5_games']<=5 and row['l10_games']<=10
              assert row['season_games']>=row['l10_games']>=row['l5_games']
              assert row.get('opponent_rank') is None
          html=Path('docs/index.html').read_text(encoding='utf-8')
          assert 'ALT Streaks' in html and '<th>L5</th><th>L10</th><th>Season</th>' in html
          print('V4 + HISTORICAL PBP + ALT STREAKS:',status['summary'],logs['summary'],alt['summary'],pbp['summary'])
          PY
      - name: Commit complete V4 atomically
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Backfill historical WNBA player quarter splits" \
            'data/raw/wnba_historical_play_by_play.json' \
            'data/warehouse/wnba_*.json' \
            'data/dashboard/wnba_*.json' \
            'data/history/wnba_player_game_logs_before_build.json' \
            'docs/V4_*REPORT.md' \
            'docs/index.html'
