name: WNBA Version 4 Status

on:
  workflow_dispatch:
  schedule:
    - cron: '45 13 * * *'
  push:
    branches: [main]
    paths:
      - 'qa_v4*.py'
      - 'qa_player_game_log_warehouse.py'
      - 'qa_alt_performance_tracker.py'
      - 'qa_*projection_v2.py'
      - 'qa_unified_player_simulation_v2.py'
      - 'qa_cross_market_top_plays.py'
      - 'qa_parlay_optimizer_v2.py'
      - 'wnba_*.py'
      - 'collect_wehoop.py'
      - 'build_dashboard_v4.py'
      - 'patch_dashboard_v4_*.py'
      - 'config/v4_modules.json'
      - '.github/workflows/wnba_v4_status.yml'

concurrency:
  group: wnba-main-writer
  cancel-in-progress: false

jobs:
  build-v4-status:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repo
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate production files
        run: |
          python -m py_compile qa_v4.py qa_v4_outputs_v2.py qa_v4_acceptance.py qa_v4_foundation_acceptance.py qa_v4_feedback_acceptance.py qa_v4_intelligence_acceptance.py qa_player_game_log_warehouse.py qa_alt_performance_tracker.py qa_minutes_projection_v2.py qa_points_projection_v2.py qa_rebounds_assists_projection_v2.py qa_ancillary_projection_v2.py qa_unified_player_simulation_v2.py qa_cross_market_top_plays.py qa_parlay_optimizer_v2.py collect_wehoop.py wnba_v4_status_engine.py wnba_play_by_play_layer.py wnba_player_game_log_warehouse.py wnba_player_game_log_archive.py wnba_player_game_log_backfill.py wnba_historical_play_by_play.py wnba_minutes_projection_v2.py wnba_points_projection_v2.py wnba_rebounds_assists_projection_v2.py wnba_ancillary_projection_v2.py wnba_unified_player_simulation_v2.py wnba_cross_market_top_plays.py wnba_parlay_optimizer_v2.py wnba_opponent_stat_rankings.py wnba_position_opponent_rankings.py wnba_pace_minutes_opponent_rankings.py wnba_alt_streaks_opponent_context.py wnba_alt_streaks_position_context.py wnba_alt_streaks_pace_minutes_context.py wnba_alt_streak_confidence.py wnba_alt_performance_tracker.py wnba_matchup_intelligence.py wnba_projection_ai.py wnba_game_market_model.py wnba_decision_engine_final.py wnba_portfolio_optimizer_v2.py wnba_risk_allocation.py wnba_closing_line_tracker.py wnba_results_grader.py wnba_self_learning.py wnba_reasoning_layer.py wnba_model_calibration.py wnba_feature_importance.py wnba_hyperparameter_optimizer.py wnba_daily_retraining.py wnba_ensemble_learning.py wnba_alt_streaks.py wnba_alt_streaks_correctness.py wnba_alt_streaks_warehouse_upgrade.py patch_dashboard_v4_alt_streaks.py patch_dashboard_v4_alt_performance.py patch_dashboard_v4_remove_sportsbook_tab.py patch_dashboard_v4_minutes_projection.py patch_dashboard_v4_points_projection.py patch_dashboard_v4_rebounds_assists_projection.py patch_dashboard_v4_ancillary_projection.py patch_dashboard_v4_unified_simulation.py patch_dashboard_v4_consolidated_navigation.py patch_dashboard_v4_top_plays.py patch_dashboard_v4_parlay_optimizer.py
          bash -n scripts/atomic_generated_push.sh
      - name: Run all acceptance suites
        run: |
          python qa_v4_foundation_acceptance.py
          python qa_v4_acceptance.py
          python qa_v4_feedback_acceptance.py
          python qa_v4_intelligence_acceptance.py
          python qa_player_game_log_warehouse.py
          python qa_alt_performance_tracker.py
          python qa_minutes_projection_v2.py
          python qa_points_projection_v2.py
          python qa_rebounds_assists_projection_v2.py
          python qa_ancillary_projection_v2.py
          python qa_unified_player_simulation_v2.py
          python qa_cross_market_top_plays.py
          python qa_parlay_optimizer_v2.py
      - name: Resolve target date
        run: |
          TARGET=$(python active_slate_date.py)
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "SEASON_YEAR=${TARGET:0:4}" >> "$GITHUB_ENV"
      - name: Collect and build player warehouse
        run: |
          python collect_wehoop.py --current --out data/raw
          python wnba_player_game_log_archive.py snapshot
          python wnba_play_by_play_layer.py --date "${{ env.TARGET }}"
          python wnba_player_game_log_warehouse.py --date "${{ env.TARGET }}"
          python wnba_player_game_log_archive.py merge
          python wnba_player_game_log_backfill.py --season "${{ env.SEASON_YEAR }}"
      - name: Build opponent context
        run: |
          python wnba_historical_play_by_play.py --season "${{ env.SEASON_YEAR }}" --collect
          python wnba_historical_play_by_play.py --season "${{ env.SEASON_YEAR }}" --apply
          python wnba_opponent_stat_rankings.py --date "${{ env.TARGET }}"
          python wnba_position_opponent_rankings.py --date "${{ env.TARGET }}"
          python wnba_pace_minutes_opponent_rankings.py --date "${{ env.TARGET }}"
      - name: Build Projection Engine v2
        run: |
          python wnba_minutes_projection_v2.py --date "${{ env.TARGET }}"
          python wnba_points_projection_v2.py --date "${{ env.TARGET }}"
          python wnba_rebounds_assists_projection_v2.py --date "${{ env.TARGET }}"
          python wnba_ancillary_projection_v2.py --date "${{ env.TARGET }}"
          python wnba_unified_player_simulation_v2.py --date "${{ env.TARGET }}"
      - name: Grade prior ALT results
        run: |
          python wnba_alt_performance_tracker.py --date "${{ env.TARGET }}" --grade
          python wnba_alt_performance_tracker.py --date "${{ env.TARGET }}" --analyze
      - name: Build game and feedback chain
        run: |
          python wnba_matchup_intelligence.py --date "${{ env.TARGET }}"
          python wnba_projection_ai.py --date "${{ env.TARGET }}"
          python wnba_game_market_model.py --date "${{ env.TARGET }}"
          python wnba_decision_engine_final.py --date "${{ env.TARGET }}"
          python wnba_portfolio_optimizer_v2.py --date "${{ env.TARGET }}"
          python wnba_risk_allocation.py --date "${{ env.TARGET }}"
          python wnba_closing_line_tracker.py --date "${{ env.TARGET }}" --stage snapshot
          python wnba_results_grader.py --date "${{ env.TARGET }}"
          python wnba_self_learning.py --date "${{ env.TARGET }}"
          python wnba_reasoning_layer.py --date "${{ env.TARGET }}"
      - name: Build ALT, Top Plays, and Parlays
        run: |
          python wnba_model_calibration.py --date "${{ env.TARGET }}"
          python wnba_feature_importance.py --date "${{ env.TARGET }}"
          python wnba_hyperparameter_optimizer.py --date "${{ env.TARGET }}"
          python wnba_daily_retraining.py --date "${{ env.TARGET }}"
          python wnba_ensemble_learning.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_correctness.py
          python wnba_alt_streaks_warehouse_upgrade.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_opponent_context.py
          python wnba_alt_streaks_position_context.py
          python wnba_alt_streaks_pace_minutes_context.py
          python wnba_alt_streak_confidence.py --date "${{ env.TARGET }}"
          python wnba_alt_performance_tracker.py --date "${{ env.TARGET }}" --snapshot
          python wnba_alt_performance_tracker.py --date "${{ env.TARGET }}" --analyze
          python wnba_cross_market_top_plays.py --date "${{ env.TARGET }}"
          python wnba_parlay_optimizer_v2.py --date "${{ env.TARGET }}"
      - name: Build QA and V4 status
        run: |
          python qa_v4.py
          python qa_v4_outputs_v2.py --strict
          python wnba_v4_status_engine.py
      - name: Build and patch dashboard
        run: |
          python build_dashboard_v4.py
          python patch_dashboard_v4_team_context.py
          python patch_dashboard_v4_layout_and_slate.py
          python patch_dashboard_v4_prop_header.py
          python patch_dashboard_v4_game_filter.py
          python patch_dashboard_v4_player_props_polish.py
          python patch_dashboard_v4_qa_health.py
          python patch_dashboard_v4_game_market_data.py
          python patch_dashboard_v4_core_interactions.py
          python patch_dashboard_v4_alt_streaks.py
          python patch_dashboard_v4_alt_performance.py
          python patch_dashboard_v4_remove_sportsbook_tab.py
          python patch_dashboard_v4_minutes_projection.py
          python patch_dashboard_v4_points_projection.py
          python patch_dashboard_v4_rebounds_assists_projection.py
          python patch_dashboard_v4_ancillary_projection.py
          python patch_dashboard_v4_unified_simulation.py
          python patch_dashboard_v4_consolidated_navigation.py
          python patch_dashboard_v4_top_plays.py
          python patch_dashboard_v4_parlay_optimizer.py
      - name: Verify Top Plays and Parlay Optimizer
        run: |
          python - <<'PY'
          import json
          from collections import defaultdict
          from pathlib import Path
          status=json.load(open('data/dashboard/wnba_v4_status.json'))
          top=json.load(open('data/dashboard/wnba_cross_market_top_plays.json'))
          parlays=json.load(open('data/dashboard/wnba_parlay_optimizer_v2.json'))
          assert json.load(open('data/dashboard/wnba_cross_market_top_plays_acceptance.json'))['status']=='green'
          assert json.load(open('data/dashboard/wnba_parlay_optimizer_v2_acceptance.json'))['status']=='green'
          assert top['status']==parlays['status']=='ok'
          assert top['summary']['allocated_units'] <= 5.0
          for row in parlays.get('parlays',[]):
              assert 2 <= len(row['legs']) <= 3
              assert 0 <= row['joint_probability'] <= 1
              assert row['action'] in {'BET','LEAN','PASS'}
              assert row['recommended_units'] in {0,.1,.25}
              if row['parlay_type']=='SAME_PLAYER':
                  assert row['calculation_method']=='DIRECT_JOINT_SIMULATION'
              else:
                  assert row['calculation_method']=='CONSERVATIVE_INDEPENDENCE_ESTIMATE'
                  assert row['risk_level']=='High'
                  assert row.get('warning')
          modules={m['id']:m for m in status['modules']}
          for i in range(1,26): assert modules[f'M{i:02d}']['production_ready']
          html=Path('docs/index.html').read_text(encoding='utf-8')
          assert 'v4-top-plays-script' in html
          assert 'v4-parlay-optimizer-script' in html
          assert 'Parlay Optimizer v2' in html
          assert 'window.best=window.topPlays' in html
          print('V4 + PARLAY OPTIMIZER V2:',status['summary'],top['summary'],parlays['summary'])
          PY
      - name: Commit complete V4 atomically
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Build Parlay Optimizer v2" \
            'data/raw/wnba_historical_play_by_play.json' \
            'data/warehouse/wnba_*.json' \
            'data/dashboard/wnba_*.json' \
            'data/master/wnba_master.json' \
            'data/history/wnba_player_game_logs_before_build.json' \
            'data/history/wnba_alt_streak_history.jsonl' \
            'docs/V4_*REPORT.md' \
            'docs/index.html'
