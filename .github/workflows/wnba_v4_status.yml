name: WNBA Version 4 Status

on:
  workflow_dispatch:
  schedule:
    - cron: '45 13 * * *'

concurrency:
  group: wnba-production-finalizer
  cancel-in-progress: false

jobs:
  build-v4-status:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repo
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate production files
        run: |
          python -m py_compile qa_v4.py qa_v4_outputs_v2.py qa_v4_acceptance.py qa_v4_foundation_acceptance.py qa_v4_feedback_acceptance.py qa_v4_intelligence_acceptance.py qa_player_game_log_warehouse.py qa_alt_performance_tracker.py qa_alt_market_warehouse.py qa_minutes_projection_v2.py qa_points_projection_v2.py qa_rebounds_assists_projection_v2.py qa_ancillary_projection_v2.py qa_unified_player_simulation_v2.py qa_cross_market_top_plays.py qa_parlay_optimizer_v2.py qa_projection_performance.py qa_model_explainability.py qa_market_intelligence.py qa_model_picks_ledger.py qa_mission_control.py collect_wehoop.py scrape_odds_props.py wnba_alt_market_warehouse.py wnba_v4_status_engine.py wnba_play_by_play_layer.py wnba_player_game_log_warehouse.py wnba_player_game_log_archive.py wnba_player_game_log_backfill.py wnba_historical_play_by_play.py wnba_minutes_projection_v2.py wnba_points_projection_v2.py wnba_rebounds_assists_projection_v2.py wnba_ancillary_projection_v2.py wnba_unified_player_simulation_v2.py wnba_cross_market_top_plays.py wnba_parlay_optimizer_v2.py wnba_projection_performance.py wnba_opponent_stat_rankings.py wnba_position_opponent_rankings.py wnba_pace_minutes_opponent_rankings.py wnba_alt_streaks_opponent_context.py wnba_alt_streaks_position_context.py wnba_alt_streaks_pace_minutes_context.py wnba_alt_streak_confidence.py wnba_alt_performance_tracker.py wnba_matchup_intelligence.py wnba_projection_ai.py wnba_game_market_model.py wnba_decision_engine_final.py wnba_portfolio_optimizer_v2.py wnba_risk_allocation.py wnba_closing_line_tracker.py wnba_results_grader.py wnba_self_learning.py wnba_reasoning_layer.py wnba_model_calibration.py wnba_feature_importance.py wnba_hyperparameter_optimizer.py wnba_daily_retraining.py wnba_ensemble_learning.py wnba_alt_streaks.py wnba_alt_streaks_correctness.py wnba_alt_streaks_warehouse_upgrade.py wnba_model_explainability.py wnba_market_intelligence.py wnba_model_picks_ledger.py wnba_mission_control.py patch_dashboard_v4_alt_streaks.py patch_dashboard_v4_alt_ladders.py patch_dashboard_v4_alt_performance.py patch_dashboard_v4_remove_sportsbook_tab.py patch_dashboard_v4_minutes_projection.py patch_dashboard_v4_points_projection.py patch_dashboard_v4_rebounds_assists_projection.py patch_dashboard_v4_ancillary_projection.py patch_dashboard_v4_unified_simulation.py patch_dashboard_v4_consolidated_navigation.py patch_dashboard_v4_top_plays.py patch_dashboard_v4_parlay_optimizer.py patch_dashboard_v4_projection_performance.py patch_dashboard_v4_explainability.py patch_dashboard_v4_market_intelligence.py patch_dashboard_v4_model_picks_ledger.py patch_dashboard_v4_mission_control.py patch_dashboard_v4_force_alt_tab.py
          bash -n scripts/atomic_generated_push.sh
      - name: Run pre-build unit acceptance suites
        run: |
          python qa_v4_foundation_acceptance.py
          python qa_v4_acceptance.py
          python qa_v4_feedback_acceptance.py
          python qa_v4_intelligence_acceptance.py
          python qa_player_game_log_warehouse.py
          python qa_alt_performance_tracker.py
          python qa_alt_market_warehouse.py
          python qa_minutes_projection_v2.py
          python qa_points_projection_v2.py
          python qa_rebounds_assists_projection_v2.py
          python qa_ancillary_projection_v2.py
          python qa_unified_player_simulation_v2.py
          python qa_cross_market_top_plays.py
      - name: Resolve target date
        run: |
          TARGET=$(python active_slate_date.py)
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "SEASON_YEAR=${TARGET:0:4}" >> "$GITHUB_ENV"
      - name: Collect current sportsbook props and exact ALT ladders
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scrape_odds_props.py --date "${{ env.TARGET }}" --out data/raw || true
          python wnba_alt_market_warehouse.py --date "${{ env.TARGET }}"
      - name: Collect and build player warehouse
        run: |
          python collect_wehoop.py --current --out data/raw
          python wnba_player_game_log_archive.py snapshot
          python wnba_play_by_play_layer.py --date "${{ env.TARGET }}"
          python wnba_player_game_log_warehouse.py --date "${{ env.TARGET }}"
          python wnba_player_game_log_archive.py merge
          python wnba_player_game_log_backfill.py --season "${{ env.SEASON_YEAR }}"
          python wnba_alt_market_warehouse.py --date "${{ env.TARGET }}"
      - name: Grade prior model history
        run: |
          python wnba_projection_performance.py grade --date "${{ env.TARGET }}"
          python wnba_projection_performance.py analyze --date "${{ env.TARGET }}"
          python wnba_alt_performance_tracker.py --date "${{ env.TARGET }}" --grade
          python wnba_alt_performance_tracker.py --date "${{ env.TARGET }}" --analyze
          python wnba_model_picks_ledger.py grade --date "${{ env.TARGET }}" || true
      - name: Build opponent context
        run: |
          python wnba_historical_play_by_play.py --season "${{ env.SEASON_YEAR }}" --collect
          python wnba_historical_play_by_play.py --season "${{ env.SEASON_YEAR }}" --apply
          python wnba_opponent_stat_rankings.py --date "${{ env.TARGET }}"
          python wnba_position_opponent_rankings.py --date "${{ env.TARGET }}"
          python wnba_pace_minutes_opponent_rankings.py --date "${{ env.TARGET }}"
      - name: Build Projection Engine v2
        run: |
          python wnba_minutes_projection_v2.py --date "${{ env.TARGET }}"
          python wnba_points_projection_v2.py --date "${{ env.TARGET }}"
          python wnba_rebounds_assists_projection_v2.py --date "${{ env.TARGET }}"
          python wnba_ancillary_projection_v2.py --date "${{ env.TARGET }}"
          python wnba_unified_player_simulation_v2.py --date "${{ env.TARGET }}"
      - name: Build game and feedback chain
        run: |
          python wnba_matchup_intelligence.py --date "${{ env.TARGET }}"
          python wnba_projection_ai.py --date "${{ env.TARGET }}"
          python wnba_game_market_model.py --date "${{ env.TARGET }}"
          python wnba_decision_engine_final.py --date "${{ env.TARGET }}"
          python wnba_portfolio_optimizer_v2.py --date "${{ env.TARGET }}"
          python wnba_risk_allocation.py --date "${{ env.TARGET }}"
          python wnba_closing_line_tracker.py --date "${{ env.TARGET }}" --stage snapshot
          python wnba_results_grader.py --date "${{ env.TARGET }}"
          python wnba_self_learning.py --date "${{ env.TARGET }}"
          python wnba_reasoning_layer.py --date "${{ env.TARGET }}"
      - name: Build ALT and ranked recommendations
        run: |
          python wnba_model_calibration.py --date "${{ env.TARGET }}"
          python wnba_feature_importance.py --date "${{ env.TARGET }}"
          python wnba_hyperparameter_optimizer.py --date "${{ env.TARGET }}"
          python wnba_daily_retraining.py --date "${{ env.TARGET }}"
          python wnba_ensemble_learning.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_correctness.py
          python wnba_alt_streaks_warehouse_upgrade.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_opponent_context.py
          python wnba_alt_streaks_position_context.py
          python wnba_alt_streaks_pace_minutes_context.py
          python wnba_alt_streak_confidence.py --date "${{ env.TARGET }}"
          python wnba_alt_performance_tracker.py --date "${{ env.TARGET }}" --snapshot
          python wnba_alt_performance_tracker.py --date "${{ env.TARGET }}" --analyze
          python wnba_cross_market_top_plays.py --date "${{ env.TARGET }}"
          python wnba_parlay_optimizer_v2.py --date "${{ env.TARGET }}"
          python wnba_projection_performance.py snapshot --date "${{ env.TARGET }}"
          python wnba_projection_performance.py analyze --date "${{ env.TARGET }}"
      - name: Build explainability, CLV, and model-picks ledger
        run: |
          python wnba_model_explainability.py --date "${{ env.TARGET }}"
          python wnba_market_intelligence.py capture --date "${{ env.TARGET }}" --stage current
          python wnba_market_intelligence.py analyze --date "${{ env.TARGET }}"
          python wnba_model_picks_ledger.py archive --date "${{ env.TARGET }}"
          python wnba_model_picks_ledger.py grade --date "${{ env.TARGET }}"
          python wnba_model_picks_ledger.py analyze --date "${{ env.TARGET }}"
      - name: Run post-build data acceptance suites
        run: |
          python qa_parlay_optimizer_v2.py
          python qa_projection_performance.py
          python qa_model_explainability.py
          python qa_market_intelligence.py
          python qa_model_picks_ledger.py
      - name: Build QA and V4 status
        run: |
          python qa_v4.py
          python qa_v4_outputs_v2.py --strict
          python wnba_v4_status_engine.py
      - name: Build dashboard once in final order
        run: |
          python build_dashboard_v4.py
          python patch_dashboard_v4_team_context.py
          python patch_dashboard_v4_layout_and_slate.py
          python patch_dashboard_v4_prop_header.py
          python patch_dashboard_v4_game_filter.py
          python patch_dashboard_v4_player_props_polish.py
          python patch_dashboard_v4_qa_health.py
          python patch_dashboard_v4_game_market_data.py
          python patch_dashboard_v4_core_interactions.py
          python patch_dashboard_v4_alt_streaks.py
          python patch_dashboard_v4_alt_ladders.py
          python patch_dashboard_v4_alt_performance.py
          python patch_dashboard_v4_remove_sportsbook_tab.py
          python patch_dashboard_v4_minutes_projection.py
          python patch_dashboard_v4_points_projection.py
          python patch_dashboard_v4_rebounds_assists_projection.py
          python patch_dashboard_v4_ancillary_projection.py
          python patch_dashboard_v4_unified_simulation.py
          python patch_dashboard_v4_top_plays.py
          python patch_dashboard_v4_parlay_optimizer.py
          python patch_dashboard_v4_projection_performance.py
          python patch_dashboard_v4_explainability.py
          python patch_dashboard_v4_market_intelligence.py
          python patch_dashboard_v4_model_picks_ledger.py
          python patch_dashboard_v4_consolidated_navigation.py
          python wnba_mission_control.py --date "${{ env.TARGET }}" --retry-count 2
          python qa_mission_control.py
          python patch_dashboard_v4_mission_control.py
          python patch_dashboard_v4_force_alt_tab.py
      - name: Verify final production artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          target='${{ env.TARGET }}'
          required=[
            'data/dashboard/wnba_minutes_projection_v2.json',
            'data/dashboard/wnba_unified_player_simulation_v2.json',
            'data/dashboard/wnba_cross_market_top_plays.json',
            'data/dashboard/wnba_model_explainability.json',
            'data/dashboard/wnba_market_intelligence.json',
            'data/dashboard/wnba_model_picks_ledger.json',
            'data/dashboard/wnba_alt_market_warehouse.json',
            'data/dashboard/wnba_mission_control.json'
          ]
          for path in required:
              payload=json.load(open(path))
              if payload.get('target_date'): assert payload['target_date']==target,(path,payload.get('target_date'),target)
          alt=json.load(open('data/dashboard/wnba_alt_market_warehouse.json'))
          assert alt['data_contract']['book_specific_lines_preserved'] is True
          assert alt['data_contract']['cross_book_line_averaging'] is False
          assert alt['data_contract']['dd_td_supported'] is False
          html=Path('docs/index.html').read_text(encoding='utf-8')
          for marker in ('v4-alt-streaks-script','v4-alt-ladders-script','v4-explainability-script','v4-market-intelligence-script','v4-model-picks-ledger-script','v4-mission-control-script'):
              assert marker in html,marker
          assert 'Sportsbook ALT Ladders' in html
          assert 'data-view="alt"' not in html
          print('FINAL PRODUCTION ARTIFACT VERIFIED FOR',target)
          PY
      - name: Commit complete production build once
        run: |
          git config user.name "WNBA Production Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Publish ordered WNBA V4 production build" \
            'data/raw/wnba_historical_play_by_play.json' \
            'data/raw/alt_props_bookmakers_*.csv' \
            'data/warehouse/wnba_*.json' \
            'data/dashboard/wnba_*.json' \
            'data/master/wnba_master.json' \
            'data/history/wnba_*.jsonl' \
            'docs/V4_*REPORT.md' \
            'docs/index.html'
