name: WNBA Market Intelligence

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Observation stage: current or closing'
        required: false
        default: 'current'

jobs:
  manual-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate market intelligence
        run: |
          python -m py_compile wnba_market_intelligence.py qa_market_intelligence.py
          python qa_market_intelligence.py
          TARGET=$(python active_slate_date.py)
          python wnba_market_intelligence.py capture --date "$TARGET" --stage "${{ github.event.inputs.stage }}"
          python wnba_market_intelligence.py analyze --date "$TARGET"
          echo "Manual validation only. Production dashboard publishing is owned by WNBA Version 4 Status."
