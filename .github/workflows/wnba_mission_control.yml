name: WNBA Mission Control

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["WNBA Version 4 Status", "WNBA Model Explainability", "WNBA Market Intelligence"]
    types: [completed]
  schedule:
    - cron: '15 12 * * *'
    - cron: '15 15 * * *'

concurrency:
  group: wnba-mission-control
  cancel-in-progress: false

jobs:
  reliability-gate:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repository
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate Mission Control files
        run: python -m py_compile wnba_mission_control.py qa_mission_control.py patch_dashboard_v4_mission_control.py
      - name: Run acceptance tests
        run: python qa_mission_control.py
      - name: Resolve target date
        run: |
          TARGET=$(python active_slate_date.py)
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
      - name: Initial reliability evaluation
        run: python wnba_mission_control.py --date "${{ env.TARGET }}" --retry-count 0
      - name: Determine whether ALT retry is required
        id: retry0
        run: |
          VALUE=$(python - <<'PY'
          import json
          p=json.load(open('data/dashboard/wnba_mission_control.json'))
          print('true' if p['summary']['retry_required']>0 else 'false')
          PY
          )
          echo "required=$VALUE" >> "$GITHUB_OUTPUT"
      - name: Retry ALT pipeline attempt 1
        if: steps.retry0.outputs.required == 'true'
        run: |
          python wnba_alt_streaks.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_correctness.py
          python wnba_alt_streaks_warehouse_upgrade.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_opponent_context.py
          python wnba_alt_streaks_position_context.py
          python wnba_alt_streaks_pace_minutes_context.py
          python wnba_alt_streak_confidence.py --date "${{ env.TARGET }}"
          python wnba_mission_control.py --date "${{ env.TARGET }}" --retry-count 1
      - name: Determine whether second retry is required
        id: retry1
        run: |
          VALUE=$(python - <<'PY'
          import json
          p=json.load(open('data/dashboard/wnba_mission_control.json'))
          print('true' if p['summary']['retry_required']>0 else 'false')
          PY
          )
          echo "required=$VALUE" >> "$GITHUB_OUTPUT"
      - name: Retry ALT pipeline attempt 2
        if: steps.retry1.outputs.required == 'true'
        run: |
          sleep 20
          python wnba_alt_streaks.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_correctness.py
          python wnba_alt_streaks_warehouse_upgrade.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_opponent_context.py
          python wnba_alt_streaks_position_context.py
          python wnba_alt_streaks_pace_minutes_context.py
          python wnba_alt_streak_confidence.py --date "${{ env.TARGET }}"
          python wnba_mission_control.py --date "${{ env.TARGET }}" --retry-count 2
      - name: Patch Mission Control dashboard
        run: python patch_dashboard_v4_mission_control.py
      - name: Verify publication gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload=json.load(open('data/dashboard/wnba_mission_control.json'))
          acceptance=json.load(open('data/dashboard/wnba_mission_control_acceptance.json'))
          assert acceptance['status']=='green'
          assert payload['status']=='ok'
          assert payload['publication_status'] in {'READY','DEGRADED','BLOCKED'}
          assert payload['policy']['silent_empty_sections_allowed'] is False
          assert payload['policy']['maximum_automatic_retries']==2
          for row in payload['checks']:
              assert row['status'] in {'GREEN','YELLOW','RED'}
              assert row['action'] in {'NONE','RETRY_SOURCE','PUBLISH_DEGRADED','BLOCK_PUBLISH'}
          if not payload['alt_props']['available']:
              assert payload['alt_props']['action'] in {'RETRY_SOURCE','PUBLISH_DEGRADED'}
          if payload['publication_status']=='BLOCKED':
              assert payload['summary']['release_blockers']>0
          html=Path('docs/index.html').read_text(encoding='utf-8')
          assert 'v4-mission-control-script' in html
          assert 'Mission Control' in html
          assert 'ALT Player Props unavailable' in html
          print('MISSION CONTROL:',payload['publication_status'],payload['summary'])
          PY
      - name: Commit reliability state atomically
        run: |
          git config user.name "WNBA Mission Control Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Update Mission Control reliability gate" \
            'data/warehouse/wnba_mission_control.json' \
            'data/dashboard/wnba_mission_control*.json' \
            'data/dashboard/wnba_alt_streaks.json' \
            'data/dashboard/wnba_alt_performance.json' \
            'docs/index.html'
