name: WNBA Mission Control

on:
  workflow_dispatch:

jobs:
  manual-diagnostic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate Mission Control
        run: |
          python -m py_compile wnba_mission_control.py qa_mission_control.py
          python qa_mission_control.py
          TARGET=$(python active_slate_date.py)
          python wnba_mission_control.py --date "$TARGET" --retry-count 2
          echo "Manual diagnostic only. Production repair and publishing are owned by WNBA Version 4 Status."
