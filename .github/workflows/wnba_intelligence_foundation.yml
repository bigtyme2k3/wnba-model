name: WNBA Intelligence Foundation

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for active Eastern slate'
        required: false
        default: ''
  schedule:
    - cron: '15 13 * * *'

concurrency:
  group: wnba-intelligence-foundation
  cancel-in-progress: false

jobs:
  build-intelligence-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install sports-skills==0.27.0 || pip install git+https://github.com/machina-sports/sports-skills.git
          pip install nba_api sportsdataverse litellm optuna || true

      - name: Resolve active Eastern slate date
        run: |
          TARGET=$(python active_slate_date.py --date "${{ github.event.inputs.date }}")
          YEAR=$(python active_slate_date.py --year)
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "YEAR=$YEAR" >> $GITHUB_ENV
          echo "Using active WNBA slate date: $TARGET"

      - name: Validate intelligence scripts
        run: |
          python -m py_compile \
            active_slate_date.py scrape_wnba_stats.py wnba_stats_fallback_from_boxscores.py sports_skills_core_provider.py wnba_data_warehouse.py \
            wnba_player_intelligence.py wnba_stats_quality.py odds_source_manager.py wnba_live_odds_layer.py wnba_odds_health.py wnba_sportsbook_consensus.py \
            player_points.py wnba_matchup_intelligence.py wnba_consensus_engine.py \
            wnba_monte_carlo_engine.py wnba_projection_ai.py wnba_market_engine.py \
            wnba_portfolio_optimizer_v2.py wnba_decision_engine_final.py wnba_risk_allocation.py \
            wnba_reasoning_layer.py wnba_portfolio_dashboard.py wnba_ai_coach.py \
            wnba_source_health.py wnba_historical_database.py wnba_master_database.py wnba_master_source_builder.py \
            wnba_results_grader.py wnba_closing_line_tracker.py wnba_betting_ledger.py \
            wnba_self_learning.py wnba_terminal_ui.py build_dashboard.py patch_terminal_ui.py patch_dashboard_navigation_v2.py patch_prop_box_colors.py build_dashboard_v4.py wnba_v4_props_guard.py wnba_v4_prop_context.py patch_dashboard_v4_team_context.py

      - name: Refresh official WNBA stats
        run: python scrape_wnba_stats.py --season ${{ env.YEAR }} --out data/raw --delay 0.6
        continue-on-error: true

      - name: Build boxscore stats fallback if official stats missing
        run: |
          if [ ! -s data/raw/wnba_players_live.json ]; then
            echo "Official player stats missing; building fallback from boxscores"
            python wnba_stats_fallback_from_boxscores.py --out data/raw
          else
            echo "Official player stats found"
          fi

      - name: Refresh sports-skills core provider
        run: python sports_skills_core_provider.py --season ${{ env.YEAR }} --out data/wnba --warehouse data/warehouse
        continue-on-error: true

      - name: Build data warehouse
        run: python wnba_data_warehouse.py --date ${{ env.TARGET }}

      - name: Build player intelligence database
        run: python wnba_player_intelligence.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build stats quality diagnostics
        run: python wnba_stats_quality.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Resolve odds source without API credits
        run: python odds_source_manager.py --date ${{ env.TARGET }} --raw data/raw --manual data/manual/wnba_manual_odds.csv

      - name: Build live odds layer
        run: python wnba_live_odds_layer.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Rebuild player props with intelligence
        run: python player_points.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      - name: Build odds health polish
        run: python wnba_odds_health.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build sportsbook consensus
        run: python wnba_sportsbook_consensus.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build matchup intelligence
        run: python wnba_matchup_intelligence.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build consensus engine
        run: python wnba_consensus_engine.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build Monte Carlo simulation engine
        run: python wnba_monte_carlo_engine.py --date ${{ env.TARGET }} --sims 10000
        continue-on-error: true

      - name: Build projection AI
        run: python wnba_projection_ai.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Track line snapshot
        run: python wnba_closing_line_tracker.py --date ${{ env.TARGET }} --stage snapshot
        continue-on-error: true

      - name: Build market engine
        run: python wnba_market_engine.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build portfolio optimizer v2
        run: python wnba_portfolio_optimizer_v2.py --date ${{ env.TARGET }} --bankroll 500
        continue-on-error: true

      - name: Build final decision engine
        run: python wnba_decision_engine_final.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build risk allocation
        run: python wnba_risk_allocation.py --date ${{ env.TARGET }} --capital 500
        continue-on-error: true

      - name: Build reasoning layer
        run: python wnba_reasoning_layer.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build portfolio dashboard
        run: python wnba_portfolio_dashboard.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build AI coach
        run: python wnba_ai_coach.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build source health
        run: python wnba_source_health.py --date ${{ env.TARGET }}

      - name: Build normalized master source database
        run: python wnba_master_source_builder.py --date ${{ env.TARGET }}

      - name: Guard V4 props availability
        run: python wnba_v4_props_guard.py

      - name: Enrich V4 prop team context
        run: python wnba_v4_prop_context.py

      - name: Update historical database
        run: python wnba_historical_database.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build ledger summary
        run: python wnba_betting_ledger.py --date ${{ env.TARGET }} --unit 20
        continue-on-error: true

      - name: Grade available results
        run: python wnba_results_grader.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build self-learning weights
        run: python wnba_self_learning.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Update master database
        run: python wnba_master_database.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build base dashboard with corrected date and odds data
        run: python build_dashboard.py

      - name: Build terminal UI data
        run: python wnba_terminal_ui.py --date ${{ env.TARGET }}

      - name: Patch dashboard terminal UI
        run: python patch_terminal_ui.py

      - name: Apply simplified dashboard navigation v2
        run: python patch_dashboard_navigation_v2.py

      - name: Apply prop history box colors
        run: python patch_prop_box_colors.py

      - name: Build Dashboard V4 overhaul
        run: python build_dashboard_v4.py

      - name: Patch Dashboard V4 team context
        run: python patch_dashboard_v4_team_context.py

      - name: Commit and push
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          git status --short
          git add config/*.json docs/*.md data/master/*.json data/wnba/*.json data/warehouse/*.json data/dashboard/*.json data/raw/*.csv data/raw/*.json data/history/*.jsonl docs/index.html
          git diff --cached --quiet && echo "No intelligence foundation changes" && exit 0
          git commit -m "Update WNBA intelligence foundation - ${{ env.TARGET }}"
          git push || (git pull --rebase origin main && git push)
