name: WNBA Autonomous Agent

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for active Eastern slate'
        required: false
        default: ''
  schedule:
    - cron: '35 13 * * *'

concurrency:
  group: wnba-autonomous-agent
  cancel-in-progress: false

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve active slate date
        run: |
          TARGET=$(python active_slate_date.py --date "${{ github.event.inputs.date }}")
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "Using target date: $TARGET"

      - name: Validate modules
        run: |
          python -m py_compile wnba_autonomous_agent.py
          python -m py_compile wnba_backtest_engine.py
          python -m py_compile wnba_source_shopping.py
          python -m py_compile wnba_vote_layer_v2.py

      - name: Build backtest engine
        run: python wnba_backtest_engine.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build source shopping layer
        run: python wnba_source_shopping.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build vote layer v2
        run: python wnba_vote_layer_v2.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Run autonomous agent
        run: python wnba_autonomous_agent.py --date ${{ env.TARGET }}

      - name: Rebuild terminal bundle
        run: python wnba_terminal_ui.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Patch dashboard UI
        run: python patch_terminal_ui.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          git add data/warehouse/*.json data/dashboard/*.json docs/index.html
          git diff --cached --quiet && echo "No autonomous agent changes" && exit 0
          git commit -m "Update WNBA autonomous agent - ${{ env.TARGET }}"
          git push || (git pull --rebase origin main && git push)
