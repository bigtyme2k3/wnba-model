name: WNBA Live Projection

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date YYYY-MM-DD'
        required: false
        default: ''
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: wnba-live-projection
  cancel-in-progress: true

jobs:
  live-projection:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repository
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Validate live engine
        run: python -m py_compile wnba_live_projection_v1.py qa_live_projection_v1.py patch_dashboard_v4_live_projection.py
      - name: Run acceptance tests
        run: python qa_live_projection_v1.py
      - name: Resolve target date
        run: |
          TARGET="${{ github.event.inputs.date }}"
          if [ -z "$TARGET" ]; then TARGET=$(python active_slate_date.py); fi
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
      - name: Build live projections
        run: python wnba_live_projection_v1.py --date "${{ env.TARGET }}"
      - name: Patch Today dashboard
        run: python patch_dashboard_v4_live_projection.py
      - name: Verify live output contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload=json.load(open('data/dashboard/wnba_live_projection_v1.json'))
          acceptance=json.load(open('data/dashboard/wnba_live_projection_v1_acceptance.json'))
          assert acceptance['status']=='green'
          assert payload['status']=='ok'
          assert payload['summary']['simulations_per_player']==5000
          for game in payload.get('games',[]):
              assert 0 <= game['progress'] <= 1
              assert game['remaining_minutes'] >= 0
              for player in game.get('players',[]):
                  assert 0 <= player['prior_weight'] <= 1
                  assert 0 <= player['live_weight'] <= 1
                  assert abs(player['prior_weight']+player['live_weight']-1) < .01
                  assert player['projected_final_minutes'] >= player['live_minutes']
                  for stat in ('PTS','REB','AST','3PM','STL','BLK','TOV','PRA','PR','PA','RA'):
                      d=player['distributions'][stat]
                      assert 0 <= d['p10'] <= d['p50'] <= d['p90']
          html=Path('docs/index.html').read_text(encoding='utf-8')
          assert 'v4-live-projection-script' in html
          assert 'Live In-Game Projections' in html
          assert 'window.games=function' in html
          print('LIVE PROJECTION:',payload['summary'])
          PY
      - name: Commit live dashboard atomically
        run: |
          git config user.name "WNBA Live Projection Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Refresh live in-game projections" \
            'data/warehouse/wnba_live_projection_v1.json' \
            'data/dashboard/wnba_live_projection_v1*.json' \
            'docs/index.html'
