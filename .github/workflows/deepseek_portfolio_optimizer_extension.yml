name: WNBA DeepSeek Portfolio Optimizer Extension

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for latest predictions file'
        required: false
        default: ''

concurrency:
  group: wnba-extension-writes
  cancel-in-progress: false

jobs:
  run-deepseek-portfolio-optimizer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve target date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "TARGET=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          else
            latest=$(ls predictions/predictions_*.json 2>/dev/null | sed -E 's/.*predictions_([0-9-]+).json/\1/' | sort | tail -1)
            echo "TARGET=${latest}" >> $GITHUB_ENV
          fi

      - name: Validate syntax
        run: python -m py_compile deepseek_portfolio_optimizer.py

      - name: Build DeepSeek Portfolio Optimizer
        run: python deepseek_portfolio_optimizer.py --date ${{ env.TARGET }}

      - name: Commit and push
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          git status --short
          git add data/dashboard/deepseek_portfolio_optimizer.json data/intelligence/deepseek_portfolio_optimizer_${{ env.TARGET }}.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "DeepSeek portfolio optimizer update - ${{ env.TARGET }}"
          git pull --rebase origin main
          git push origin main
