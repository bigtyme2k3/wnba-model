name: WNBA Odds History Next Batch

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Backfill range start (YYYY-MM-DD)'
        required: true
        default: '2026-05-15'
      end_date:
        description: 'Backfill range end (YYYY-MM-DD)'
        required: true
        default: '2026-07-18'
      batch_size:
        description: 'Maximum new daily snapshots in this batch'
        required: true
        default: '7'
      snapshot_hour_utc:
        description: 'Daily snapshot hour UTC'
        required: true
        default: '22'
      mode:
        description: 'plan_only or execute'
        required: true
        type: choice
        options:
          - plan_only
          - execute
        default: plan_only
      confirmation:
        description: 'Type SPEND CREDITS when mode=execute'
        required: false
        default: ''

concurrency:
  group: wnba-odds-history-writes
  cancel-in-progress: false

jobs:
  plan-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas pyreadr

      - name: Validate scripts without API use
        run: |
          python -m py_compile \
            wnba_odds_history_warehouse.py \
            wnba_odds_history_backfill_planner.py \
            wnba_odds_history_execute_plan.py \
            wnba_odds_history_dashboard.py \
            wnba_odds_history_trend_engine.py \
            wnba_odds_history_results_importer.py \
            wnba_odds_history_outcome_engine.py \
            qa_odds_history_trend_engine.py \
            qa_odds_history_results.py
          python qa_odds_history_trend_engine.py
          python qa_odds_history_results.py

      - name: Build next missing batch plan
        run: |
          python wnba_odds_history_backfill_planner.py \
            --start '${{ inputs.start_date }}' \
            --end '${{ inputs.end_date }}' \
            --hour-utc '${{ inputs.snapshot_hour_utc }}' \
            --batch-size '${{ inputs.batch_size }}'

      - name: Display and validate plan
        run: |
          python - <<'PY'
          import json
          p=json.load(open('data/warehouse/wnba_odds_history_backfill_plan.json'))
          print(json.dumps(p,indent=2))
          assert p['batch_requests'] <= int('${{ inputs.batch_size }}')
          print(f"Estimated credits: {p['estimated_credits']}")
          PY

      - name: Require explicit credit confirmation
        if: inputs.mode == 'execute'
        run: |
          test '${{ inputs.confirmation }}' = 'SPEND CREDITS' || {
            echo 'Execution blocked. Enter SPEND CREDITS exactly.'
            exit 1
          }

      - name: Execute planned odds requests
        if: inputs.mode == 'execute'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python wnba_odds_history_execute_plan.py \
            --max-requests '${{ inputs.batch_size }}'

      - name: Download credit-free historical results
        if: inputs.mode == 'execute'
        run: |
          START_YEAR=$(echo '${{ inputs.start_date }}' | cut -c1-4)
          END_YEAR=$(echo '${{ inputs.end_date }}' | cut -c1-4)
          CURRENT_YEAR=$(date -u +%Y)

          echo "Requested result seasons: ${START_YEAR}-${END_YEAR}; current year: ${CURRENT_YEAR}"

          if [ "$START_YEAR" -le "$CURRENT_YEAR" ] && [ "$END_YEAR" -ge "$CURRENT_YEAR" ]; then
            echo "Collecting ${CURRENT_YEAR} results from ESPN current-season API."
            python collect_wehoop.py --current --out data/raw
          fi

          if [ "$START_YEAR" -lt "$CURRENT_YEAR" ]; then
            HIST_END=$END_YEAR
            if [ "$HIST_END" -ge "$CURRENT_YEAR" ]; then
              HIST_END=$((CURRENT_YEAR - 1))
            fi
            echo "Collecting historical Sportsdataverse seasons ${START_YEAR}-${HIST_END}."
            python collect_wehoop.py --start "$START_YEAR" --end "$HIST_END" --out data/raw
          fi

          test -n "$(find data/raw -maxdepth 1 -name 'wehoop_team_box_*.csv' -print -quit)" || {
            echo 'No team-box result file was produced.'
            exit 1
          }

      - name: Attach results and build analytics
        if: inputs.mode == 'execute'
        run: |
          python wnba_odds_history_results_importer.py
          python wnba_odds_history_dashboard.py
          python wnba_odds_history_trend_engine.py
          python wnba_odds_history_outcome_engine.py

      - name: Verify database after execution
        if: inputs.mode == 'execute'
        run: |
          python - <<'PY'
          import json,sqlite3
          con=sqlite3.connect('data/warehouse/wnba_odds_history.sqlite')
          assert con.execute('PRAGMA integrity_check').fetchone()[0]=='ok'
          summary=json.load(open('data/warehouse/wnba_odds_history_summary.json'))
          dashboard=json.load(open('data/dashboard/wnba_odds_history_dashboard.json'))
          trends=json.load(open('data/dashboard/wnba_odds_history_trends.json'))
          results=json.load(open('data/dashboard/wnba_odds_history_results.json'))
          outcomes=json.load(open('data/dashboard/wnba_odds_history_outcomes.json'))
          assert summary['games']==dashboard['summary']['games']
          assert summary['games']==trends['summary']['games']
          assert results['summary']['warehouse_games']==summary['games']
          assert outcomes['summary']['warehouse_games']==summary['games']
          assert outcomes['summary']['completed_games']==results['summary']['games_with_results']
          assert results['summary']['source_result_games'] > 0, 'No source results loaded'
          print('NEXT BATCH VERIFIED',summary)
          print('RESULT MATCHING',results['summary'])
          print('OUTCOME ANALYTICS',outcomes['summary'])
          PY

      - name: Commit plan only
        if: inputs.mode == 'plan_only'
        run: |
          set -euo pipefail
          git config user.name 'WNBA Odds Warehouse Bot'
          git config user.email 'actions@github.com'
          cp data/warehouse/wnba_odds_history_backfill_plan.json /tmp/wnba_odds_history_backfill_plan.json
          git fetch origin main
          git reset --hard origin/main
          mkdir -p data/warehouse
          cp /tmp/wnba_odds_history_backfill_plan.json data/warehouse/wnba_odds_history_backfill_plan.json
          git add data/warehouse/wnba_odds_history_backfill_plan.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Plan next WNBA historical odds batch'
          git push origin HEAD:main

      - name: Commit executed batch
        if: inputs.mode == 'execute'
        run: |
          set -euo pipefail
          git config user.name 'WNBA Odds Warehouse Bot'
          git config user.email 'actions@github.com'

          rm -rf /tmp/wnba-generated
          mkdir -p /tmp/wnba-generated/data/warehouse /tmp/wnba-generated/data/dashboard
          cp data/warehouse/wnba_odds_history.sqlite /tmp/wnba-generated/data/warehouse/
          cp data/warehouse/wnba_odds_history_summary.json /tmp/wnba-generated/data/warehouse/
          cp data/warehouse/wnba_odds_history_backfill_plan.json /tmp/wnba-generated/data/warehouse/
          cp data/warehouse/wnba_odds_history_dashboard.json /tmp/wnba-generated/data/warehouse/
          cp data/warehouse/wnba_odds_history_trends.json /tmp/wnba-generated/data/warehouse/
          cp data/warehouse/wnba_odds_history_results.json /tmp/wnba-generated/data/warehouse/
          cp data/warehouse/wnba_odds_history_outcomes.json /tmp/wnba-generated/data/warehouse/
          cp data/dashboard/wnba_odds_history_dashboard.json /tmp/wnba-generated/data/dashboard/
          cp data/dashboard/wnba_odds_history_trends.json /tmp/wnba-generated/data/dashboard/
          cp data/dashboard/wnba_odds_history_results.json /tmp/wnba-generated/data/dashboard/
          cp data/dashboard/wnba_odds_history_outcomes.json /tmp/wnba-generated/data/dashboard/

          git fetch origin main
          git reset --hard origin/main
          mkdir -p data/warehouse data/dashboard
          cp -f /tmp/wnba-generated/data/warehouse/* data/warehouse/
          cp -f /tmp/wnba-generated/data/dashboard/* data/dashboard/

          git add \
            data/warehouse/wnba_odds_history.sqlite \
            data/warehouse/wnba_odds_history_summary.json \
            data/warehouse/wnba_odds_history_backfill_plan.json \
            data/warehouse/wnba_odds_history_dashboard.json \
            data/dashboard/wnba_odds_history_dashboard.json \
            data/warehouse/wnba_odds_history_trends.json \
            data/dashboard/wnba_odds_history_trends.json \
            data/warehouse/wnba_odds_history_results.json \
            data/dashboard/wnba_odds_history_results.json \
            data/warehouse/wnba_odds_history_outcomes.json \
            data/dashboard/wnba_odds_history_outcomes.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Backfill WNBA odds, attach results, and grade outcomes'
          git push origin HEAD:main
