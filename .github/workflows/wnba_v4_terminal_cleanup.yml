name: WNBA V4 Intelligence Terminal Cleanup

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for active slate'
        required: false
        default: ''
  workflow_run:
    workflows: ["WNBA Model Quality Guardrails"]
    types: [completed]

concurrency:
  group: wnba-v4-terminal-cleanup
  cancel-in-progress: false

jobs:
  clean-terminal:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repository
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve target date
        run: |
          TARGET="${{ github.event.inputs.date }}"
          if [ -z "$TARGET" ]; then TARGET=$(python active_slate_date.py); fi
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "Using target date: $TARGET"

      - name: Validate cleanup scripts
        run: python -m py_compile wnba_source_health.py wnba_terminal_ui.py patch_terminal_ui.py

      - name: Refresh source health labels and counts
        run: python wnba_source_health.py --date "${{ env.TARGET }}"

      - name: Build strict terminal bundle
        run: python wnba_terminal_ui.py --date "${{ env.TARGET }}"

      - name: Embed current intelligence into V4
        run: python patch_terminal_ui.py

      - name: Verify populated terminal
        run: |
          python - <<'PY'
          import json
          data=json.load(open('data/dashboard/terminal_ui.json'))
          summary=data.get('terminal_summary',{})
          assert summary.get('mc_rows',0) > 0, summary
          assert summary.get('decision_rows',0) > 0, summary
          assert data.get('source_health',{}).get('sources'), 'source health missing'
          quality=json.load(open('data/dashboard/wnba_model_quality_audit.json'))
          assert quality.get('status') == 'ok', quality
          assert quality.get('checks',{}).get('scores_0_100'), quality
          html=open('docs/index.html',encoding='utf-8').read()
          assert 'WNBA_TERMINAL_UI_PATCH_START' in html
          assert 'wehoop / ESPN Stats' in html
          print('Terminal verified:', summary)
          print('Model quality verified:', quality.get('counts'))
          PY

      - name: Commit terminal cleanup
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          git add data/dashboard/terminal_ui.json data/dashboard/wnba_source_health.json data/warehouse/wnba_source_health.json docs/index.html
          git diff --cached --quiet && echo "No terminal cleanup changes" && exit 0
          git commit -m "Populate quality-controlled V4 intelligence terminal"
          git push || (git pull --rebase origin main && python wnba_source_health.py --date "${{ env.TARGET }}" && python wnba_terminal_ui.py --date "${{ env.TARGET }}" && python patch_terminal_ui.py && git add data/dashboard/terminal_ui.json data/dashboard/wnba_source_health.json data/warehouse/wnba_source_health.json docs/index.html && git commit -m "Populate quality-controlled V4 intelligence terminal" && git push)
