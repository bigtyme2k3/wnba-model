name: WNBA V4 QA

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'config/**'
      - 'data/dashboard/**'
      - '.github/workflows/**'
      - 'requirements.txt'

permissions:
  contents: read

concurrency:
  group: wnba-v4-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile all tracked Python files
        run: |
          python - <<'PY'
          import pathlib, py_compile, sys
          failures=[]
          ignored={'.git','.venv','venv','node_modules'}
          for path in pathlib.Path('.').rglob('*.py'):
              if any(part in ignored for part in path.parts):
                  continue
              try:
                  py_compile.compile(str(path), doraise=True)
              except Exception as exc:
                  failures.append((str(path), str(exc)))
          for path, error in failures:
              print(f'::error file={path}::{error}')
          print(f'Compiled Python files; failures={len(failures)}')
          sys.exit(1 if failures else 0)
          PY

      - name: Run V4 QA command center
        run: python qa_v4.py --strict

      - name: Run semantic model output QA
        run: python qa_v4_outputs_v2.py --strict

      - name: Build QA-integrated module status
        run: python wnba_v4_status_engine.py

      - name: Build and patch QA Health dashboard
        run: |
          python build_dashboard_v4.py
          python patch_dashboard_v4_qa_health.py

      - name: Verify QA Health integration
        run: |
          python - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          status_path=Path('data/dashboard/wnba_v4_status.json')
          html_path=Path('docs/index.html')
          status=json.loads(status_path.read_text(encoding='utf-8'))
          modules=status.get('modules',[])
          required_fields={'qa_grade','qa_score','production_ready','effective_status','blockers','warnings','health_state','health_message','last_updated_utc','age_minutes','valid_zero_output'}
          errors=[]
          if len(modules)!=25:
              errors.append(f'expected 25 modules, found {len(modules)}')
          missing_fields=[m.get('id','unknown') for m in modules if not required_fields <= set(m)]
          if missing_fields:
              errors.append(f'modules missing health fields: {missing_fields}')
          overall=status.get('qa',{}).get('overall_status')
          if overall not in {'green','yellow','red'}:
              errors.append(f'invalid overall QA status: {overall!r}')

          html=html_path.read_text(encoding='utf-8') if html_path.exists() else ''
          markers=['v4-qa-health-script','V4 Module Health','Valid No-op','Last Updated']
          missing=[marker for marker in markers if marker not in html]
          if missing:
              print(f'Health markers missing after initial patch: {missing}; retrying patch once')
              subprocess.run(['python','patch_dashboard_v4_qa_health.py'],check=True)
              html=html_path.read_text(encoding='utf-8')
              missing=[marker for marker in markers if marker not in html]
          if missing:
              errors.append(f'dashboard markers still missing after retry: {missing}')

          if errors:
              for error in errors:
                  print(f'::error::{error}')
              raise SystemExit(1)
          print('Freshness-aware System Health dashboard integration verified')
          PY

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wnba-v4-qa-report
          path: |
            data/dashboard/wnba_v4_qa.json
            data/dashboard/wnba_v4_output_qa.json
            data/dashboard/wnba_v4_status.json
            docs/V4_QA_REPORT.md
            docs/V4_OUTPUT_QA_REPORT.md
            docs/index.html
          if-no-files-found: warn
