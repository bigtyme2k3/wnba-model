name: WNBA Model Picks Ledger

on:
  workflow_dispatch:

jobs:
  manual-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate model picks ledger
        run: |
          python -m py_compile wnba_model_picks_ledger.py qa_model_picks_ledger.py
          python qa_model_picks_ledger.py
          TARGET=$(python active_slate_date.py)
          python wnba_model_picks_ledger.py grade --date "$TARGET"
          python wnba_model_picks_ledger.py archive --date "$TARGET"
          python wnba_model_picks_ledger.py analyze --date "$TARGET"
          echo "Manual validation only. Production dashboard publishing is owned by WNBA Version 4 Status."
