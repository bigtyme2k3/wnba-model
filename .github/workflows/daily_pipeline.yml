name: WNBA Daily Pipeline

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for active Eastern slate'
        required: false
        default: ''
      use_odds_api:
        description: 'Use The Odds API this run? Set true only when you want to spend credits.'
        required: false
        default: 'false'

concurrency:
  group: wnba-daily-pipeline
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repo before setup
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            active_slate_date.py \
            odds_source_manager.py \
            betting_engine.py \
            results_tracker.py \
            model_tracking.py \
            slip_optimizer.py \
            advanced_model_upgrades.py \
            dashboard_health.py \
            game_command_center.py \
            market_heatmap.py \
            unified_prediction_score.py \
            decision_center.py \
            autonomous_intelligence.py \
            projection_accuracy.py \
            wnba_context_engine.py \
            projection_intelligence_v2.py \
            scrape_odds.py \
            scrape_odds_props.py \
            scrape_injuries.py \
            line_shopping.py \
            scrape_wnba_stats.py \
            scrape_scores.py \
            merge_data.py \
            daily_runner.py \
            player_points.py \
            props_fallback_generator.py \
            postprocess_predictions.py \
            build_dashboard.py \
            patch_model_tracking_ui.py \
            patch_slip_optimizer_ui.py \
            patch_props_ui.py \
            patch_player_detail_ui.py \
            patch_advanced_ui.py \
            patch_health_briefing_ui.py \
            patch_game_command_ui.py \
            patch_market_heatmap_ui.py \
            patch_ups_ui.py \
            patch_decision_center_ui.py \
            patch_autonomous_intelligence_ui.py \
            patch_projection_accuracy_ui.py \
            patch_wnba_context_ui.py \
            patch_projection_intelligence_v2_ui.py \
            validate_odds.py \
            validate_props.py \
            validate_dashboard.py
          find . -type d -name __pycache__ -prune -exec rm -rf {} +

      - name: Set active Eastern slate date
        run: |
          TARGET=$(python active_slate_date.py --date "${{ github.event.inputs.date }}")
          YEAR=$(python active_slate_date.py --year)
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "YEAR=$YEAR" >> $GITHUB_ENV
          echo "Using active WNBA slate date: $TARGET"

      - name: Legacy Basketball Reference skipped
        run: |
          echo "Basketball Reference HTML scrape is retired from the daily path."
          echo "Using committed historical data plus ESPN, stats.wnba.com, sports-skills, manual/cached odds, and optional Odds API."

      - name: Optional The Odds API scrape
        if: ${{ github.event.inputs.use_odds_api == 'true' }}
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scrape_odds.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      - name: Resolve odds source without spending API credits
        run: python odds_source_manager.py --date ${{ env.TARGET }} --raw data/raw --manual data/manual/wnba_manual_odds.csv

      - name: Validate odds
        run: python validate_odds.py --date ${{ env.TARGET }} --raw data/raw --non-strict

      - name: Optional props API scrape
        if: ${{ github.event.inputs.use_odds_api == 'true' }}
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scrape_odds_props.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      - name: Optional line shopping API scrape
        if: ${{ github.event.inputs.use_odds_api == 'true' }}
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python line_shopping.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      - name: Scrape injuries
        run: python scrape_injuries.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      - name: Scrape WNBA official stats
        run: python scrape_wnba_stats.py --season ${{ env.YEAR }} --out data/raw
        continue-on-error: true

      - name: Generate player points
        run: python player_points.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      - name: Validate props
        run: python validate_props.py --date ${{ env.TARGET }} --raw data/raw --non-strict

      - name: Scrape scores
        run: python scrape_scores.py --date ${{ env.TARGET }} --out data/raw --boxscores
        continue-on-error: true

      - name: Track results
        run: python results_tracker.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build model tracking
        run: python model_tracking.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Merge data
        run: python merge_data.py --year all --raw data/raw --out data/processed

      - name: Generate predictions
        run: |
          python daily_runner.py \
            --date ${{ env.TARGET }} \
            --out predictions/predictions_${{ env.TARGET }}.json

      - name: Generate fallback props from predictions schedule if needed
        run: python props_fallback_generator.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      - name: Postprocess predictions
        run: python postprocess_predictions.py --date ${{ env.TARGET }}

      - name: Apply advanced model upgrades
        run: python advanced_model_upgrades.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build slip optimizer
        run: python slip_optimizer.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build Game Command Center
        run: python game_command_center.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build Market Heat Map
        run: python market_heatmap.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build Universal Prediction Score
        run: python unified_prediction_score.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build Decision Center
        run: python decision_center.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build Autonomous Intelligence
        run: python autonomous_intelligence.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build WNBA Context Engine
        run: python wnba_context_engine.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build Projection Intelligence v2
        run: python projection_intelligence_v2.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build Projection Accuracy Audit
        run: python projection_accuracy.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build dashboard health and briefing
        run: python dashboard_health.py --date ${{ env.TARGET }}
        continue-on-error: true

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Patch model tracking UI
        run: python patch_model_tracking_ui.py

      - name: Patch slip optimizer UI
        run: python patch_slip_optimizer_ui.py

      - name: Patch props UI
        run: python patch_props_ui.py

      - name: Patch player detail UI
        run: python patch_player_detail_ui.py

      - name: Patch advanced UI
        run: python patch_advanced_ui.py

      - name: Patch health briefing UI
        run: python patch_health_briefing_ui.py

      - name: Patch Game Command Center UI
        run: python patch_game_command_ui.py

      - name: Patch Market Heat Map UI
        run: python patch_market_heatmap_ui.py

      - name: Patch Universal Prediction Score UI
        run: python patch_ups_ui.py

      - name: Patch Decision Center UI
        run: python patch_decision_center_ui.py

      - name: Patch Autonomous Intelligence UI
        run: python patch_autonomous_intelligence_ui.py

      - name: Patch Projection Accuracy UI
        run: python patch_projection_accuracy_ui.py

      - name: Patch WNBA Context UI
        run: python patch_wnba_context_ui.py

      - name: Patch Projection Intelligence v2 UI
        run: python patch_projection_intelligence_v2_ui.py

      - name: Validate dashboard
        run: python validate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          git status --short
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily update - ${{ env.TARGET }}"
          git push || (git pull --rebase origin main && git push)
