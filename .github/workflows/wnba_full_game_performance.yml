name: WNBA Full Game Performance

on:
  workflow_dispatch:

jobs:
  manual-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate full-game performance
        run: |
          python -m py_compile wnba_full_game_performance.py qa_full_game_performance.py
          python qa_full_game_performance.py
          TARGET=$(python active_slate_date.py)
          python wnba_full_game_performance.py analyze --date "$TARGET"
          echo "Manual validation only. Production dashboard publishing is owned by WNBA Version 4 Status."
