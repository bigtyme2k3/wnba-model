name: WNBA Full Game Performance

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["WNBA Full Game Simulation"]
    types: [completed]
  schedule:
    - cron: '30 11 * * *'

concurrency:
  group: wnba-full-game-performance
  cancel-in-progress: false

jobs:
  grade-full-game-simulations:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repository
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install score dependencies
        run: pip install pandas requests
      - name: Validate performance files
        run: python -m py_compile wnba_full_game_performance.py qa_full_game_performance.py patch_dashboard_v4_full_game_performance.py scrape_scores.py
      - name: Run acceptance tests
        run: python qa_full_game_performance.py
      - name: Resolve active date
        run: |
          TARGET=$(python active_slate_date.py)
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          PREVIOUS=$(python - <<'PY'
          from datetime import date,timedelta
          print(date.today()-timedelta(days=1))
          PY
          )
          echo "PREVIOUS=$PREVIOUS" >> "$GITHUB_ENV"
      - name: Refresh final score history
        run: |
          python scrape_scores.py --date "${{ env.PREVIOUS }}" || true
          python scrape_scores.py --date "${{ env.TARGET }}" || true
      - name: Grade prior snapshots
        run: |
          python wnba_full_game_performance.py grade --date "${{ env.TARGET }}"
          python wnba_full_game_performance.py analyze --date "${{ env.TARGET }}"
      - name: Freeze current pregame simulations
        run: |
          python wnba_full_game_performance.py snapshot --date "${{ env.TARGET }}"
          python wnba_full_game_performance.py analyze --date "${{ env.TARGET }}"
      - name: Patch Performance Center
        run: python patch_dashboard_v4_full_game_performance.py
      - name: Verify grading safeguards
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          payload=json.load(open('data/dashboard/wnba_full_game_performance.json'))
          acceptance=json.load(open('data/dashboard/wnba_full_game_performance_acceptance.json'))
          assert acceptance['status']=='green'
          assert payload['status']=='ok'
          assert payload['policy']['automatic_parameter_changes'] is False
          assert payload['thresholds']=={'game_environment_review':100,'overtime_review':200,'direct_pair_correlation_review':200}
          for path in ('data/history/wnba_full_game_projection_history.jsonl','data/history/wnba_full_game_pair_history.jsonl'):
              assert Path(path).exists()
          for line in Path('data/history/wnba_full_game_projection_history.jsonl').read_text(encoding='utf-8').splitlines():
              if not line.strip(): continue
              row=json.loads(line)
              assert row['status'] in {'PENDING','GRADED'}
              if row['status']=='GRADED': assert row['actual_source']=='scores_historical.csv'
          for line in Path('data/history/wnba_full_game_pair_history.jsonl').read_text(encoding='utf-8').splitlines():
              if not line.strip(): continue
              row=json.loads(line)
              assert row['calculation_method']=='DIRECT_FULL_GAME_SIMULATION'
              assert row['status'] in {'PENDING','GRADED'}
              if row['status']=='GRADED': assert row['actual_source']=='player_game_log_warehouse'
          html=Path('docs/index.html').read_text(encoding='utf-8')
          assert 'v4-full-game-performance-script' in html
          assert 'Game Simulation Performance' in html
          print('FULL GAME PERFORMANCE:',payload['summary'])
          PY
      - name: Commit performance history atomically
        run: |
          git config user.name "WNBA Game Performance Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Grade full-game simulations and direct pair calibration" \
            'data/raw/scores_*.csv' \
            'data/warehouse/wnba_full_game_performance.json' \
            'data/dashboard/wnba_full_game_performance*.json' \
            'data/history/wnba_full_game_projection_history.jsonl' \
            'data/history/wnba_full_game_pair_history.jsonl' \
            'docs/index.html'
