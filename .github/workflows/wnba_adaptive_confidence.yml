name: WNBA Adaptive Confidence Engine (Sprint 8.1)

on:
  workflow_dispatch:
  schedule:
    - cron: '10 15 * * *'

concurrency:
  group: wnba-adaptive-confidence
  cancel-in-progress: false

jobs:
  adaptive-confidence:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repository
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Refresh Sprint 7 calibration
        run: |
          python -m py_compile wnba_confidence_calibration.py wnba_adaptive_confidence_engine.py
          python wnba_confidence_calibration.py
      - name: Build Sprint 8.1 adaptive confidence
        run: python wnba_adaptive_confidence_engine.py
      - name: Verify Sprint 8.1 report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p=Path('data/dashboard/wnba_adaptive_confidence.json')
          assert p.exists(), 'adaptive confidence report missing'
          d=json.load(p.open())
          assert d.get('sprint') == 8
          assert d.get('phase') == '8.1-calibration-resolution-upgrade'
          curve=d.get('calibration_curve',[])
          assert curve, 'calibration curve is empty'
          probs=[x['calibrated_probability'] for x in curve]
          assert probs == sorted(probs), 'calibrated probabilities are not monotonic'
          assert all(0 <= x <= 1 for x in probs)
          assert all(x.get('sample_size',0) >= 150 for x in curve), 'calibration bin below minimum sample'
          assert all(0 <= x['ci95_low'] <= x['ci95_high'] <= 1 for x in curve)
          s=d.get('summary',{})
          assert s.get('validated_score_min') is not None
          assert s.get('validated_score_max') is not None
          assert s['validated_score_min'] <= s['validated_score_max']
          print(json.dumps(s,indent=2))
          PY
      - name: Commit Sprint 8.1 outputs
        run: |
          git config user.name "WNBA Adaptive Confidence Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Build Sprint 8.1 calibration resolution upgrade" \
            'data/dashboard/wnba_adaptive_confidence.json' \
            'data/warehouse/wnba_adaptive_confidence.json' \
            'data/dashboard/wnba_daily_edges.json'
      - name: Upload Sprint 8.1 report
        uses: actions/upload-artifact@v4
        with:
          name: wnba-adaptive-confidence-8-1
          path: |
            data/dashboard/wnba_adaptive_confidence.json
            data/warehouse/wnba_adaptive_confidence.json
