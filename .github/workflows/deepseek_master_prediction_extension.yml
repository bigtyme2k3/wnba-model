name: WNBA DeepSeek Master Prediction Extension

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for latest predictions file'
        required: false
        default: ''

concurrency:
  group: wnba-extension-writes
  cancel-in-progress: false

jobs:
  run-deepseek-master-prediction:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: integration/deepseek-v1

      - name: Sync latest repo
        run: git pull --rebase origin integration/deepseek-v1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve target date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "TARGET=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          else
            latest=$(ls predictions/predictions_*.json 2>/dev/null | sed -E 's/.*predictions_([0-9-]+).json/\1/' | sort | tail -1)
            echo "TARGET=${latest}" >> $GITHUB_ENV
          fi

      - name: Validate syntax
        run: python -m py_compile deepseek_master_prediction_engine.py build_dashboard.py validate_dashboard.py

      - name: Build DeepSeek Master Prediction Engine
        run: python deepseek_master_prediction_engine.py --date ${{ env.TARGET }}

      - name: Rebuild dashboard
        run: python build_dashboard.py

      - name: Validate dashboard
        run: python validate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          git status --short
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "DeepSeek master prediction update - ${{ env.TARGET }}"
          git push origin integration/deepseek-v1
