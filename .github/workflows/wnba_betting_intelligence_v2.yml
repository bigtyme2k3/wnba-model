name: WNBA Betting Intelligence V2

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/warehouse/wnba_odds_warehouse_v2.sqlite'
      - 'wnba_betting_intelligence_engine.py'

permissions:
  contents: write

concurrency:
  group: wnba-betting-intelligence-v2
  cancel-in-progress: false

jobs:
  intelligence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile engine
        run: python -m py_compile wnba_betting_intelligence_engine.py

      - name: Build betting intelligence
        run: python wnba_betting_intelligence_engine.py

      - name: Verify outputs
        run: |
          python - <<'PY'
          import json, sqlite3
          from pathlib import Path

          report = Path('data/dashboard/wnba_betting_intelligence.json')
          db = Path('data/warehouse/wnba_odds_warehouse_v2.sqlite')
          if not report.exists():
              raise SystemExit('Missing dashboard intelligence JSON')
          payload = json.loads(report.read_text())
          required = ['sportsbooks','markets','clv_by_sportsbook','clv_by_market','top_trends','health']
          missing = [key for key in required if key not in payload]
          if missing:
              raise SystemExit(f'Missing report keys: {missing}')
          con = sqlite3.connect(db)
          tables = {row[0] for row in con.execute("SELECT name FROM sqlite_master WHERE type='table'")}
          expected = {
              'roi_intelligence','clv_intelligence','sportsbook_intelligence',
              'market_intelligence','team_intelligence','player_intelligence',
              'trend_intelligence'
          }
          absent = expected - tables
          if absent:
              raise SystemExit(f'Missing intelligence tables: {sorted(absent)}')
          print(json.dumps({
              'graded_wagers': payload.get('graded_wagers'),
              'movement_series': payload.get('movement_series'),
              'sportsbooks': len(payload['sportsbooks']),
              'markets': len(payload['markets']),
              'trends': len(payload['top_trends']),
              'health': payload['health'],
          }, indent=2))
          PY

      - name: Commit intelligence outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/warehouse/wnba_odds_warehouse_v2.sqlite \
                  data/warehouse/wnba_betting_intelligence.json \
                  data/dashboard/wnba_betting_intelligence.json
          if git diff --cached --quiet; then
            echo 'No intelligence changes to commit.'
          else
            git commit -m 'Build WNBA betting intelligence V2'
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Upload intelligence report
        uses: actions/upload-artifact@v4
        with:
          name: wnba-betting-intelligence-v2
          path: |
            data/dashboard/wnba_betting_intelligence.json
            data/warehouse/wnba_betting_intelligence.json
          retention-days: 30
