name: WNBA Phase 5 Learning

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Grade date (YYYY-MM-DD), leave blank for current Eastern date'
        required: false
        default: ''
      closing_snapshot:
        description: 'Capture closing lines before grading?'
        required: false
        default: 'false'
  workflow_run:
    workflows:
      - "WNBA Live Results Engine"
      - "WNBA V4 Intelligence Terminal Cleanup"
    types: [completed]
  schedule:
    - cron: '30 9 * * *'

concurrency:
  group: wnba-phase5-learning
  cancel-in-progress: false

jobs:
  phase5-learning:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest repository
        run: |
          git fetch origin main
          git reset --hard origin/main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Resolve grading dates
        run: |
          TARGET="${{ github.event.inputs.date }}"
          if [ -n "$TARGET" ]; then
            DATES="$TARGET"
            LATEST_TARGET="$TARGET"
          elif [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.name }}" = "WNBA Live Results Engine" ]; then
            DATES=$(python - <<'PY'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          today=datetime.now(ZoneInfo('America/New_York')).date()
          print(' '.join((today-timedelta(days=i)).isoformat() for i in (2,1,0)))
          PY
            )
            LATEST_TARGET=$(echo "$DATES" | awk '{print $NF}')
          else
            DATES=$(python - <<'PY'
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          today=datetime.now(ZoneInfo('America/New_York')).date()
          print(' '.join((today-timedelta(days=i)).isoformat() for i in (3,2,1)))
          PY
            )
            LATEST_TARGET=$(echo "$DATES" | awk '{print $NF}')
          fi
          echo "DATES=$DATES" >> "$GITHUB_ENV"
          echo "LATEST_TARGET=$LATEST_TARGET" >> "$GITHUB_ENV"
          echo "Phase 5 grading dates: $DATES"
          echo "Phase 5 report target: $LATEST_TARGET"

      - name: Validate Phase 5 scripts
        run: python -m py_compile wnba_historical_database.py wnba_closing_line_tracker.py wnba_phase5_actuals_bridge.py wnba_phase5_learning_engine.py wnba_phase5_backtest.py wnba_results_dashboard_builder.py wnba_terminal_ui.py patch_terminal_ui.py patch_dashboard_v4_results.py

      - name: Refresh official results and Phase 5 actuals
        run: |
          python collect_wehoop.py --current --out data/raw
          python wnba_phase5_actuals_bridge.py
          python - <<'PY'
          import csv
          rows=list(csv.DictReader(open('data/raw/boxscores_wehoop.csv',encoding='utf-8')))
          assert rows, 'Phase 5 actuals bridge produced no rows'
          assert any(r.get('game_date') and r.get('player') and r.get('pts') not in (None,'') for r in rows), 'No usable player actuals'
          print('PHASE 5 ACTUALS READY',len(rows))
          PY

      - name: Grade recent dates and rebuild calibration
        run: |
          BEFORE=$(python - <<'PY'
          import json
          try:
              p=json.load(open('data/dashboard/wnba_phase5_learning.json'))
              print(int(p.get('performance',{}).get('graded',0)))
          except Exception:
              print(0)
          PY
          )
          echo "PHASE5_BEFORE=$BEFORE" >> "$GITHUB_ENV"

          for TARGET in $DATES; do
            echo "Processing $TARGET"
            python wnba_historical_database.py --date "$TARGET"
            if [ "${{ github.event.inputs.closing_snapshot }}" = "true" ] && [ "$TARGET" = "$LATEST_TARGET" ]; then
              python wnba_closing_line_tracker.py --date "$TARGET" --stage close
            fi
            python wnba_phase5_learning_engine.py --date "$TARGET"
          done

          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          paths=['data/warehouse/wnba_phase5_learning.json','data/dashboard/wnba_phase5_learning.json']
          before=int(os.environ.get('PHASE5_BEFORE','0'))
          latest=os.environ['LATEST_TARGET']
          dates=os.environ['DATES'].split()
          after=before
          for path in paths:
              with open(path,encoding='utf-8') as f:
                  payload=json.load(f)
              after=int(payload.get('performance',{}).get('graded',0))
              payload['target_date']=latest
              payload['grading_dates']=dates
              payload['newly_graded']=max(0,after-before)
              payload['reporting_note']='newly_graded is the net increase for this complete workflow run'
              payload['generated_at_utc']=datetime.now(timezone.utc).isoformat()
              with open(path,'w',encoding='utf-8') as f:
                  json.dump(payload,f,indent=2,allow_nan=False)
          print(f'Phase 5 graded rows: {before} -> {after}; newly graded this run: {max(0,after-before)}; report target: {latest}')
          PY

          python wnba_phase5_backtest.py --date "$LATEST_TARGET"
          python wnba_results_dashboard_builder.py

      - name: Rebuild terminal and Results tab
        run: |
          python wnba_terminal_ui.py --date "$LATEST_TARGET"
          python patch_terminal_ui.py
          python patch_dashboard_v4_results.py

      - name: Verify Phase 5 outputs
        run: |
          python - <<'PY'
          import json, os
          report=json.load(open('data/dashboard/wnba_phase5_learning.json'))
          backtest=json.load(open('data/dashboard/wnba_phase5_backtest.json'))
          assert report.get('target_date')==os.environ['LATEST_TARGET'], (report.get('target_date'),os.environ['LATEST_TARGET'])
          assert report.get('grading_dates')==os.environ['DATES'].split(), report.get('grading_dates')
          assert isinstance(report.get('newly_graded'),int), report.get('newly_graded')
          assert 'performance' in report
          assert 'calibration' in report
          assert 'feature_importance' in report
          assert 'recent_graded' in report
          assert 'thresholds' in backtest
          assert 'learned_weights' in backtest
          assert os.path.exists('data/history/wnba_graded_bets.csv')
          html=open('docs/index.html',encoding='utf-8').read()
          assert 'window.WNBA_RESULTS_DATA' in html
          print('Phase 5 verified:', report['performance'])
          print('Grading dates:', report['grading_dates'])
          print('Newly graded this workflow run:', report['newly_graded'])
          PY

      - name: Commit Phase 5 learning state
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Refresh WNBA graded results through $LATEST_TARGET" \
            'data/raw/boxscores_wehoop.csv' \
            'data/history/wnba_graded_bets.csv' \
            'data/history/wnba_*.jsonl' \
            'data/warehouse/wnba_*.json' \
            'data/dashboard/wnba_*.json' \
            'config/wnba_learned_weights.json' \
            'docs/index.html'
