name: WNBA ALT Tab Repair

on:
  workflow_dispatch:

jobs:
  manual-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate ALT navigation patches
        run: |
          python -m py_compile patch_dashboard_v4_alt_streaks.py patch_dashboard_v4_force_alt_tab.py
          python patch_dashboard_v4_alt_streaks.py
          python patch_dashboard_v4_force_alt_tab.py
          python - <<'PY'
          from pathlib import Path
          html=Path('docs/index.html').read_text(encoding='utf-8')
          assert 'v4-alt-streaks-script' in html
          assert 'v4-force-alt-tab-script' in html
          assert 'ALT Streaks' in html
          print('Manual ALT navigation validation passed')
          PY
          echo "Manual validation only. Production dashboard publishing is owned by WNBA Version 4 Status."
