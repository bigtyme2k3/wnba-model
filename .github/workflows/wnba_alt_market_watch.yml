name: WNBA ALT Market Watch

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), blank uses active Eastern slate'
        required: false
        default: ''
      force_refresh:
        description: 'Run even when no checkpoint is due?'
        required: false
        default: 'false'
  schedule:
    - cron: '7,37 * * * *'

concurrency:
  group: wnba-alt-market-watch
  cancel-in-progress: false

jobs:
  pregame-market-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync latest repository
        run: git pull --ff-only origin main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Resolve active Eastern slate
        run: |
          TARGET=$(python active_slate_date.py --date "${{ github.event.inputs.date }}")
          echo "TARGET=$TARGET" >> "$GITHUB_ENV"
          echo "Watching game start times for $TARGET"
      - name: Check actual game start times
        id: due
        run: |
          python wnba_alt_market_watch_due.py --date "${{ env.TARGET }}" > /tmp/alt_due.json
          cat /tmp/alt_due.json
          RUN=$(python - <<'PY'
          import json
          text=open('/tmp/alt_due.json',encoding='utf-8').read().strip().splitlines()[-1]
          print('true' if json.loads(text).get('run_refresh') else 'false')
          PY
          )
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then RUN=true; fi
          echo "run_refresh=$RUN" >> "$GITHUB_OUTPUT"
      - name: Validate market-watch scripts
        if: steps.due.outputs.run_refresh == 'true'
        run: |
          python -m py_compile scrape_odds_props.py wnba_alt_market_warehouse.py qa_alt_market_warehouse.py wnba_alt_market_watch_due.py wnba_alt_closing_line_tracker.py wnba_alt_streaks.py wnba_alt_streaks_warehouse_upgrade.py wnba_alt_streaks_opponent_context.py wnba_alt_streaks_position_context.py wnba_alt_streaks_pace_minutes_context.py wnba_alt_streak_confidence.py wnba_alt_performance_clv_context.py
          python qa_alt_market_warehouse.py
      - name: Refresh current player-prop markets
        if: steps.due.outputs.run_refresh == 'true'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python scrape_odds_props.py --date "${{ env.TARGET }}" --out data/raw || true
          python line_shopping.py --date "${{ env.TARGET }}" --out data/raw || true
          python player_points.py --date "${{ env.TARGET }}" --out data/raw || true
          python wnba_sportsbook_consensus.py --date "${{ env.TARGET }}" || true
      - name: Build exact sportsbook ALT warehouse
        if: steps.due.outputs.run_refresh == 'true'
        run: python wnba_alt_market_warehouse.py --date "${{ env.TARGET }}"
      - name: Rebuild current streak context
        if: steps.due.outputs.run_refresh == 'true'
        run: |
          python wnba_alt_streaks.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_correctness.py
          python wnba_alt_streaks_warehouse_upgrade.py --date "${{ env.TARGET }}"
          python wnba_alt_streaks_opponent_context.py
          python wnba_alt_streaks_position_context.py
          python wnba_alt_streaks_pace_minutes_context.py
          python wnba_alt_streak_confidence.py --date "${{ env.TARGET }}"
      - name: Capture verified pregame snapshot
        if: steps.due.outputs.run_refresh == 'true'
        run: |
          python wnba_alt_closing_line_tracker.py snapshot --date "${{ env.TARGET }}"
          python wnba_alt_closing_line_tracker.py resolve --date "${{ env.TARGET }}"
          python wnba_alt_closing_line_tracker.py report --date "${{ env.TARGET }}"
          python wnba_alt_performance_clv_context.py
          python wnba_alt_market_watch_due.py --date "${{ env.TARGET }}" --mark-complete > /tmp/alt_marked.json
          cat /tmp/alt_marked.json
      - name: Verify exact ladder contract and no post-start capture
        if: steps.due.outputs.run_refresh == 'true'
        run: |
          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          warehouse=json.load(open('data/dashboard/wnba_alt_market_warehouse.json'))
          assert warehouse['data_contract']['book_specific_lines_preserved'] is True
          assert warehouse['data_contract']['cross_book_line_averaging'] is False
          assert warehouse['data_contract']['dd_td_supported'] is False
          path=Path('data/history/wnba_alt_market_snapshots.jsonl')
          if path.exists():
              for line in path.read_text(encoding='utf-8').splitlines():
                  if not line.strip(): continue
                  row=json.loads(line)
                  if row.get('game_start_utc') and row.get('captured_at_utc'):
                      assert datetime.fromisoformat(row['captured_at_utc']) <= datetime.fromisoformat(row['game_start_utc'])
          due=json.load(open('data/dashboard/wnba_alt_market_watch_due.json'))
          assert due['policy']['early_weekend_games_supported'] is True
          print('Exact sportsbook ALT warehouse verified:',warehouse['summary'])
          PY
      - name: Commit market snapshots atomically
        if: steps.due.outputs.run_refresh == 'true'
        run: |
          git config user.name "WNBA Market Watch Bot"
          git config user.email "actions@github.com"
          bash scripts/atomic_generated_push.sh \
            "Capture exact sportsbook ALT ladders" \
            'data/raw/player_points_*.csv' \
            'data/raw/player_points_today.csv' \
            'data/raw/alt_props_bookmakers_*.csv' \
            'data/warehouse/wnba_alt_*.json' \
            'data/dashboard/wnba_alt_*.json' \
            'data/history/wnba_alt_market_snapshots.jsonl' \
            'data/history/wnba_alt_market_watch_state.json'
      - name: No checkpoint due
        if: steps.due.outputs.run_refresh != 'true'
        run: echo "No game-specific market checkpoint is due."
