name: WNBA Market Timing Extension

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for latest predictions file'
        required: false
        default: ''
  workflow_run:
    workflows: ["WNBA Daily Pipeline", "WNBA Minutes Usage Extension"]
    types: [completed]

concurrency:
  group: wnba-market-timing-extension
  cancel-in-progress: false

jobs:
  run-market-timing:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve target date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "TARGET=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          else
            latest=$(ls predictions/predictions_*.json 2>/dev/null | sed -E 's/.*predictions_([0-9-]+).json/\1/' | sort | tail -1)
            echo "TARGET=${latest}" >> $GITHUB_ENV
          fi

      - name: Validate syntax
        run: python -m py_compile market_timing_intelligence.py patch_market_timing_ui.py build_dashboard.py validate_dashboard.py

      - name: Build Market Timing Intelligence
        run: python market_timing_intelligence.py --date ${{ env.TARGET }}

      - name: Rebuild dashboard
        run: python build_dashboard.py

      - name: Patch Market Timing UI
        run: python patch_market_timing_ui.py

      - name: Validate dashboard
        run: python validate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "WNBA Model Bot"
          git config user.email "actions@github.com"
          git status --short
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Market timing intelligence update - ${{ env.TARGET }}"
          git pull --rebase origin main
          git push
