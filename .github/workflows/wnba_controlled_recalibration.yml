name: WNBA Controlled Recalibration

on:
  workflow_dispatch:

jobs:
  manual-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate controlled recalibration
        run: |
          python -m py_compile wnba_controlled_recalibration.py qa_controlled_recalibration.py
          python qa_controlled_recalibration.py
          TARGET=$(python active_slate_date.py)
          python wnba_controlled_recalibration.py --date "$TARGET"
          echo "Manual validation only. Production dashboard publishing is owned by WNBA Version 4 Status."
