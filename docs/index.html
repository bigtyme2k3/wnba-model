<script id="props-ui-fix">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function fmt(v){try{return fmtTime(v)}catch(e){return v||'—'}}
  function state(name, fallback){return Object.prototype.hasOwnProperty.call(window,name)?window[name]:fallback}
  function key(g){return g.away.name+' @ '+g.home.name}
  function rowGame(p){
    if(p.game && String(p.game).includes(' @ ')) return String(p.game).trim();
    let raw=[p.game,p.opp,p.team,p.home_team,p.away_team].map(x=>String(x||'')).join(' ').toUpperCase().replace(/[^A-Z0-9]/g,'');
    for(let g of (DATA.games||[])){let vals=[g.away.name,g.home.name,g.away.abbr,g.home.abbr].map(x=>String(x||'').toUpperCase().replace(/[^A-Z0-9]/g,'')); if((raw.includes(vals[0])||raw.includes(vals[2]))&&(raw.includes(vals[1])||raw.includes(vals[3]))) return key(g)}
    return p.game||p.opp||'UNKNOWN';
  }
  function pct(x){return typeof x==='number'?Math.round(x*100)+'%':'—'}
  function num(x,d=0){let n=Number(x);return isNaN(n)?d:n}
  function arr(v){if(Array.isArray(v))return v;if(!v)return[];try{let x=JSON.parse(v);return Array.isArray(x)?x:[]}catch(e){return[]}}
  function boxes(p){let vals=arr(p.last5_vals).slice(0,5),opps=arr(p.last5_opps).slice(0,5),line=Number(p.line),sig=p.signal;if(!vals.length)return'—';return '<div class="l5-wrap betsy">'+vals.map((v,i)=>{let hit=sig?(sig==='UNDER'?v<line:sig==='OVER'?v>line:sig==='YES'?v==1:v==0):null,cls=hit===null?'l5-neutral':hit?'l5-hit':'l5-miss';return `<div class="l5-box"><div class="l5-num ${cls}">${v}</div><div class="l5-opp">${safe(opps[i],'')}</div></div>`}).join('')+'</div>'}
  function rank(r){r=Number(r||8);return r<=5?'rank-tough':r<=10?'rank-mid':'rank-easy'}
  function statLine(p){return p.stat==='DD'||p.stat==='TD'?'YES':safe(p.best_line,p.line)}
  function projected(p){return p.stat==='DD'||p.stat==='TD'?Math.round((p.pred||0)*100)+'%':safe(p.pred)}
  function showOver(p){if(p.stat==='DD'||p.stat==='TD') return p.signal==='YES'?`YES ${safe(p.yes_price||p.best_odds||p.odds,'')}`:safe(p.yes_price,'—');let val=safe(p.over_price || (p.signal==='OVER'?p.best_odds:null),'—');return p.signal==='OVER'?`OVER ${val}`:val}
  function showUnder(p){if(p.stat==='DD'||p.stat==='TD') return p.signal==='NO'?`NO ${safe(p.no_price||p.best_odds||p.odds,'')}`:safe(p.no_price,'—');let val=safe(p.under_price || (p.signal==='UNDER'?p.best_odds:null),'—');return p.signal==='UNDER'?`UNDER ${val}`:val}
  function evCell(p){let ev=num(p.ev_pct,null);let sc=safe(p.score,'—');let grade=safe(p.grade||p.score_label,'—');return `<div class="ev-box ${ev!==null&&ev>0?'pos':'neg'}"><span>${ev===null?'—':ev+'%'}</span><small>${grade} · ${sc}</small></div>`}
  function sortRows(rows, sortKey){
    if(sortKey==='EV') rows=rows.sort((a,b)=>num(b.ev_pct)-num(a.ev_pct));
    else if(sortKey==='OVER') rows=rows.filter(p=>p.signal==='OVER'||p.signal==='YES').sort((a,b)=>num(b.ev)-num(a.ev));
    else if(sortKey==='UNDER') rows=rows.filter(p=>p.signal==='UNDER'||p.signal==='NO').sort((a,b)=>num(b.ev)-num(a.ev));
    else if(sortKey==='PROJECTED') rows=rows.sort((a,b)=>num(b.pred)-num(a.pred));
    else if(sortKey==='L5') rows=rows.sort((a,b)=>num(b.last5_hit)-num(a.last5_hit));
    else rows=rows.sort((a,b)=>num(b.score)-num(a.score)||(b.conf==='HIGH')-(a.conf==='HIGH')||(b.conf==='MED')-(a.conf==='MED')||Math.abs(b.edge||0)-Math.abs(a.edge||0));
    return rows;
  }
  function draw(){
    let curGame=state('propsGame','ALL'),curStat=state('propsStat','ALL'),curSort=state('propsSort','EDGE');

    const h=DATA.market_heatmap||{}; if(!h.summary)return;
    const markets=(h.ranked_markets||[]).slice(0,10);
    const books=(h.ranked_books||[]).slice(0,6);
    const games=(h.ranked_games||[]).slice(0,6);
    const best=markets[0]||{};
    const html=`<section id="market-heatmap-block"><div class="section-title">Market Heat Map</div><div class="mh-hero"><div><h2>Best Market: ${safe(h.summary.best_market)}</h2><p>Quick view of where today's strongest edges are clustering.</p></div><div class="mh-hero-score"><span>Opportunity</span><b>${safe(best.opportunity_score)}</b></div></div><div class="mh-grid">${markets.map(tile).join('')}</div><div class="mh-split"><article class="mh-panel"><h3>Best Sportsbooks</h3>${books.map(x=>tile(x,'book')).join('')}</article><article class="mh-panel"><h3>Best Games</h3>${games.map(x=>tile(x,'game')).join('')}</article><article class="mh-panel wide"><h3>Top Props From Best Market</h3>${topRows(best.top)}</article></div></section>`;
    const el=document.getElementById('tab-games'); if(el && !document.getElementById('market-heatmap-block')){const w=document.createElement('div');w.innerHTML=html;el.appendChild(w.firstElementChild)}
  }
  const oldSwitch=window.switchTab;window.switchTab=function(name,btn){if(typeof oldSwitch==='function')oldSwitch(name,btn);if(name==='games')setTimeout(render,0)};
  setTimeout(render,800);
})();
</script>

</body>
</html>
