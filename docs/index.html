<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#07080f">
<title>WNBA Betting Model</title>
<style>
:root{--bg:#07080f;--panel:#0d0f1a;--panel2:#121625;--border:#ffffff0d;--high:#00e5a0;--med:#f5c518;--low:#555577;--over:#4ade80;--under:#f87171;--spread:#60a5fa;--total:#c084fc;--prop:#fb923c;--text:#e2e8f0;--muted:#475569}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh}.app{max-width:1200px;margin:0 auto;padding:18px}.topbar{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:14px}.kicker{font-size:11px;letter-spacing:3px;color:#8aa8ff;font-weight:900;text-transform:uppercase}.title{font-size:26px;font-weight:900;margin-top:4px}.sub{font-size:13px;color:#7b879b;margin-top:6px}.live{display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:999px;background:#101827;border:1px solid var(--border);color:#8ea0b8;font-size:12px}.dot{width:8px;height:8px;border-radius:50%;background:var(--high);box-shadow:0 0 12px var(--high)}.nav{background:#0b1220;border:1px solid var(--border);border-radius:20px;padding:8px;display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px;overflow-x:auto}.tabs{display:flex;gap:6px}.tab{border:0;background:transparent;color:#7a8498;padding:11px 15px;border-radius:15px;font-family:inherit;font-size:12px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}.tab.active{background:#1b2742;color:#eaf0ff}.strip{display:flex;gap:18px;color:#7a8498;font-size:12px;white-space:nowrap}.strip b{font-size:10px;letter-spacing:2px;color:#64748b;margin-right:6px}.health{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.metric{background:linear-gradient(180deg,#111827,#0d1220);border:1px solid var(--border);border-radius:20px;padding:16px}.metric-label{font-size:10px;letter-spacing:2px;color:#64748b;font-weight:900;text-transform:uppercase}.metric-value{font-size:24px;font-weight:900;margin-top:10px}.metric-sub{font-size:12px;color:#7b879b;margin-top:8px}.good{color:var(--high)}.bad{color:var(--under)}.warn{color:var(--med)}.view{display:none}.view.active{display:block}.section-title{font-size:11px;letter-spacing:2px;color:#64748b;font-weight:900;text-transform:uppercase;margin:16px 0 10px}.games-layout{display:grid;grid-template-columns:280px 1fr;gap:14px}.sidebar{display:flex;flex-direction:column;gap:9px}.game-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:13px;cursor:pointer}.game-card.active{border-color:var(--spread);box-shadow:inset 3px 0 0 var(--spread);background:#12192b}.game-time{font-size:11px;color:#64748b}.team-line{font-size:15px;font-weight:900;margin-top:7px}.tag{display:inline-block;border-radius:999px;padding:4px 8px;background:#1a2440;color:#dbe6ff;font-size:11px;font-weight:900}.stars{font-size:12px;margin-top:7px}.panel,.empty,.note{background:var(--panel);border:1px solid var(--border);border-radius:18px}.panel{padding:18px}.matchup{font-size:24px;font-weight:900;margin:8px 0}.context{display:flex;gap:8px;flex-wrap:wrap;color:#7b879b;font-size:12px}.pill{border-radius:999px;padding:5px 8px;background:#ffffff08}.pred-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}.pred-card{background:#101523;border:1px solid var(--border);border-radius:16px;padding:16px}.card-label{font-size:10px;letter-spacing:2px;color:#64748b;font-weight:900;text-transform:uppercase}.conf{float:right;border-radius:999px;padding:5px 8px;font-size:10px;font-weight:900}.conf.HIGH{background:#00e5a020;color:var(--high)}.conf.MED{background:#f5c51820;color:var(--med)}.conf.LOW{background:#55557722;color:#8d95ad}.pred-main{font-size:28px;font-weight:900;margin:18px 0}.data-row{display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:9px;margin-top:9px;font-size:13px}.data-row span:first-child{color:#64748b}.data-row span:last-child{color:#dce6f6}.edge-pos{color:var(--over)!important}.edge-neg{color:var(--under)!important}.board{display:flex;flex-direction:column;gap:9px}.board-row{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;display:grid;grid-template-columns:1.2fr .7fr .7fr .6fr .6fr;gap:10px;align-items:center}.board-main{font-weight:900}.board-sub{font-size:12px;color:#7b879b;margin-top:4px}.board-label{font-size:10px;letter-spacing:1.5px;color:#64748b;font-weight:900;text-transform:uppercase}.board-value{font-size:14px;font-weight:900}.edge-badge{border-radius:999px;padding:7px 10px;background:#00e5a018;color:var(--high);font-weight:900}.empty{padding:42px;text-align:center;color:#8b95a8}.note{padding:14px;color:#8b95a8;font-size:13px;margin-top:14px}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat-card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px}.stat-title{font-size:11px;letter-spacing:2px;color:var(--spread);font-weight:900;text-transform:uppercase;margin-bottom:12px}.stat-line{display:flex;justify-content:space-between;border-top:1px solid var(--border);padding:9px 0;font-size:13px}.stat-line span:first-child{color:#64748b}.props-games{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}.props-game{min-width:190px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer}.props-game.active{border-color:var(--spread);background:#121b30}.props-game.all{min-width:115px}.filter-bar{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}.filter-btn{background:#0d0f1a;border:1px solid var(--border);color:#8b95a8;border-radius:999px;padding:9px 13px;font-family:inherit;font-weight:900}.filter-btn.active{background:#1b2742;color:#fff;border-color:#60a5fa66}.props-scroll{overflow-x:auto;border-radius:18px}.props-table{min-width:1120px}.props-head,.prop-row{display:grid;grid-template-columns:210px 75px 80px 70px 70px 95px 210px 95px 95px 110px 85px;gap:10px;align-items:center}.props-head{padding:11px 14px;color:#64748b;font-size:10px;letter-spacing:1.5px;font-weight:900;text-transform:uppercase}.prop-row{position:relative;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:8px}.prop-row.HIGH{box-shadow:inset 3px 0 0 var(--high);background:linear-gradient(90deg,#00e5a012,var(--panel) 25%)}.prop-row.MED{box-shadow:inset 3px 0 0 var(--med)}.player-name{font-size:14px;font-weight:900}.player-meta{font-size:11px;color:#64748b;margin-top:3px}.stat-pill{display:inline-block;border-radius:999px;padding:5px 8px;background:#fb923c20;color:var(--prop);font-weight:900;font-size:11px}.stat-pill.high{background:#00e5a020;color:var(--high)}.signal-over{color:var(--over);font-weight:900}.signal-under{color:var(--under);font-weight:900}.proj-bright{color:#eaf2ff;font-weight:900}.proj-dim{color:#64748b}.l5-wrap{display:flex;gap:5px}.l5-box{width:28px;text-align:center}.l5-num{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900}.l5-hit{background:#4ade8033;color:#b7ffd1}.l5-miss{background:#f8717130;color:#ffc0c7}.l5-opp{font-size:8px;color:#64748b;margin-top:3px}.rank-tough{color:var(--under);font-weight:900}.rank-mid{color:var(--med);font-weight:900}.rank-easy{color:var(--over);font-weight:900}@media(max-width:840px){.app{padding:12px}.topbar{align-items:flex-start}.title{font-size:23px}.nav{display:block}.strip{margin-top:8px;padding:0 8px 4px}.health{grid-template-columns:1fr 1fr}.games-layout,.pred-grid,.stats-grid{grid-template-columns:1fr}.board-row{grid-template-columns:1fr 1fr}.board-row>div:first-child{grid-column:1/-1}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><div><div class="kicker">WNBA Betting Model</div><div class="title">Daily Report</div><div class="sub">Automated projections, market edges, spreads and player props.</div></div><div class="live"><span class="dot"></span><span id="header-count">0 games</span></div></header>
<section class="nav"><div class="tabs"><button class="tab active" onclick="switchTab('games',this)">Games</button><button class="tab" onclick="switchTab('spreads',this)">Spreads</button><button class="tab" onclick="switchTab('props',this)">Props</button><button class="tab" onclick="switchTab('bets',this)">Best Bets</button><button class="tab" onclick="switchTab('stats',this)">Stats</button></div><div class="strip"><span><b>Spread</b><span id="spread-stats"></span></span><span><b>Totals</b><span id="totals-stats"></span></span><span><b>Props</b><span id="props-stats"></span></span></div></section>
<section id="health" class="health"></section>
<main id="tab-games" class="view active"></main><main id="tab-spreads" class="view"></main><main id="tab-props" class="view"></main><main id="tab-bets" class="view"></main><main id="tab-stats" class="view"></main>
</div>
<script>
const DATA = {"date":"","games":[],"best_bets":[],"props":[],"model_stats":{},"data_health":{}};
let activeGame=0, propsGame='ALL', propsStat='ALL';
function safe(v,d='—'){return v===null||v===undefined||v===''?d:v}function pct(x){return typeof x==='number'?Math.round(x*100)+'%':'—'}function money(n){return typeof n==='number'?(n>0?'+'+n:n):'—'}function fmtTime(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}catch(e){return iso}}function stars(n){let c=n===3?'var(--high)':n===2?'var(--med)':'var(--low)';return'<span style="color:'+c+'">'+[1,2,3].map(i=>i<=n?'★':'☆').join('')+'</span>'}function edgeClass(e){return typeof e==='number'?(e>=0?'edge-pos':'edge-neg'):''}function arr(v){if(Array.isArray(v))return v;if(!v)return[];try{let p=JSON.parse(v);return Array.isArray(p)?p:[]}catch(e){return[]}}
window.onload=init;function init(){let g=DATA.games||[],b=DATA.best_bets||[],m=DATA.model_stats||{};document.getElementById('header-count').textContent=g.length+' games · '+b.filter(x=>x.stars===3).length+' high';if(m.spread)document.getElementById('spread-stats').textContent=pct(m.spread.dir_acc)+' dir · '+pct(m.spread.strong_ats)+' strong';if(m.totals)document.getElementById('totals-stats').textContent=pct(m.totals.ou_acc)+' O/U · '+pct(m.totals.strong_ou)+' strong';if(m.props)document.getElementById('props-stats').textContent=pct(m.props.hit_rate)+' hit · '+pct(m.props.strong_hr)+' strong';renderHealth();renderGames();renderSpreads();renderProps();renderBets();renderStats()}
function switchTab(tab,btn){['games','spreads','props','bets','stats'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function renderHealth(){let h=DATA.data_health||{},ok=h.odds==='loaded',pk=(DATA.props||[]).length>0;document.getElementById('health').innerHTML=`<div class="metric"><div class="metric-label">Odds</div><div class="metric-value ${ok?'good':'bad'}">${ok?'Loaded':'Missing'}</div><div class="metric-sub">${safe(h.spreads_found,0)} spreads · ${safe(h.totals_found,0)} totals</div></div><div class="metric"><div class="metric-label">Props</div><div class="metric-value ${pk?'good':'warn'}">${pk?'Loaded':'Queue'}</div><div class="metric-sub">${(DATA.props||[]).length} markets</div></div><div class="metric"><div class="metric-label">Actionable</div><div class="metric-value">${safe(h.actionable_bets,(DATA.best_bets||[]).length)}</div><div class="metric-sub">MED/HIGH only</div></div><div class="metric"><div class="metric-label">Updated</div><div class="metric-value" style="font-size:18px">${fmtTime(h.last_updated_utc||DATA.generated)}</div><div class="metric-sub">GitHub Actions</div></div>`}
function renderGames(){let games=DATA.games||[];if(!games.length){document.getElementById('tab-games').innerHTML='<div class="empty">No games today.</div>';return}document.getElementById('tab-games').innerHTML=`<section class="games-layout"><aside class="sidebar">${games.map((g,i)=>gameCard(g,i)).join('')}</aside><section id="game-detail" class="panel">${gameDetail(games[activeGame])}</section></section>`}function gameCard(g,i){let sp=g.spread||{},tot=g.totals||{},best=(tot.stars||1)>=(sp.stars||1)?tot:sp,tag=tot.line?`${safe(tot.play,'TOTAL')} ${tot.line}`:(sp.play||sp.model_line||'Waiting');return`<article class="game-card ${i===activeGame?'active':''}" onclick="selectGame(${i})"><div class="game-time">${fmtTime(g.tip)}</div><div style="display:flex;justify-content:space-between;gap:10px;margin-top:6px"><div class="team-line">${g.away.abbr} @ ${g.home.abbr}</div><span class="tag">${tag}</span></div><div class="stars">${stars(best.stars||1)}</div></article>`}function selectGame(i){activeGame=i;document.getElementById('game-detail').innerHTML=gameDetail((DATA.games||[])[i]);document.querySelectorAll('.game-card').forEach((el,j)=>el.classList.toggle('active',j===i))}
function gameDetail(g){if(!g)return'';let sp=g.spread||{},tot=g.totals||{},m=g.market||{};return`<div class="game-time">${fmtTime(g.tip)} · Books ${safe(m.books,0)}</div><div class="matchup">${g.away.name} @ ${g.home.name}</div><div class="context"><span class="pill">${g.away.abbr} net ${safe(g.away.net_rtg,0)}</span><span class="pill">${g.home.abbr} net ${safe(g.home.net_rtg,0)}</span></div><div class="pred-grid">${predCard('Spread',sp.conf,sp.play||sp.model_line,sp.posted_line,sp.model_line,sp.edge_abs)}${predCard('Total',tot.conf,tot.line?`${safe(tot.play)} ${tot.line}`:`Model ${safe(tot.pred)}`,tot.line,tot.pred,tot.edge)}</div>`}function predCard(label,conf,main,market,model,edge){return`<article class="pred-card"><div><span class="card-label">${label}</span><span class="conf ${conf||'LOW'}">${conf||'LOW'}</span></div><div class="pred-main">${safe(main)}</div><div class="data-row"><span>Market</span><span>${safe(market,'No line')}</span></div><div class="data-row"><span>Model</span><span>${safe(model)}</span></div><div class="data-row"><span>Edge</span><span class="${edgeClass(edge)}">${edge!==null&&edge!==undefined?money(edge)+' pts':'Waiting'}</span></div></article>`}
function spreadBoard(){return DATA.spread_board||((DATA.games||[]).map(g=>({game:g.away.name+' @ '+g.home.name,tip:g.tip,play:(g.spread||{}).play||(g.spread||{}).model_line,market_line:(g.spread||{}).posted_line,model_line:(g.spread||{}).model_line,edge:(g.spread||{}).edge_abs,conf:(g.spread||{}).conf||'LOW',stars:(g.spread||{}).stars||1,status:((g.spread||{}).stars||1)>=2?'BET':'WATCH'})))}function renderSpreads(){let rows=spreadBoard();document.getElementById('tab-spreads').innerHTML=`<div class="section-title">Spread Board</div><div class="board">${rows.length?rows.map(r=>`<article class="board-row"><div><div class="board-main">${safe(r.play)}</div><div class="board-sub">${safe(r.game)} · ${fmtTime(r.tip)}</div></div><div><div class="board-label">Market</div><div class="board-value">${safe(r.market_line,'No line')}</div></div><div><div class="board-label">Model</div><div class="board-value">${safe(r.model_line)}</div></div><div><div class="board-label">Edge</div><div class="board-value ${edgeClass(r.edge)}">${r.edge!==null&&r.edge!==undefined?money(r.edge):'WAIT'}</div></div><div>${stars(r.stars||1)}</div></article>`).join(''):'<div class="empty">No spread markets yet.</div>'}</div>`}
function gameKeyFromTeams(away,home){return away+' @ '+home}function rowGameKey(p){let team=(p.team||'').toUpperCase(),opp=(p.opp||'').toUpperCase();for(const g of (DATA.games||[])){let a=(g.away.abbr||'').toUpperCase(),h=(g.home.abbr||'').toUpperCase(),an=(g.away.name||'').toUpperCase(),hn=(g.home.name||'').toUpperCase();if((team===a||team===an)&&((opp===h)||opp===hn||opp.includes(hn)||opp.includes(h)))return gameKeyFromTeams(g.away.name,g.home.name);if((team===h||team===hn)&&((opp===a)||opp===an||opp.includes(an)||opp.includes(a)))return gameKeyFromTeams(g.away.name,g.home.name)}return p.game||'UNKNOWN'}
function setPropsGame(k){propsGame=k;renderProps()}function setPropsStat(s){propsStat=s;renderProps()}function rankClass(r){r=Number(r||8);return r<=5?'rank-tough':r<=10?'rank-mid':'rank-easy'}function statClass(p){return p.conf==='HIGH'?'stat-pill high':'stat-pill'}function hitLabel(v,signal){return signal?`${pct(v)} ${signal}`:'—'}function l5Boxes(p){let vals=arr(p.last5_vals).slice(0,5),opps=arr(p.last5_opps).slice(0,5),line=Number(p.line),sig=p.signal;if(!vals.length)return'—';return`<div class="l5-wrap">${vals.map((v,i)=>{let hit=sig==='UNDER'?v<line:v>line;return`<div class="l5-box"><div class="l5-num ${hit?'l5-hit':'l5-miss'}">${v}</div><div class="l5-opp">${safe(opps[i],'')}</div></div>`}).join('')}</div>`}
function renderProps(){let props=(DATA.props||DATA.player_points||DATA.props_board||[]).filter(p=>p.line!==null&&p.line!==undefined&&p.line!=='');let games=DATA.games||[];let gameCards=`<article class="props-game all ${propsGame==='ALL'?'active':''}" onclick="setPropsGame('ALL')"><div class="game-time">ALL</div><div class="team-line">All Players</div></article>`+games.map(g=>{let k=gameKeyFromTeams(g.away.name,g.home.name);return`<article class="props-game ${propsGame===k?'active':''}" onclick="setPropsGame('${k.replace(/'/g,"\\'")}')"><div class="game-time">${fmtTime(g.tip)}</div><div class="team-line">${g.away.abbr} @ ${g.home.abbr}</div><div class="board-sub">${g.away.name} @ ${g.home.name}</div></article>`}).join('');let stats=['ALL','PTS','REB','AST','3PM','PRA'];let filtered=props.map(p=>Object.assign({},p,{_game:rowGameKey(p)})).filter(p=>(propsGame==='ALL'||p._game===propsGame)&&(propsStat==='ALL'||String(p.stat).toUpperCase()===propsStat));filtered.sort((a,b)=>(b.conf==='HIGH')-(a.conf==='HIGH')||(b.conf==='MED')-(a.conf==='MED')||Math.abs(b.edge||0)-Math.abs(a.edge||0));let table=filtered.length?`<div class="props-scroll"><div class="props-table"><div class="props-head"><div>Player</div><div>Stat</div><div>Line</div><div>Over</div><div>Under</div><div>Projected</div><div>Last 5</div><div>L5 Hit</div><div>L10 Hit</div><div>H2H L5</div><div>Opp Rank</div></div>${filtered.map(p=>`<article class="prop-row ${p.conf||'LOW'}"><div><div class="player-name">${safe(p.player)}</div><div class="player-meta">${safe(p.team)} · ${safe(p.pos)} · vs ${safe(p.opp)}</div></div><div><span class="${statClass(p)}">${safe(p.stat)}</span></div><div class="board-value">${safe(p.line)}</div><div class="signal-over">${p.signal==='OVER'?'OVER':'—'}</div><div class="signal-under">${p.signal==='UNDER'?'UNDER':'—'}</div><div class="${p.line?'proj-bright':'proj-dim'}">${safe(p.pred)}</div><div>${l5Boxes(p)}</div><div>${hitLabel(p.last5_hit,p.signal)}</div><div>${hitLabel(p.last10_hit,p.signal)}</div><div>${arr(p.h2h_last5).length?arr(p.h2h_last5).join(', '):'—'}</div><div class="${rankClass(p.opp_rank)}">${safe(p.opp_rank)}</div></article>`).join('')}</div></div>`:'<div class="empty">No props available — PrizePicks lines post closer to tip off</div>';document.getElementById('tab-props').innerHTML=`<div class="section-title">Today\'s Games</div><div class="props-games">${gameCards}</div><div class="section-title">Filters</div><div class="filter-bar">${stats.map(s=>`<button class="filter-btn ${propsStat===s?'active':''}" onclick="setPropsStat('${s}')">${s}</button>`).join('')}</div><div class="section-title">Props Table</div>${table}`}
function betCard(b,i,dim=false){let edge=typeof b.edge==='number'?b.edge:null;return`<article class="board-row" style="opacity:${dim?.65:1};grid-template-columns:42px 85px 1fr 110px"><div class="board-value">${String(i+1).padStart(2,'0')}</div><div><span class="tag">${b.type}</span></div><div><div class="board-main">${safe(b.play)}</div><div class="board-sub">${safe(b.game)}</div></div><div><span class="edge-badge">${edge!==null?money(edge)+' pts':'WAIT'}</span><div>${stars(b.stars||1)}</div></div></article>`}function renderBets(){let bets=DATA.best_bets||[],action=bets.filter(b=>(b.stars||1)>=2);document.getElementById('tab-bets').innerHTML=`<div class="section-title">Actionable Bets</div><div class="board">${action.length?action.map((b,i)=>betCard(b,i)).join(''):'<div class="empty">No actionable MED/HIGH plays yet.</div>'}</div><div class="note">3★ strongest · 2★ actionable · 1★ pass/watch.</div>`}
function renderStats(){let m=DATA.model_stats||{},r=DATA.record||{};let cards=[['Spread',m.spread,[['Algorithm',m.spread&&m.spread.algo],['CV MAE',m.spread&&m.spread.cv_mae+' pts'],['Directional',pct(m.spread&&m.spread.dir_acc)],['Strong ATS',pct(m.spread&&m.spread.strong_ats)]]],['Totals',m.totals,[['Algorithm',m.totals&&m.totals.algo],['CV MAE',m.totals&&m.totals.cv_mae+' pts'],['O/U Acc',pct(m.totals&&m.totals.ou_acc)],['Strong O/U',pct(m.totals&&m.totals.strong_ou)]]],['Props',m.props,[['Algorithm',m.props&&m.props.algo],['CV MAE',m.props&&m.props.cv_mae+' pts'],['Hit Rate',pct(m.props&&m.props.hit_rate)],['Strong HR',pct(m.props&&m.props.strong_hr)]]],['Results',r,[['Overall',r.overall||'0-0'],['Win %',pct(r.win_pct)],['Total Bets',r.total_bets||0]]]];document.getElementById('tab-stats').innerHTML='<section class="stats-grid">'+cards.map(c=>`<article class="stat-card"><div class="stat-title">${c[0]}</div>${c[2].map(row=>`<div class="stat-line"><span>${row[0]}</span><span>${safe(row[1])}</span></div>`).join('')}</article>`).join('')+'</section>'}
</script>
</body>
</html>
