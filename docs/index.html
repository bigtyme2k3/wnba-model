<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#07080f">
  <title>WNBA Betting Model</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #07080f; color: #e2e8f0; height: 100%; }
    body { font-family: 'DM Mono', 'Fira Code', 'Courier New', monospace; }
    button { min-height: 40px; cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0d0f1a; }
    ::-webkit-scrollbar-thumb { background: #1e2235; border-radius: 2px; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    const C = {
      bg:"#07080f", panel:"#0d0f1a", border:"#ffffff0d",
      high:"#00e5a0", med:"#f5c518", low:"#555577",
      over:"#4ade80", under:"#f87171",
      spread:"#60a5fa", total:"#c084fc", prop:"#fb923c",
      text:"#e2e8f0", muted:"#475569", dim:"#1e2235",
    };

    const confColor = c => c==="HIGH"?C.high:c==="MED"?C.med:C.low;
    const typeColor  = t => t==="SPREAD"?C.spread:t==="TOTAL"?C.total:C.prop;
    const signalColor= s => s==="OVER"?C.over:C.under;

    function Stars({n, size=11}) {
      const c = n===3?C.high:n===2?C.med:C.low;
      return <span>{[1,2,3].map(i=><span key={i} style={{color:i<=n?c:"#222",fontSize:size}}>★</span>)}</span>;
    }

    function Badge({label, color}) {
      return <span style={{background:color+"18",color,border:`1px solid ${color}44`,
        borderRadius:4,padding:"2px 8px",fontSize:10,fontWeight:700,letterSpacing:0.8}}>{label}</span>;
    }

    function Flag({label}) { return <Badge label={label} color="#f87171"/>; }

    function Loader() {
      return <div style={{display:"flex",flexDirection:"column",alignItems:"center",
        justifyContent:"center",height:"100vh",gap:16}}>
        <div style={{width:40,height:40,border:`3px solid ${C.dim}`,
          borderTop:`3px solid ${C.high}`,borderRadius:"50%",
          animation:"spin 1s linear infinite"}}/>
        <div style={{color:C.muted,fontSize:12,letterSpacing:2}}>LOADING PREDICTIONS...</div>
      </div>;
    }

    function NoGames() {
      return <div style={{textAlign:"center",padding:60,color:C.muted}}>
        <div style={{fontSize:40,marginBottom:16}}>🏀</div>
        <div style={{fontSize:16,color:C.text,marginBottom:8}}>No games today</div>
        <div style={{fontSize:12}}>Check back tomorrow or trigger the pipeline manually.</div>
      </div>;
    }

    function GameCard({g, active, onClick}) {
      const tot = g.totals;
      const cc  = confColor(tot.conf || "LOW");
      return <div onClick={onClick} style={{background:active?C.dim:"transparent",
        border:`1px solid ${active?C.spread+"44":C.border}`,
        borderRadius:10,padding:"12px 14px",cursor:"pointer",
        transition:"all 0.15s",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:1,marginBottom:3}}>{g.tip}</div>
            <div style={{fontSize:14,fontWeight:700,color:C.text}}>
              <span>{g.away.abbr}</span>
              <span style={{color:"#222",margin:"0 6px",fontWeight:300}}>@</span>
              <span>{g.home.abbr}</span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            {tot.line && <div style={{background:cc+"18",color:cc,border:`1px solid ${cc}33`,
              borderRadius:5,padding:"3px 9px",fontSize:11,fontWeight:700}}>
              {tot.play} {tot.line}
            </div>}
            <div style={{marginTop:4}}><Stars n={tot.stars||1}/></div>
          </div>
        </div>
        {(g.flags||[]).length>0 && <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
          {g.flags.map(f=><Flag key={f} label={f}/>)}
        </div>}
      </div>;
    }

    function GameDetail({g}) {
      const {spread, totals, props=[]} = g;
      return <div style={{animation:"fadeIn 0.18s ease"}}>
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
            <span style={{color:C.muted,fontSize:12}}>{g.tip}</span>
            {(g.flags||[]).map(f=><Flag key={f} label={f}/>)}
          </div>
          <div style={{fontSize:22,fontWeight:800,color:C.text,letterSpacing:-0.5}}>
            {g.away.name}
            <span style={{color:"#1e2235",fontWeight:200,margin:"0 10px"}}>@</span>
            {g.home.name}
          </div>
          <div style={{display:"flex",gap:16,marginTop:6}}>
            {[g.away,g.home].map((t,i)=><span key={i} style={{fontSize:12,color:C.muted}}>
              {t.abbr} <span style={{color:t.net_rtg>=0?C.high:C.under}}>
                {t.net_rtg>=0?"+":""}{t.net_rtg} net
              </span>
            </span>)}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          {[
            {label:"SPREAD",conf:spread.conf||"LOW",
             main:spread.model_line||"No line",
             sub:`${spread.posted_line?`Posted: ${spread.posted_line}`:"No posted line"}`,
             sub2:spread.edge?`Edge: ${spread.edge>0?"+":""}${spread.edge} pts`:"—"},
            {label:"TOTAL",conf:totals.conf||"LOW",
             main:totals.line?`${totals.play} ${totals.line}`:`Model: ${totals.pred}`,
             sub:totals.line?`Model: ${totals.pred}`:"No line",
             sub2:totals.edge?`Edge: ${totals.edge>0?"+":""}${totals.edge} pts`:"—"},
          ].map(({label,conf,main,sub,sub2})=>{
            const cc=confColor(conf);
            return <div key={label} style={{background:C.panel,border:`1px solid ${cc}2a`,
              borderRadius:10,padding:"14px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:9,color:C.muted,letterSpacing:1.5,fontWeight:700}}>{label}</span>
                <Badge label={conf} color={cc}/>
              </div>
              <div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:5}}>{main}</div>
              <div style={{fontSize:11,color:C.muted}}>{sub}</div>
              <div style={{fontSize:11,color:label==="TOTAL"&&totals.edge?cc:C.muted,marginTop:2}}>{sub2}</div>
            </div>;
          })}
        </div>

        {props.length>0 && <div>
          <div style={{fontSize:9,color:C.muted,letterSpacing:1.5,fontWeight:700,marginBottom:10}}>PLAYER PROPS</div>
          {props.map((p,pi)=><div key={pi} style={{background:C.panel,
            border:`1px solid ${C.border}`,borderRadius:9,padding:"12px 14px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <div>
                <span style={{fontWeight:700,color:C.text,fontSize:14}}>{p.player}</span>
                <span style={{color:C.muted,fontSize:11,marginLeft:8}}>{p.pos} · {p.proj_min}min</span>
                {p.b2b&&<span style={{marginLeft:8}}><Flag label="B2B"/></span>}
              </div>
              <span style={{fontSize:11,color:C.muted}}>{p.opp}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
              {["pts","reb","ast","threes","pra"].map(prop=>{
                const d=(p.props||{})[prop]||{};
                const hs=!!d.signal;
                const sc=d.signal?signalColor(d.signal):C.muted;
                return <div key={prop} style={{background:hs?sc+"12":"#ffffff05",
                  border:`1px solid ${hs?sc+"44":"#ffffff08"}`,
                  borderRadius:7,padding:"8px 6px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:C.muted,letterSpacing:1,marginBottom:4}}>{prop.toUpperCase()}</div>
                  <div style={{fontSize:14,fontWeight:700,color:hs?sc:C.text}}>{d.pred||"—"}</div>
                  {d.line&&<div style={{fontSize:10,color:C.muted,marginTop:2}}>{d.line}</div>}
                  {d.signal&&<div style={{fontSize:9,fontWeight:800,color:sc,marginTop:3}}>
                    {d.signal} {d.edge>0?"+":""}{d.edge}
                  </div>}
                </div>;
              })}
            </div>
          </div>)}
        </div>}
      </div>;
    }

    function BestBets({bets}) {
      return <div>
        <div style={{fontSize:9,color:C.muted,letterSpacing:1.5,fontWeight:700,marginBottom:14}}>
          TODAY'S PLAYS — RANKED BY CONFIDENCE
        </div>
        {bets.length===0 && <div style={{color:C.muted,fontSize:13,padding:20,textAlign:"center"}}>
          No strong plays today. Model edge below threshold on all games.
        </div>}
        {bets.map((b,i)=>{
          const c=confColor(b.conf);
          const edge=typeof b.edge==="number"?b.edge:0;
          return <div key={i} style={{background:C.panel,border:`1px solid ${c}22`,
            borderRadius:10,padding:"14px 18px",marginBottom:9,
            display:"grid",gridTemplateColumns:"36px 80px 1fr 110px",
            gap:14,alignItems:"center",animation:`fadeIn ${0.08+i*0.04}s ease both`}}>
            <div style={{fontSize:24,fontWeight:800,color:"#1a1f30"}}>
              {String(i+1).padStart(2,"0")}
            </div>
            <div>
              <Badge label={b.type} color={typeColor(b.type)}/>
              <div style={{fontSize:10,color:C.muted,marginTop:5}}>{b.tip}</div>
            </div>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:4}}>{b.play}</div>
              <div style={{fontSize:11,color:C.muted}}>{b.game}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{background:c+"18",color:c,border:`1px solid ${c}44`,
                borderRadius:6,padding:"4px 10px",fontSize:13,fontWeight:800,
                marginBottom:6,display:"inline-block"}}>
                {edge>0?"+":""}{edge} pts
              </div>
              <div><Stars n={b.stars||1} size={12}/></div>
            </div>
          </div>;
        })}
        <div style={{marginTop:16,padding:"13px 16px",background:C.panel,
          border:`1px solid ${C.border}`,borderRadius:9,fontSize:11,color:C.muted,lineHeight:1.8}}>
          <span style={{color:C.med,fontWeight:700}}>Sizing: </span>
          3★ = 2u · 2★ = 1u · 1★ = pass. Break-even at −110: 52.4%.
        </div>
      </div>;
    }

    function ModelStats({stats}) {
      const cards = [
        {label:"SPREAD", color:C.spread, rows:[
          ["Algorithm", stats.spread.algo],
          ["CV MAE",    `${stats.spread.cv_mae} pts`],
          ["Directional", `${(stats.spread.dir_acc*100).toFixed(1)}%`],
          ["Strong ATS", `${(stats.spread.strong_ats*100).toFixed(1)}%`],
        ]},
        {label:"TOTALS", color:C.total, rows:[
          ["Algorithm", stats.totals.algo],
          ["CV MAE",    `${stats.totals.cv_mae} pts`],
          ["O/U Acc",  `${(stats.totals.ou_acc*100).toFixed(1)}%`],
          ["Strong O/U",`${(stats.totals.strong_ou*100).toFixed(1)}%`],
        ]},
        {label:"PROPS", color:C.prop, rows:[
          ["Algorithm", stats.props.algo],
          ["CV MAE",    `${stats.props.cv_mae} pts`],
          ["Hit Rate",  `${(stats.props.hit_rate*100).toFixed(1)}%`],
          ["Strong HR", `${(stats.props.strong_hr*100).toFixed(1)}%`],
        ]},
      ];
      return <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {cards.map(card=><div key={card.label} style={{background:C.panel,
            border:`1px solid ${card.color}22`,borderRadius:10,padding:16}}>
            <div style={{fontSize:9,color:card.color,letterSpacing:1.8,fontWeight:700,marginBottom:12}}>
              {card.label} MODEL
            </div>
            {card.rows.map(([k,v])=><div key={k} style={{display:"flex",justifyContent:"space-between",
              padding:"7px 0",borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:10,color:C.muted}}>{k}</span>
              <span style={{fontSize:11,color:C.text,fontWeight:500}}>{v}</span>
            </div>)}
          </div>)}
        </div>
      </div>;
    }

    function App() {
      const [data, setData]           = useState(null);
      const [loading, setLoading]     = useState(true);
      const [error, setError]         = useState(null);
      const [activeGame, setActiveGame] = useState(0);
      const [tab, setTab]             = useState("games");

      useEffect(()=>{
        // Load today's predictions JSON from the predictions folder
        const today = new Date().toISOString().split("T")[0];
        const urls  = [
          `predictions/predictions_${today}.json`,
          // fallback to most recent
          `predictions/predictions_2026-07-01.json`,
          `predictions/predictions_2026-06-30.json`,
        ];

        async function tryLoad() {
          for (const url of urls) {
            try {
              const resp = await fetch(url);
              if (resp.ok) {
                const json = await resp.json();
                setData(json);
                setLoading(false);
                return;
              }
            } catch(e) {}
          }
          setError("No prediction data found. Run the daily pipeline to generate predictions.");
          setLoading(false);
        }
        tryLoad();
      }, []);

      if (loading) return <Loader/>;
      if (error)   return <div style={{color:C.muted,padding:40,textAlign:"center",fontSize:13}}>{error}</div>;
      if (!data)   return <Loader/>;

      const {games=[], best_bets=[], model_stats, date:reportDate} = data;
      const highBets = best_bets.filter(b=>b.stars===3).length;

      return <div style={{minHeight:"100vh",background:C.bg,color:C.text,
        fontFamily:"'DM Mono','Fira Code',monospace"}}>

        {/* Header */}
        <div style={{background:"#0a0b15",borderBottom:`1px solid ${C.border}`,
          padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,color:C.spread,letterSpacing:2.5,fontWeight:500,marginBottom:3}}>
              WNBA BETTING MODEL
            </div>
            <div style={{fontSize:18,fontWeight:700,letterSpacing:-0.5}}>Daily Report</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:6}}>
              {reportDate ? new Date(reportDate+"T12:00:00").toLocaleDateString("en-US",
                {weekday:"short",month:"short",day:"numeric",year:"numeric"}) : ""}
            </div>
            <span style={{display:"flex",alignItems:"center",gap:5,background:C.high+"12",
              color:C.high,border:`1px solid ${C.high}30`,borderRadius:20,
              padding:"3px 12px",fontSize:10,fontWeight:700,justifyContent:"flex-end"}}>
              <span style={{width:5,height:5,borderRadius:"50%",background:C.high,
                animation:"blink 2s infinite",display:"inline-block"}}/>
              {games.length} GAMES · {highBets} HIGH
            </span>
          </div>
        </div>

        {/* Stats ribbon */}
        {model_stats && <div style={{background:"#0a0b15",borderBottom:`1px solid ${C.border}`,
          padding:"10px 20px",display:"flex",gap:0,overflowX:"auto"}}>
          {[{l:"SPREAD",c:C.spread,v:`MAE ${model_stats.spread.cv_mae}`,v2:`${(model_stats.spread.dir_acc*100).toFixed(0)}% dir`},
            {l:"TOTALS",c:C.total, v:`MAE ${model_stats.totals.cv_mae}`,v2:`${(model_stats.totals.ou_acc*100).toFixed(0)}% O/U`},
            {l:"PROPS", c:C.prop,  v:`MAE ${model_stats.props.cv_mae}`, v2:`${(model_stats.props.hit_rate*100).toFixed(0)}% hit`},
          ].map((m,i)=><div key={i} style={{paddingRight:24,borderRight:i<2?`1px solid ${C.border}`:"none",marginRight:i<2?24:0}}>
            <div style={{fontSize:9,color:m.c,letterSpacing:1.8,fontWeight:700,marginBottom:3}}>{m.l}</div>
            <div style={{display:"flex",gap:12}}>
              <span style={{fontSize:11,color:"#94a3b8"}}>{m.v}</span>
              <span style={{fontSize:11,color:"#94a3b8"}}>{m.v2}</span>
            </div>
          </div>)}
        </div>}

        {/* Nav */}
        <div style={{borderBottom:`1px solid ${C.border}`,padding:"0 20px",display:"flex"}}>
          {[["games","Tonight"],["bets","Best Bets"],["stats","Model Stats"]].map(([id,label])=>
            <button key={id} onClick={()=>setTab(id)} style={{background:"none",border:"none",
              padding:"11px 14px",fontSize:10,letterSpacing:1.2,fontWeight:700,
              color:tab===id?C.spread:C.muted,
              borderBottom:`2px solid ${tab===id?C.spread:"transparent"}`,
              transition:"all 0.12s"}}>{label.toUpperCase()}</button>
          )}
        </div>

        {/* Content */}
        <div style={{padding:"16px 20px",maxWidth:900,margin:"0 auto"}}>
          {tab==="games" && (games.length===0 ? <NoGames/> :
            <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16}}>
              <div>
                <div style={{fontSize:9,color:C.muted,letterSpacing:1.5,fontWeight:700,marginBottom:10}}>
                  SELECT GAME
                </div>
                {games.map((g,i)=><GameCard key={i} g={g} active={activeGame===i}
                  onClick={()=>setActiveGame(i)}/>)}
              </div>
              <div>{games[activeGame]&&<GameDetail g={games[activeGame]}/>}</div>
            </div>
          )}
          {tab==="bets"  && <BestBets bets={best_bets}/>}
          {tab==="stats" && model_stats && <ModelStats stats={model_stats}/>}
        </div>
      </div>;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
