    filtered.sort((a,b)=>(b.conf==='HIGH')-(a.conf==='HIGH')||(b.conf==='MED')-(a.conf==='MED')||Math.abs(b.edge||0)-Math.abs(a.edge||0));
    let table=filtered.length?`<div class="props-scroll"><div class="props-table"><div class="props-head"><div>Player</div><div>Stat</div><div>Line</div><div>Over</div><div>Under</div><div>Projected</div><div>Last 5</div><div>L5 Hit</div><div>L10 Hit</div><div>H2H L5</div><div>Opp Rank</div></div>${filtered.map(p=>`<article class="prop-row ${p.conf||'LOW'}"><div><div class="player-name">${safe(p.player)}</div><div class="player-meta">${safe(p.best_book_title||p.best_book,'Best book —')} · ${safe(p.injury_status,'ACTIVE')} · ${safe(p.opp)}</div></div><div><span class="${statClass(p)}">${safe(p.stat)}</span></div><div class="board-value">${safe(p.best_line,p.line)} @ ${safe(p.best_odds,p.odds)}</div><div class="signal-over">${p.signal==='OVER'?'OVER':'—'}</div><div class="signal-under">${p.signal==='UNDER'?'UNDER':'—'}</div><div class="${p.line?'proj-bright':'proj-dim'}">${safe(p.pred)}</div><div>${l5Boxes(p)}</div><div>${hitLabel(p.last5_hit,p.signal)}</div><div>${hitLabel(p.last10_hit,p.signal)}</div><div>${arr(p.h2h_last5).length?arr(p.h2h_last5).join(', '):'—'}</div><div class="${rankClass(p.opp_rank)}">${safe(p.opp_rank)}</div></article>`).join('')}</div></div>`:`<div class="empty">No props for this selected game/stat filter. Try ALL or another stat.</div>`;

  };

  window.renderBets=function(){
    const safe=(v,d='—')=>v===null||v===undefined||v===''?d:v;
    const bets=(DATA.best_bets||[]);
    const rows=bets.length?bets.map((b,i)=>`<article class="board-row" style="grid-template-columns:42px 85px 1fr 150px 110px"><div class="board-value">${String(i+1).padStart(2,'0')}</div><div><span class="tag">${safe(b.type)}</span></div><div><div class="board-main">${safe(b.play)}</div><div class="board-sub">${safe(b.game)} · Grade ${safe(b.grade)} · EV ${safe(b.ev_pct)}%</div></div><div><div class="board-label">Best Book</div><div class="board-value">${safe(b.best_book_title||b.best_book)}</div><div class="board-sub">${safe(b.available_books,0)} books</div></div><div><span class="edge-badge">${safe(b.best_line,b.market_line)} @ ${safe(b.best_odds,b.odds)}</span><div class="board-sub">Kelly ${safe(b.units,0)}u</div></div></article>`).join(''):'<div class="empty">No actionable MED/HIGH plays yet.</div>';
    const shop=(DATA.line_shopping||[]).slice(0,12).map(s=>`<article class="board-row" style="grid-template-columns:90px 1fr 120px 100px"><div><span class="tag">${safe(s.market_type)}</span></div><div><div class="board-main">${safe(s.player)||safe(s.side)} ${safe(s.stat,'')}</div><div class="board-sub">${safe(s.game)}</div></div><div><div class="board-label">Best</div><div class="board-value">${safe(s.book_title||s.book_key)}</div></div><div><div class="board-label">Line</div><div class="board-value">${safe(s.line)} @ ${safe(s.odds)}</div></div></article>`).join('')||'<div class="note">Line shopping appears after The Odds API returns per-book lines.</div>';
    document.getElementById('tab-bets').innerHTML=`<div class="section-title">Best Bets + Best Sportsbook</div><div class="board">${rows}</div><div class="section-title">Line Shopping Snapshot</div><div class="board">${shop}</div>`;
  };

  window.renderStats=function(){
    const t=DATA.tracking||DATA.model_tracking||{};
    const byType=t.by_type||{}, byConf=t.by_conf||{};
    const fmtPct=v=>typeof v==='number'?Math.round(v*1000)/10+'%':'—';
    const safe=(v,d='—')=>v===null||v===undefined||v===''?d:v;
    const statCard=(title,rows)=>`<article class="stat-card"><div class="stat-title">${title}</div>${rows.map(r=>`<div class="stat-line"><span>${r[0]}</span><span>${safe(r[1])}</span></div>`).join('')}</article>`;
    const typeRows=Object.keys(byType).length?Object.entries(byType).map(([k,v])=>`<article class="board-row"><div><div class="board-main">${k}</div><div class="board-sub">${v.bets||0} tracked bets</div></div><div><div class="board-label">Record</div><div class="board-value">${safe(v.record)}</div></div><div><div class="board-label">Win %</div><div class="board-value">${fmtPct(v.win_pct)}</div></div><div></div><div></div></article>`).join(''):'<div class="empty">No graded bets yet. Tracking starts once games finish.</div>';
    const confRows=Object.keys(byConf).length?Object.entries(byConf).map(([k,v])=>`<article class="board-row"><div><div class="board-main">${k}</div><div class="board-sub">Confidence bucket</div></div><div><div class="board-label">Record</div><div class="board-value">${safe(v.record)}</div></div><div><div class="board-label">Win %</div><div class="board-value">${fmtPct(v.win_pct)}</div></div><div></div><div></div></article>`).join(''):'<div class="note">Confidence tracking appears after bets are graded.</div>';
    const recent=(t.recent_10||[]).slice(-10).map(b=>`<article class="board-row"><div><div class="board-main">${safe(b.play)}</div><div class="board-sub">${safe(b.date)} · ${safe(b.game)}</div></div><div><div class="board-label">Type</div><div class="board-value">${safe(b.type)}</div></div><div><div class="board-label">Result</div><div class="board-value ${b.result==='WIN'?'good':b.result==='LOSS'?'bad':'warn'}">${safe(b.result)}</div></div><div><div class="board-label">Units</div><div class="board-value">${safe(b.profit_units)}</div></div><div></div></article>`).join('')||'<div class="empty">No recent graded bets yet.</div>';
    document.getElementById('tab-stats').innerHTML=`<div class="section-title">Model Tracking</div><section class="stats-grid">${statCard('Overall',[['Record',t.overall||'0-0-0'],['Win %',fmtPct(t.win_pct)],['ROI',fmtPct(t.roi)],['Units',safe(t.profit_units,0)],['Avg CLV',safe(t.clv_avg,0)]])}${statCard('Automation',[['Odds',safe((DATA.data_health||{}).odds)],['Props',safe((DATA.data_health||{}).props)],['Line Shop',safe((DATA.data_health||{}).line_shopping)],['Games',safe((DATA.data_health||{}).games,0)],['Best Bets',(DATA.best_bets||[]).length]])}${statCard('EV Engine',[['A/B Bets',(DATA.best_bets||[]).filter(b=>['A','B'].includes(b.grade)).length],['Top EV',(DATA.best_bets||[])[0]?.ev_pct?((DATA.best_bets||[])[0].ev_pct+'%'):'—'],['Top Grade',(DATA.best_bets||[])[0]?.grade||'—'],['Kelly Units',(DATA.best_bets||[])[0]?.units||'—']])}${statCard('Model Counts',[['Spreads',(DATA.data_health||{}).spreads_found||0],['Totals',(DATA.data_health||{}).totals_found||0],['Props',(DATA.data_health||{}).props_found||0],['Line Rows',(DATA.data_health||{}).line_shopping_rows||0],['High Bets',(DATA.data_health||{}).high_bets||0]])}</section><div class="section-title">Performance by Market</div><div class="board">${typeRows}</div><div class="section-title">Confidence Breakdown</div><div class="board">${confRows}</div><div class="section-title">Recent Graded Bets</div><div class="board">${recent}</div>`;
  };
})();
</script>


<script id="model-tracking-ui-v2">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function pct(v){return typeof v==='number'?Math.round(v*1000)/10+'%':'—'}
  function rows(obj, limit=12){return Object.entries(obj||{}).slice(0,limit)}
  function card(title, items){return `<article class="stat-card track-card"><div class="stat-title">${title}</div>${items.map(([k,v])=>`<div class="stat-line"><span>${k}</span><span>${safe(v)}</span></div>`).join('')}</article>`}

  }
  function health(h){

    return card('Model Health', items);
  }
  window.renderStats=function(){
    const t=DATA.model_tracking||DATA.tracking||{};
    const recent=(t.recent_10||[]).slice(-10).reverse().map(b=>`<article class="track-row recent"><div><div class="board-main">${safe(b.play||b.player||b.game)}</div><div class="board-sub">${safe(b.date||b.game_date)} · ${safe(b.game)} · ${safe(b.stat||b.type)}</div></div><div><div class="board-label">Result</div><div class="board-value ${b.result==='WIN'?'good':b.result==='LOSS'?'bad':'warn'}">${safe(b.result)}</div></div><div><div class="board-label">Book</div><div class="board-value">${safe(b.best_book||b.book)}</div></div><div><div class="board-label">EV</div><div class="board-value">${safe(b.ev_pct)}%</div></div><div><div class="board-label">CLV</div><div class="board-value">${safe(b.clv,0)}</div></div><div></div></article>`).join('')||'<div class="empty">No recent graded bets yet.</div>';
    const html=`
      <div class="section-title">Model Tracking</div>
      <section class="stats-grid tracking-grid">
        ${card('Overall',[['Record',t.overall||'0-0-0'],['Bets',safe(t.bets,0)],['Win %',pct(t.win_pct)],['ROI',pct(t.roi)],['Units',safe(t.profit_units,0)],['Avg CLV',safe(t.clv_avg,0)]])}
        ${card('Edge Quality',[['Avg EV',safe(t.avg_ev,0)+'%'],['Avg Edge',safe(t.avg_edge,0)],['CLV',safe(t.clv_avg,0)],['Last Update',safe((t.last_updated_utc||'').slice(0,16))]])}
        ${health(t.model_health||{})}
        ${card('Today Data',[['Games',(DATA.games||[]).length],['Best Bets',(DATA.best_bets||[]).length],['Props',(DATA.props||[]).length],['Line Rows',(DATA.line_shopping||[]).length]])}
      </section>
      ${table('Performance by Market',t.by_type,'No graded markets yet.')}
      ${table('Performance by Prop Type',t.by_stat,'No graded prop-type data yet.')}
      ${table('Confidence / Grade Performance',Object.assign({},t.by_conf||{},t.by_grade||{}),'No graded confidence data yet.')}
      ${table('Sportsbook Comparison',t.by_book,'No sportsbook tracking yet.')}
      ${table('Player Performance',t.by_player,'No player-level tracking yet.')}
      ${table('Team Performance',t.by_team,'No team-level tracking yet.')}
      <div class="section-title">Recent Graded Bets</div><div class="tracking-table">${recent}</div>`;
    const el=document.getElementById('tab-stats');if(el)el.innerHTML=html;
  };
})();
</script>


<script id="props-ui-fix">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function fmt(v){try{return fmtTime(v)}catch(e){return v||'—'}}
  function state(name, fallback){return Object.prototype.hasOwnProperty.call(window,name)?window[name]:fallback}
  function key(g){return g.away.name+' @ '+g.home.name}
  function rowGame(p){
    if(p.game && String(p.game).includes(' @ ')) return String(p.game).trim();
    let raw=[p.game,p.opp,p.team,p.home_team,p.away_team].map(x=>String(x||'')).join(' ').toUpperCase().replace(/[^A-Z0-9]/g,'');
    for(let g of (DATA.games||[])){let vals=[g.away.name,g.home.name,g.away.abbr,g.home.abbr].map(x=>String(x||'').toUpperCase().replace(/[^A-Z0-9]/g,'')); if((raw.includes(vals[0])||raw.includes(vals[2]))&&(raw.includes(vals[1])||raw.includes(vals[3]))) return key(g)}
    return p.game||p.opp||'UNKNOWN';
  }
  function pct(x){return typeof x==='number'?Math.round(x*100)+'%':'—'}
  function num(x,d=0){let n=Number(x);return isNaN(n)?d:n}
  function arr(v){if(Array.isArray(v))return v;if(!v)return[];try{let x=JSON.parse(v);return Array.isArray(x)?x:[]}catch(e){return[]}}
  function boxes(p){let vals=arr(p.last5_vals).slice(0,5),opps=arr(p.last5_opps).slice(0,5),line=Number(p.line),sig=p.signal;if(!vals.length)return'—';return '<div class="l5-wrap betsy">'+vals.map((v,i)=>{let hit=sig?(sig==='UNDER'?v<line:sig==='OVER'?v>line:sig==='YES'?v==1:v==0):null,cls=hit===null?'l5-neutral':hit?'l5-hit':'l5-miss';return `<div class="l5-box"><div class="l5-num ${cls}">${v}</div><div class="l5-opp">${safe(opps[i],'')}</div></div>`}).join('')+'</div>'}
  function rank(r){r=Number(r||8);return r<=5?'rank-tough':r<=10?'rank-mid':'rank-easy'}
  function statLine(p){return p.stat==='DD'||p.stat==='TD'?'YES':safe(p.best_line,p.line)}
  function projected(p){return p.stat==='DD'||p.stat==='TD'?Math.round((p.pred||0)*100)+'%':safe(p.pred)}
  function showOver(p){if(p.stat==='DD'||p.stat==='TD') return p.signal==='YES'?`YES ${safe(p.yes_price||p.best_odds||p.odds,'')}`:safe(p.yes_price,'—');let val=safe(p.over_price || (p.signal==='OVER'?p.best_odds:null),'—');return p.signal==='OVER'?`OVER ${val}`:val}
  function showUnder(p){if(p.stat==='DD'||p.stat==='TD') return p.signal==='NO'?`NO ${safe(p.no_price||p.best_odds||p.odds,'')}`:safe(p.no_price,'—');let val=safe(p.under_price || (p.signal==='UNDER'?p.best_odds:null),'—');return p.signal==='UNDER'?`UNDER ${val}`:val}
  function evCell(p){let ev=num(p.ev_pct,null);let sc=safe(p.score,'—');let grade=safe(p.grade||p.score_label,'—');return `<div class="ev-box ${ev!==null&&ev>0?'pos':'neg'}"><span>${ev===null?'—':ev+'%'}</span><small>${grade} · ${sc}</small></div>`}
  function sortRows(rows, sortKey){
    if(sortKey==='EV') rows=rows.sort((a,b)=>num(b.ev_pct)-num(a.ev_pct));
    else if(sortKey==='OVER') rows=rows.filter(p=>p.signal==='OVER'||p.signal==='YES').sort((a,b)=>num(b.ev)-num(a.ev));
    else if(sortKey==='UNDER') rows=rows.filter(p=>p.signal==='UNDER'||p.signal==='NO').sort((a,b)=>num(b.ev)-num(a.ev));
    else if(sortKey==='PROJECTED') rows=rows.sort((a,b)=>num(b.pred)-num(a.pred));
    else if(sortKey==='L5') rows=rows.sort((a,b)=>num(b.last5_hit)-num(a.last5_hit));
    else rows=rows.sort((a,b)=>num(b.score)-num(a.score)||(b.conf==='HIGH')-(a.conf==='HIGH')||(b.conf==='MED')-(a.conf==='MED')||Math.abs(b.edge||0)-Math.abs(a.edge||0));
    return rows;
  }
  function draw(){
    let curGame=state('propsGame','ALL'),curStat=state('propsStat','ALL'),curSort=state('propsSort','EDGE');
    let props=(DATA.props||DATA.player_points||DATA.props_board||[]).filter(p=>p.line!==null&&p.line!==undefined&&p.line!==''&&p.market_status!=='NO MARKET'&&p.injury_status!=='OUT'&&p.injury_status!=='DOUBTFUL');
    let cards='<article class="props-game all '+(curGame==='ALL'?'active':'')+'" onclick="setPropsGame('ALL')"><div class="game-time">ALL</div><div class="team-line">All Players</div></article>'+(DATA.games||[]).map(g=>{let k=key(g);return `<article class="props-game ${curGame===k?'active':''}" onclick="setPropsGame('${k.replace(/'/g,"\'")}')"><div class="game-time">${fmt(g.tip)}</div><div class="team-line">${g.away.abbr} @ ${g.home.abbr}</div><div class="board-sub">${k}</div></article>`}).join('');
    let stats=['ALL','PTS','REB','AST','3PM','PRA','PA','PR','RA','DD','TD'];let labels={PA:'PTS+AST',PR:'PTS+REB',RA:'REB+AST',DD:'2X2',TD:'3X2'};
    let filters=stats.map(s=>`<button class="filter-btn ${curStat===s?'active':''}" onclick="setPropsStat('${s}')">${labels[s]||s}</button>`).join('');
    let sorts=[['EDGE','Best Score'],['EV','EV %'],['OVER','Over'],['UNDER','Under'],['PROJECTED','Projected'],['L5','Last 5 Hit']];
    let sortbar=sorts.map(([k,l])=>`<button class="filter-btn sort-btn ${curSort===k?'active':''}" onclick="setPropsSort('${k}')">${l}</button>`).join('');
    let rows=props.map(p=>Object.assign({},p,{_game:rowGame(p)})).filter(p=>(curGame==='ALL'||p._game===curGame)&&(curStat==='ALL'||String(p.stat).toUpperCase()===curStat));rows=sortRows(rows,curSort);
    let table=rows.length?`<div class="props-scroll"><div class="props-table props-table-v2"><div class="props-head"><div>Player</div><div>Stat</div><div>Line</div><div>Over / Yes</div><div>Under / No</div><div>Projected</div><div>EV</div><div>Last 5</div><div>L5 Hit</div><div>L10 Hit</div><div>Fair</div></div>${rows.map(p=>`<article class="prop-row ${p.conf||'LOW'}"><div><div class="player-name">${safe(p.player)}</div><div class="player-meta">${safe(p.best_book_title||p.best_book,'Best book —')} · ${safe(p.injury_status,'ACTIVE')} · ${safe(p._game)}</div></div><div><span class="stat-pill ${p.conf==='HIGH'?'high':''}">${safe(p.stat)}</span></div><div class="board-value">${statLine(p)}</div><div class="signal-over">${showOver(p)}</div><div class="signal-under">${showUnder(p)}</div><div class="${p.line?'proj-bright':'proj-dim'}">${projected(p)}</div><div>${evCell(p)}</div><div>${boxes(p)}</div><div class="hit-cell ${p.signal==='OVER'||p.signal==='YES'?'signal-over':p.signal==='UNDER'||p.signal==='NO'?'signal-under':''}"><span class="hit-pct">${p.signal?pct(p.last5_hit):'—'}</span><span class="hit-sig">${p.signal||''}</span></div><div class="hit-cell ${p.signal==='OVER'||p.signal==='YES'?'signal-over':p.signal==='UNDER'||p.signal==='NO'?'signal-under':''}"><span class="hit-pct">${p.signal?pct(p.last10_hit):'—'}</span><span class="hit-sig">${p.signal||''}</span></div><div><span class="fair-odds">${safe(p.fair_odds)}</span><small class="prob">${safe(p.model_prob_pct)}%</small></div></article>`).join('')}</div></div>`:'<div class="empty">No sportsbook props for this selected game/stat filter. Try ALL or another stat.</div>';
    let el=document.getElementById('tab-props');if(el)el.innerHTML=`<div class="section-title">Today's Games</div><div class="props-games">${cards}</div><div class="section-title">Filters</div><div class="filter-bar">${filters}</div><div class="section-title sort-title">Sort Props</div><div class="filter-bar props-sort-bar">${sortbar}</div><div class="section-title">Props Table</div>${table}`;
  }
  window.setPropsGame=function(k){window.propsGame=k;draw()};window.setPropsStat=function(s){window.propsStat=s;draw()};window.setPropsSort=function(s){window.propsSort=s;draw()};window.renderProps=draw;try{renderProps=draw;setPropsGame=window.setPropsGame;setPropsStat=window.setPropsStat}catch(e){}
  const oldSwitch=window.switchTab;window.switchTab=function(name,btn){if(typeof oldSwitch==='function') oldSwitch(name,btn);if(name==='props') setTimeout(draw,0)};setTimeout(function(){const el=document.getElementById('tab-props');if(el&&el.classList&&el.classList.contains('active')) draw()},0);
})();
</script>
