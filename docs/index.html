<script id="props-ui-fix">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function fmt(v){try{return fmtTime(v)}catch(e){return v||'—'}}
  function state(name, fallback){return Object.prototype.hasOwnProperty.call(window,name)?window[name]:fallback}
  function key(g){return g.away.name+' @ '+g.home.name}
  function rowGame(p){
    if(p.game && String(p.game).includes(' @ ')) return String(p.game).trim();
    let raw=[p.game,p.opp,p.team,p.home_team,p.away_team].map(x=>String(x||'')).join(' ').toUpperCase().replace(/[^A-Z0-9]/g,'');
    for(let g of (DATA.games||[])){let vals=[g.away.name,g.home.name,g.away.abbr,g.home.abbr].map(x=>String(x||'').toUpperCase().replace(/[^A-Z0-9]/g,'')); if((raw.includes(vals[0])||raw.includes(vals[2]))&&(raw.includes(vals[1])||raw.includes(vals[3]))) return key(g)}
    return p.game||p.opp||'UNKNOWN';
  }
  function pct(x){return typeof x==='number'?Math.round(x*100)+'%':'—'}
  function num(x,d=0){let n=Number(x);return isNaN(n)?d:n}
  function arr(v){if(Array.isArray(v))return v;if(!v)return[];try{let x=JSON.parse(v);return Array.isArray(x)?x:[]}catch(e){return[]}}
  function boxes(p){let vals=arr(p.last5_vals).slice(0,5),opps=arr(p.last5_opps).slice(0,5),line=Number(p.line),sig=p.signal;if(!vals.length)return'—';return '<div class="l5-wrap betsy">'+vals.map((v,i)=>{let hit=sig?(sig==='UNDER'?v<line:sig==='OVER'?v>line:sig==='YES'?v==1:v==0):null,cls=hit===null?'l5-neutral':hit?'l5-hit':'l5-miss';return `<div class="l5-box"><div class="l5-num ${cls}">${v}</div><div class="l5-opp">${safe(opps[i],'')}</div></div>`}).join('')+'</div>'}
  function rank(r){r=Number(r||8);return r<=5?'rank-tough':r<=10?'rank-mid':'rank-easy'}
  function statLine(p){return p.stat==='DD'||p.stat==='TD'?'YES':safe(p.best_line,p.line)}
  function projected(p){return p.stat==='DD'||p.stat==='TD'?Math.round((p.pred||0)*100)+'%':safe(p.pred)}
  function showOver(p){if(p.stat==='DD'||p.stat==='TD') return p.signal==='YES'?`YES ${safe(p.yes_price||p.best_odds||p.odds,'')}`:safe(p.yes_price,'—');let val=safe(p.over_price || (p.signal==='OVER'?p.best_odds:null),'—');return p.signal==='OVER'?`OVER ${val}`:val}
  function showUnder(p){if(p.stat==='DD'||p.stat==='TD') return p.signal==='NO'?`NO ${safe(p.no_price||p.best_odds||p.odds,'')}`:safe(p.no_price,'—');let val=safe(p.under_price || (p.signal==='UNDER'?p.best_odds:null),'—');return p.signal==='UNDER'?`UNDER ${val}`:val}
  function evCell(p){let ev=num(p.ev_pct,null);let sc=safe(p.score,'—');let grade=safe(p.grade||p.score_label,'—');return `<div class="ev-box ${ev!==null&&ev>0?'pos':'neg'}"><span>${ev===null?'—':ev+'%'}</span><small>${grade} · ${sc}</small></div>`}
  function sortRows(rows, sortKey){
    if(sortKey==='EV') rows=rows.sort((a,b)=>num(b.ev_pct)-num(a.ev_pct));
    else if(sortKey==='OVER') rows=rows.filter(p=>p.signal==='OVER'||p.signal==='YES').sort((a,b)=>num(b.ev)-num(a.ev));
    else if(sortKey==='UNDER') rows=rows.filter(p=>p.signal==='UNDER'||p.signal==='NO').sort((a,b)=>num(b.ev)-num(a.ev));
    else if(sortKey==='PROJECTED') rows=rows.sort((a,b)=>num(b.pred)-num(a.pred));
    else if(sortKey==='L5') rows=rows.sort((a,b)=>num(b.last5_hit)-num(a.last5_hit));
    else rows=rows.sort((a,b)=>num(b.score)-num(a.score)||(b.conf==='HIGH')-(a.conf==='HIGH')||(b.conf==='MED')-(a.conf==='MED')||Math.abs(b.edge||0)-Math.abs(a.edge||0));
    return rows;
  }

    let props=(DATA.props||DATA.player_points||DATA.props_board||[]).filter(p=>p.line!==null&&p.line!==undefined&&p.line!==''&&p.market_status!=='NO MARKET'&&p.injury_status!=='OUT'&&p.injury_status!=='DOUBTFUL');

    let stats=['ALL','PTS','REB','AST','3PM','PRA','PA','PR','RA','DD','TD'];let labels={PA:'PTS+AST',PR:'PTS+REB',RA:'REB+AST',DD:'2X2',TD:'3X2'};
    let filters=stats.map(s=>`<button class="filter-btn ${curStat===s?'active':''}" onclick="setPropsStat('${s}')">${labels[s]||s}</button>`).join('');
    let sorts=[['EDGE','Best Score'],['EV','EV %'],['OVER','Over'],['UNDER','Under'],['PROJECTED','Projected'],['L5','Last 5 Hit']];
    let sortbar=sorts.map(([k,l])=>`<button class="filter-btn sort-btn ${curSort===k?'active':''}" onclick="setPropsSort('${k}')">${l}</button>`).join('');
    let rows=props.map(p=>Object.assign({},p,{_game:rowGame(p)})).filter(p=>(curGame==='ALL'||p._game===curGame)&&(curStat==='ALL'||String(p.stat).toUpperCase()===curStat));rows=sortRows(rows,curSort);
    let table=rows.length?`<div class="props-scroll"><div class="props-table props-table-v2"><div class="props-head"><div>Player</div><div>Stat</div><div>Line</div><div>Over / Yes</div><div>Under / No</div><div>Projected</div><div>EV</div><div>Last 5</div><div>L5 Hit</div><div>L10 Hit</div><div>Fair</div></div>${rows.map(p=>`<article class="prop-row ${p.conf||'LOW'}"><div><div class="player-name">${safe(p.player)}</div><div class="player-meta">${safe(p.best_book_title||p.best_book,'Best book —')} · ${safe(p.injury_status,'ACTIVE')} · ${safe(p._game)}</div></div><div><span class="stat-pill ${p.conf==='HIGH'?'high':''}">${safe(p.stat)}</span></div><div class="board-value">${statLine(p)}</div><div class="signal-over">${showOver(p)}</div><div class="signal-under">${showUnder(p)}</div><div class="${p.line?'proj-bright':'proj-dim'}">${projected(p)}</div><div>${evCell(p)}</div><div>${boxes(p)}</div><div class="hit-cell ${p.signal==='OVER'||p.signal==='YES'?'signal-over':p.signal==='UNDER'||p.signal==='NO'?'signal-under':''}"><span class="hit-pct">${p.signal?pct(p.last5_hit):'—'}</span><span class="hit-sig">${p.signal||''}</span></div><div class="hit-cell ${p.signal==='OVER'||p.signal==='YES'?'signal-over':p.signal==='UNDER'||p.signal==='NO'?'signal-under':''}"><span class="hit-pct">${p.signal?pct(p.last10_hit):'—'}</span><span class="hit-sig">${p.signal||''}</span></div><div><span class="fair-odds">${safe(p.fair_odds)}</span><small class="prob">${safe(p.model_prob_pct)}%</small></div></article>`).join('')}</div></div>`:'<div class="empty">No sportsbook props for this selected game/stat filter. Try ALL or another stat.</div>';
    let el=document.getElementById('tab-props');if(el)el.innerHTML=`<div class="section-title">Today's Games</div><div class="props-games">${cards}</div><div class="section-title">Filters</div><div class="filter-bar">${filters}</div><div class="section-title sort-title">Sort Props</div><div class="filter-bar props-sort-bar">${sortbar}</div><div class="section-title">Props Table</div>${table}`;
  }
  window.setPropsGame=function(k){window.propsGame=k;draw()};window.setPropsStat=function(s){window.propsStat=s;draw()};window.setPropsSort=function(s){window.propsSort=s;draw()};window.renderProps=draw;try{renderProps=draw;setPropsGame=window.setPropsGame;setPropsStat=window.setPropsStat}catch(e){}
  const oldSwitch=window.switchTab;window.switchTab=function(name,btn){if(typeof oldSwitch==='function') oldSwitch(name,btn);if(name==='props') setTimeout(draw,0)};setTimeout(function(){const el=document.getElementById('tab-props');if(el&&el.classList&&el.classList.contains('active')) draw()},0);

<script id="health-briefing-ui-v1">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function cls(s){return s==='ok'?'ok':s==='partial'?'warn':s==='warn'?'bad':'idle'}
  function ago(m){return m===null||m===undefined?'—':m<1?'just now':Math.round(m)+'m ago'}
  function healthCard(src){return `<article class="health-card ${cls(src.status)}"><div class="health-dot"></div><div><b>${safe(src.name)}</b><span>${safe(src.note)}</span></div><div class="health-meta"><strong>${safe(src.rows,0)}</strong><small>${ago(src.age_minutes)}</small></div></article>`}
  function briefItem(text){return `<li>${safe(text)}</li>`}
  function betMini(b){return `<article class="brief-bet"><div><b>${safe(b.play||b.player||b.game)}</b><span>${safe(b.game)} · ${safe(b.best_book_title||b.best_book)}</span></div><strong>${safe(b.ev_pct)}%</strong></article>`}
  window.renderHealthBriefing=function(){
    const health=DATA.dashboard_health||{};
    const brief=DATA.daily_briefing||{};
    const srcs=health.sources||[];
    const counts=health.counts||{};
    const top=(brief.top_ev||[]).slice(0,2).map(betMini).join('')||'<div class="note">No top EV plays yet.</div>';
    const block=`<section id="daily-briefing-block" class="brief-wrap"><div class="brief-head"><div><div class="section-title">Daily AI Brief</div><h2>${safe(brief.headline,'Daily AI Brief')}</h2><p>${safe(brief.summary,'Slate summary and model health.')}</p></div><div class="brief-status ${cls(brief.health_status||health.overall_status)}">${safe(brief.health_status||health.overall_status,'ok')}</div></div><div class="brief-grid"><article class="brief-panel"><h3>Morning Report</h3><ul>${(brief.bullets||[]).map(briefItem).join('')||'<li>No briefing generated yet.</li>'}</ul></article><article class="brief-panel"><h3>Top EV Watch</h3>${top}</article><article class="brief-panel"><h3>Slate Counts</h3><div class="count-grid"><div><b>${safe(counts.games,0)}</b><span>Games</span></div><div><b>${safe(counts.props,0)}</b><span>Props</span></div><div><b>${safe(counts.best_bets,0)}</b><span>Best Bets</span></div><div><b>${safe(counts.slips,0)}</b><span>Slips</span></div></div></article></div><div class="section-title">Dashboard Health</div><div class="health-grid">${srcs.map(healthCard).join('')||'<div class="empty">No health data generated yet.</div>'}</div></section>`;
    const el=document.getElementById('tab-games');
    if(el && !document.getElementById('daily-briefing-block')){
      const wrap=document.createElement('div');wrap.innerHTML=block;el.prepend(wrap.firstElementChild);
    }
  };
  function searchRows(q){
    q=String(q||'').trim().toLowerCase();
    if(!q)return [];
    const props=(DATA.props||[]).map(p=>({type:'Prop',title:`${p.player} ${p.stat} ${p.signal||''}`,sub:`${p.game||''} · ${p.best_book_title||p.best_book||''}`,action:`openPlayerDetail('${String(p.player||'').replace(/'/g,"\\'")}','${String(p.stat||'').replace(/'/g,"\\'")}')`}));
    const bets=(DATA.best_bets||[]).map(b=>({type:'Best Bet',title:b.play||b.player||b.game,sub:`${b.game||''} · EV ${b.ev_pct||'—'}%`,action:null}));
    const alerts=(DATA.live_alerts||[]).map(a=>({type:'Alert',title:a.title||a.message||a.type,sub:a.detail||a.game||'',action:null}));
    return props.concat(bets,alerts).filter(x=>(x.title+' '+x.sub+' '+x.type).toLowerCase().includes(q)).slice(0,20);
  }
  window.runUniversalSearch=function(q){
    const box=document.getElementById('universal-search-results'); if(!box)return;
    const results=searchRows(q);
    box.innerHTML=results.length?results.map(r=>`<article class="search-result" ${r.action?`onclick="${r.action}"`:''}><span>${r.type}</span><b>${safe(r.title)}</b><small>${safe(r.sub)}</small></article>`).join(''):'<div class="note">Search players, teams, props, alerts, EV, unders, overs.</div>';
  };
  window.toggleUniversalSearch=function(){const p=document.getElementById('universal-search-panel'); if(p)p.classList.toggle('open')};
  function mountSearch(){
    if(document.getElementById('universal-search-panel'))return;
    const panel=document.createElement('div'); panel.id='universal-search-panel'; panel.innerHTML=`<button class="search-fab" onclick="toggleUniversalSearch()">⌕</button><div class="search-drawer"><div class="search-row"><input placeholder="Search players, teams, high EV, unders..." oninput="runUniversalSearch(this.value)" autofocus><button onclick="toggleUniversalSearch()">×</button></div><div id="universal-search-results" class="search-results"><div class="note">Search players, markets, alerts, and best bets.</div></div></div>`; document.body.appendChild(panel);
  }
  const oldSwitch=window.switchTab;
  window.switchTab=function(name,btn){if(typeof oldSwitch==='function')oldSwitch(name,btn);if(name==='games')setTimeout(window.renderHealthBriefing,0)};
  setTimeout(function(){mountSearch();window.renderHealthBriefing()},600);
})();
</script>


<script id="game-command-ui-v1">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function pct(v){let n=Number(v);return isNaN(n)?'—':n+'%'}
  function cardMetric(k,v,s=''){return `<article class="gcc-metric"><span>${k}</span><b>${safe(v)}</b>${s?`<small>${s}</small>`:''}</article>`}
  function propRow(p){return `<article class="gcc-mini-row" onclick="openPlayerDetail&&openPlayerDetail('${String(p.player||'').replace(/'/g,"\\'")}','${String(p.stat||'').replace(/'/g,"\\'")}')"><div><b>${safe(p.player)} ${safe(p.stat)}</b><span>${safe(p.signal)} · ${safe(p.best_book_title||p.best_book)}</span></div><strong>${safe(p.confidence_v2||p.score)}<small>/100</small></strong></article>`}
  function betRow(b){return `<article class="gcc-mini-row"><div><b>${safe(b.play||b.player)}</b><span>${safe(b.best_book_title||b.best_book)} · EV ${safe(b.ev_pct)}%</span></div><strong>${safe(b.score)}<small>/100</small></strong></article>`}
  function corrRow(c){return `<article class="gcc-corr"><b>${safe(c.a)}</b><span>${safe(c.b)}</span><strong>${safe(c.correlation)}</strong></article>`}
  function openCenter(game){
    const modal=document.createElement('div');modal.className='gcc-modal';
    const props=(game.top_props||[]).map(propRow).join('')||'<div class="empty mini">No ranked props for this game.</div>';
    const bets=(game.top_bets||[]).map(betRow).join('')||'<div class="empty mini">No best bets for this game.</div>';
    const corr=(game.correlations||[]).map(corrRow).join('')||'<div class="empty mini">No same-game correlations yet.</div>';
    const slips=(game.related_slips||[]).map(s=>`<article class="gcc-slip"><b>${safe(s.label)}</b><span>${safe(s.legs)} legs · ${safe(s.ev_pct)}% EV · ${safe(s.combined_american)}</span></article>`).join('')||'<div class="empty mini">No optimized slips for this game yet.</div>';
    modal.innerHTML=`<div class="gcc-back" onclick="this.closest('.gcc-modal').remove()"></div><section class="gcc-panel"><button class="gcc-close" onclick="this.closest('.gcc-modal').remove()">×</button><header class="gcc-head"><div><div class="gcc-kicker">Game Command Center</div><h2>${safe(game.game)}</h2><p>${safe(game.matchup_note)}</p></div><div class="gcc-score"><span>Command</span><b>${safe(game.command_score)}</b></div></header><section class="gcc-grid">${cardMetric('Home Win',pct(game.win_probability_home),game.home)}${cardMetric('Away Win',pct(game.win_probability_away),game.away)}${cardMetric('Projected',`${safe(game.projected_score?.away)} - ${safe(game.projected_score?.home)}`)}${cardMetric('Pace',game.pace,game.pace_label)}${cardMetric('Total',game.vegas_total)}${cardMetric('Home Spread',game.home_spread)}${cardMetric('Props',game.market_summary?.props)}${cardMetric('Avg EV',safe(game.market_summary?.avg_ev)+'%')}</section><section class="gcc-sections"><article class="gcc-card"><h3>Top Props</h3>${props}</article><article class="gcc-card"><h3>Best Bets</h3>${bets}</article><article class="gcc-card"><h3>Same-Game Correlations</h3>${corr}</article><article class="gcc-card"><h3>Optimized Slips</h3>${slips}</article></section></section>`;
    document.body.appendChild(modal);
  }
  window.openGameCommandCenter=function(gameKey){const g=(DATA.game_command_center||[]).find(x=>x.game===gameKey); if(g)openCenter(g)};
  function render(){
    const games=DATA.game_command_center||[]; if(!games.length)return;
    const block=`<section id="game-command-block"><div class="section-title">Game Command Center</div><div class="gcc-list">${games.map(g=>`<article class="gcc-game" onclick="openGameCommandCenter('${String(g.game).replace(/'/g,"\\'")}')"><div><b>${safe(g.game)}</b><span>${safe(g.pace_label)} pace · ${safe(g.market_summary?.props)} props · ${safe(g.market_summary?.best_bets)} best bets</span></div><div class="gcc-game-score"><strong>${safe(g.command_score)}</strong><small>command</small></div></article>`).join('')}</div></section>`;
    const el=document.getElementById('tab-games'); if(el && !document.getElementById('game-command-block')){const w=document.createElement('div');w.innerHTML=block;el.appendChild(w.firstElementChild)}
  }
  const oldSwitch=window.switchTab;window.switchTab=function(name,btn){if(typeof oldSwitch==='function')oldSwitch(name,btn);if(name==='games')setTimeout(render,0)};
  setTimeout(render,700);
})();
</script>


<script id="market-heatmap-ui-v1">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function cls(g){return String(g||'').toLowerCase()}
  function tile(x,type){return `<article class="mh-tile ${cls(x.grade)}"><div class="mh-top"><b>${safe(x.name)}</b><span>${safe(x.grade)}</span></div><div class="mh-score">${safe(x.opportunity_score)}</div><div class="mh-bars"><span style="width:${Math.min(100,Number(x.opportunity_score)||0)}%"></span></div><div class="mh-meta"><span>${safe(x.count,0)} props</span><span>${safe(x.avg_ev,0)}% EV</span><span>${safe(x.strong_count,0)} strong</span></div></article>`}
  function topRows(items){return (items||[]).slice(0,5).map(p=>`<article class="mh-row" onclick="openPlayerDetail&&openPlayerDetail('${String(p.player||'').replace(/'/g,"\\'")}','${String(p.stat||'').replace(/'/g,"\\'")}')"><div><b>${safe(p.player)} ${safe(p.stat)}</b><span>${safe(p.game)} · ${safe(p.best_book_title||p.best_book)}</span></div><strong>${safe(p.ev_pct)}%</strong></article>`).join('')||'<div class="empty mini">No top props yet.</div>'}
  function render(){
    const h=DATA.market_heatmap||{}; if(!h.summary)return;
    const markets=(h.ranked_markets||[]).slice(0,10);
    const books=(h.ranked_books||[]).slice(0,6);
    const games=(h.ranked_games||[]).slice(0,6);
    const best=markets[0]||{};
    const html=`<section id="market-heatmap-block"><div class="section-title">Market Heat Map</div><div class="mh-hero"><div><h2>Best Market: ${safe(h.summary.best_market)}</h2><p>Quick view of where today's strongest edges are clustering.</p></div><div class="mh-hero-score"><span>Opportunity</span><b>${safe(best.opportunity_score)}</b></div></div><div class="mh-grid">${markets.map(tile).join('')}</div><div class="mh-split"><article class="mh-panel"><h3>Best Sportsbooks</h3>${books.map(x=>tile(x,'book')).join('')}</article><article class="mh-panel"><h3>Best Games</h3>${games.map(x=>tile(x,'game')).join('')}</article><article class="mh-panel wide"><h3>Top Props From Best Market</h3>${topRows(best.top)}</article></div></section>`;
    const el=document.getElementById('tab-games'); if(el && !document.getElementById('market-heatmap-block')){const w=document.createElement('div');w.innerHTML=html;el.appendChild(w.firstElementChild)}
  }
  const oldSwitch=window.switchTab;window.switchTab=function(name,btn){if(typeof oldSwitch==='function')oldSwitch(name,btn);if(name==='games')setTimeout(render,0)};
  setTimeout(render,800);
})();
</script>


<script id="ups-ui-v1">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function gradeCls(g){return String(g||'').replace('+','plus').toLowerCase()}
  function playRow(p){return `<article class="ups-row" onclick="openPlayerDetail&&openPlayerDetail('${String(p.player||'').replace(/'/g,"\\'")}','${String(p.stat||'').replace(/'/g,"\\'")}')"><div><b>${safe(p.player)} ${safe(p.stat)} ${safe(p.signal)}</b><span>${safe(p.game)} · ${safe(p.best_book_title||p.best_book)} · ${safe(p.readiness?.label||p.readiness_score)}</span><div class="ups-badges">${(p.ups_badges||[]).slice(0,4).map(b=>`<em>${b}</em>`).join('')}</div></div><div class="ups-score grade-${gradeCls(p.ups_grade)}"><small>${safe(p.ups_grade)}</small><strong>${safe(p.ups_score)}</strong></div></article>`}
  function factor(f){return `<li class="${f.agrees?'yes':'no'}"><span>${safe(f.name)}</span><b>${f.agrees?'✓':'×'}</b></li>`}
  function openUPS(p){
    const modal=document.createElement('div');modal.className='ups-modal';
    const factors=(p.model_agreement?.factors||[]).map(factor).join('')||'<li>No agreement factors.</li>';
    const reasons=(p.prediction_breakdown||[]).map(r=>`<li>${r}</li>`).join('')||'<li>No explanation generated.</li>';
    modal.innerHTML=`<div class="ups-back" onclick="this.closest('.ups-modal').remove()"></div><section class="ups-panel"><button onclick="this.closest('.ups-modal').remove()">×</button><header><div><div class="ups-kicker">Universal Prediction Score</div><h2>${safe(p.player)} ${safe(p.stat)}</h2><p>${safe(p.game)} · ${safe(p.signal)} · ${safe(p.best_book_title||p.best_book)}</p></div><div class="ups-hero-score grade-${gradeCls(p.ups_grade)}"><span>${safe(p.ups_grade)}</span><b>${safe(p.ups_score)}</b></div></header><div class="ups-metrics"><article><span>EV</span><b>${safe(p.ev_pct)}%</b></article><article><span>Edge</span><b>${safe(p.edge)}</b></article><article><span>Ready</span><b>${safe(p.readiness_score)}</b></article><article><span>Agree</span><b>${safe(p.model_agreement?.label)}</b></article></div><div class="ups-badges big">${(p.ups_badges||[]).map(b=>`<em>${b}</em>`).join('')}</div><div class="ups-split"><article><h3>Model Agreement</h3><ul class="ups-factors">${factors}</ul></article><article><h3>Prediction Breakdown</h3><ul class="ups-reasons">${reasons}</ul></article></div></section>`;
    document.body.appendChild(modal);
  }
  window.openUPSDetail=openUPS;
  function render(){
    const ups=DATA.unified_prediction_score||{}; if(!ups.props_scored)return;
    const top=(ups.top_ups||[]).slice(0,8);
    const block=`<section id="ups-block"><div class="section-title">Universal Prediction Score</div><div class="ups-hero"><div><h2>UPS Decision Layer</h2><p>One 0-100 score combining edge, EV, confidence, readiness, agreement, injury risk, and market value.</p></div><div class="ups-avg"><span>Avg UPS</span><b>${safe(ups.avg_ups)}</b></div></div><div class="ups-grade-grid">${Object.entries(ups.top_grades||{}).map(([k,v])=>`<article class="grade-${gradeCls(k)}"><span>${k}</span><b>${v}</b></article>`).join('')}</div><div class="ups-list">${top.map(playRow).join('')||'<div class="empty">No scored props yet.</div>'}</div></section>`;
    const el=document.getElementById('tab-games'); if(el&&!document.getElementById('ups-block')){const w=document.createElement('div');w.innerHTML=block;el.appendChild(w.firstElementChild);document.querySelectorAll('.ups-row').forEach((row,i)=>row.addEventListener('contextmenu',e=>{e.preventDefault();openUPS(top[i])}))}
  }
  const oldSwitch=window.switchTab;window.switchTab=function(name,btn){if(typeof oldSwitch==='function')oldSwitch(name,btn);if(name==='games')setTimeout(render,0)};
  setTimeout(render,1000);
})();
</script>


<script id="decision-center-ui-v1">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function propCard(p, cls=''){return `<article class="dc-prop ${cls}" onclick="openPlayerDetail&&openPlayerDetail('${String(p.player||'').replace(/'/g,"\\'")}','${String(p.stat||'').replace(/'/g,"\\'")}')"><div><b>${safe(p.player)} ${safe(p.stat)} ${safe(p.signal)}</b><span>${safe(p.game)} · ${safe(p.best_book_title||p.best_book)} · Line ${safe(p.line)}</span></div><strong>${safe(p.ups_score)}<small>${safe(p.ups_grade)}</small></strong></article>`}

    const el=document.getElementById('tab-games'); if(el&&!document.getElementById('decision-center-block')){const w=document.createElement('div');w.innerHTML=block;el.prepend(w.firstElementChild)}
  }
  const oldSwitch=window.switchTab;window.switchTab=function(name,btn){if(typeof oldSwitch==='function')oldSwitch(name,btn);if(name==='games')setTimeout(render,0)};
  setTimeout(render,1100);
})();
</script>


<script id="autonomous-intelligence-ui-v1">

<script id="projection-accuracy-ui-v1">
(function(){
  function safe(v,d='—'){return v===null||v===undefined||v===''||String(v)==='nan'?d:v}
  function row(a){return `<article class="pa-row"><div><b>${safe(a.player)} ${safe(a.stat)}</b><span>${safe(a.game)} · Proj ${safe(a.projection)} · Actual ${safe(a.actual)} · Error ${safe(a.error)}</span><em>${(a.miss_reasons||[]).slice(0,2).join(' · ')}</em></div><strong class="grade-${safe(a.grade).toLowerCase()}">${safe(a.grade)}</strong></article>`}
  function stat(k,v){return `<article class="pa-stat"><b>${safe(k)}</b><span>${safe(v.count,0)} props</span><strong>${safe(v.mae)} MAE</strong><small>${safe(v.hit_rate)}% hit</small></article>`}
  function render(){

<script id="model-tracking-override">
(function(){
  const tabs=document.querySelectorAll('.tab');
  tabs.forEach(t=>{ if(t.textContent.trim()==='Stats') t.textContent='Model Tracking'; });

  window.rowGameKey=function(p){
    const norm=v=>String(v||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
    const raw=[p.game,p.opp,p.team,p.home_team,p.away_team].map(x=>String(x||'')).join(' ').toUpperCase();
    const compact=norm(raw);
    for(const g of (DATA.games||[])){
      const key=g.away.name+' @ '+g.home.name;
      const awayName=norm(g.away.name), homeName=norm(g.home.name), awayAbbr=norm(g.away.abbr), homeAbbr=norm(g.home.abbr);
      const hasAway=compact.includes(awayName)||compact.includes(awayAbbr);
      const hasHome=compact.includes(homeName)||compact.includes(homeAbbr);
      if(hasAway && hasHome) return key;
    }
    return p.game||p.opp||'UNKNOWN';
  };

  window.renderProps=function(){
    const safe=(v,d='—')=>v===null||v===undefined||v===''||String(v)==='nan'?d:v;
    const pct=x=>typeof x==='number'?Math.round(x*100)+'%':'—';
    const arr=v=>{if(Array.isArray(v))return v;if(!v)return[];try{let p=JSON.parse(v);return Array.isArray(p)?p:[]}catch(e){return[]}};
    const rankClass=r=>{r=Number(r||8);return r<=5?'rank-tough':r<=10?'rank-mid':'rank-easy'};
    const statClass=p=>p.conf==='HIGH'?'stat-pill high':'stat-pill';
    const hitLabel=(v,sig)=>sig?`${pct(v)} ${sig}`:'—';
    const l5Boxes=p=>{let vals=arr(p.last5_vals).slice(0,5),opps=arr(p.last5_opps).slice(0,5),line=Number(p.line),sig=p.signal;if(!vals.length)return'—';return`<div class="l5-wrap">${vals.map((v,i)=>{let cls='l5-neutral';if(sig){let hit=sig==='UNDER'?v<line:v>line;cls=hit?'l5-hit':'l5-miss'}return`<div class="l5-box"><div class="l5-num ${cls}">${v}</div><div class="l5-opp">${safe(opps[i],'')}</div></div>`}).join('')}</div>`};
    const gameKey=(a,h)=>a+' @ '+h;
    const props=(DATA.props||DATA.player_points||DATA.props_board||[]).filter(p=>p.line!==null&&p.line!==undefined&&p.line!==''&&p.market_status!=='NO MARKET'&&p.injury_status!=='OUT'&&p.injury_status!=='DOUBTFUL');
    const games=DATA.games||[];
    let gameCards=`<article class="props-game all ${propsGame==='ALL'?'active':''}" onclick="setPropsGame('ALL')"><div class="game-time">ALL</div><div class="team-line">All Players</div></article>`+games.map(g=>{let k=gameKey(g.away.name,g.home.name);return`<article class="props-game ${propsGame===k?'active':''}" onclick="setPropsGame('${k.replace(/'/g,"\\'")}')"><div class="game-time">${fmtTime(g.tip)}</div><div class="team-line">${g.away.abbr} @ ${g.home.abbr}</div><div class="board-sub">${g.away.name} @ ${g.home.name}</div></article>`}).join('');
    let stats=['ALL','PTS','REB','AST','3PM','PRA'];
    let filtered=props.map(p=>Object.assign({},p,{_game:window.rowGameKey(p)})).filter(p=>(propsGame==='ALL'||p._game===propsGame)&&(propsStat==='ALL'||String(p.stat).toUpperCase()===propsStat));
    filtered.sort((a,b)=>(b.conf==='HIGH')-(a.conf==='HIGH')||(b.conf==='MED')-(a.conf==='MED')||Math.abs(b.edge||0)-Math.abs(a.edge||0));
    let table=filtered.length?`<div class="props-scroll"><div class="props-table"><div class="props-head"><div>Player</div><div>Stat</div><div>Line</div><div>Over</div><div>Under</div><div>Projected</div><div>Last 5</div><div>L5 Hit</div><div>L10 Hit</div><div>H2H L5</div><div>Opp Rank</div></div>${filtered.map(p=>`<article class="prop-row ${p.conf||'LOW'}"><div><div class="player-name">${safe(p.player)}</div><div class="player-meta">${safe(p.best_book_title||p.best_book,'Best book —')} · ${safe(p.injury_status,'ACTIVE')} · ${safe(p.opp)}</div></div><div><span class="${statClass(p)}">${safe(p.stat)}</span></div><div class="board-value">${safe(p.best_line,p.line)} @ ${safe(p.best_odds,p.odds)}</div><div class="signal-over">${p.signal==='OVER'?'OVER':'—'}</div><div class="signal-under">${p.signal==='UNDER'?'UNDER':'—'}</div><div class="${p.line?'proj-bright':'proj-dim'}">${safe(p.pred)}</div><div>${l5Boxes(p)}</div><div>${hitLabel(p.last5_hit,p.signal)}</div><div>${hitLabel(p.last10_hit,p.signal)}</div><div>${arr(p.h2h_last5).length?arr(p.h2h_last5).join(', '):'—'}</div><div class="${rankClass(p.opp_rank)}">${safe(p.opp_rank)}</div></article>`).join('')}</div></div>`:`<div class="empty">No props for this selected game/stat filter. Try ALL or another stat.</div>`;
    document.getElementById('tab-props').innerHTML=`<div class="section-title">Today's Games</div><div class="props-games">${gameCards}</div><div class="section-title">Filters</div><div class="filter-bar">${stats.map(s=>`<button class="filter-btn ${propsStat===s?'active':''}" onclick="setPropsStat('${s}')">${s}</button>`).join('')}</div><div class="section-title">Props Table</div>${table}`;
  };

  window.renderBets=function(){
    const safe=(v,d='—')=>v===null||v===undefined||v===''?d:v;
    const bets=(DATA.best_bets||[]);
    const rows=bets.length?bets.map((b,i)=>`<article class="board-row" style="grid-template-columns:42px 85px 1fr 150px 110px"><div class="board-value">${String(i+1).padStart(2,'0')}</div><div><span class="tag">${safe(b.type)}</span></div><div><div class="board-main">${safe(b.play)}</div><div class="board-sub">${safe(b.game)} · Grade ${safe(b.grade)} · EV ${safe(b.ev_pct)}%</div></div><div><div class="board-label">Best Book</div><div class="board-value">${safe(b.best_book_title||b.best_book)}</div><div class="board-sub">${safe(b.available_books,0)} books</div></div><div><span class="edge-badge">${safe(b.best_line,b.market_line)} @ ${safe(b.best_odds,b.odds)}</span><div class="board-sub">Kelly ${safe(b.units,0)}u</div></div></article>`).join(''):'<div class="empty">No actionable MED/HIGH plays yet.</div>';
    const shop=(DATA.line_shopping||[]).slice(0,12).map(s=>`<article class="board-row" style="grid-template-columns:90px 1fr 120px 100px"><div><span class="tag">${safe(s.market_type)}</span></div><div><div class="board-main">${safe(s.player)||safe(s.side)} ${safe(s.stat,'')}</div><div class="board-sub">${safe(s.game)}</div></div><div><div class="board-label">Best</div><div class="board-value">${safe(s.book_title||s.book_key)}</div></div><div><div class="board-label">Line</div><div class="board-value">${safe(s.line)} @ ${safe(s.odds)}</div></div></article>`).join('')||'<div class="note">Line shopping appears after The Odds API returns per-book lines.</div>';
    document.getElementById('tab-bets').innerHTML=`<div class="section-title">Best Bets + Best Sportsbook</div><div class="board">${rows}</div><div class="section-title">Line Shopping Snapshot</div><div class="board">${shop}</div>`;
  };

  window.renderStats=function(){
    const t=DATA.tracking||DATA.model_tracking||{};
    const byType=t.by_type||{}, byConf=t.by_conf||{};
    const fmtPct=v=>typeof v==='number'?Math.round(v*1000)/10+'%':'—';
    const safe=(v,d='—')=>v===null||v===undefined||v===''?d:v;
    const statCard=(title,rows)=>`<article class="stat-card"><div class="stat-title">${title}</div>${rows.map(r=>`<div class="stat-line"><span>${r[0]}</span><span>${safe(r[1])}</span></div>`).join('')}</article>`;
    const typeRows=Object.keys(byType).length?Object.entries(byType).map(([k,v])=>`<article class="board-row"><div><div class="board-main">${k}</div><div class="board-sub">${v.bets||0} tracked bets</div></div><div><div class="board-label">Record</div><div class="board-value">${safe(v.record)}</div></div><div><div class="board-label">Win %</div><div class="board-value">${fmtPct(v.win_pct)}</div></div><div></div><div></div></article>`).join(''):'<div class="empty">No graded bets yet. Tracking starts once games finish.</div>';
    const confRows=Object.keys(byConf).length?Object.entries(byConf).map(([k,v])=>`<article class="board-row"><div><div class="board-main">${k}</div><div class="board-sub">Confidence bucket</div></div><div><div class="board-label">Record</div><div class="board-value">${safe(v.record)}</div></div><div><div class="board-label">Win %</div><div class="board-value">${fmtPct(v.win_pct)}</div></div><div></div><div></div></article>`).join(''):'<div class="note">Confidence tracking appears after bets are graded.</div>';
    const recent=(t.recent_10||[]).slice(-10).map(b=>`<article class="board-row"><div><div class="board-main">${safe(b.play)}</div><div class="board-sub">${safe(b.date)} · ${safe(b.game)}</div></div><div><div class="board-label">Type</div><div class="board-value">${safe(b.type)}</div></div><div><div class="board-label">Result</div><div class="board-value ${b.result==='WIN'?'good':b.result==='LOSS'?'bad':'warn'}">${safe(b.result)}</div></div><div><div class="board-label">Units</div><div class="board-value">${safe(b.profit_units)}</div></div><div></div></article>`).join('')||'<div class="empty">No recent graded bets yet.</div>';
    document.getElementById('tab-stats').innerHTML=`<div class="section-title">Model Tracking</div><section class="stats-grid">${statCard('Overall',[['Record',t.overall||'0-0-0'],['Win %',fmtPct(t.win_pct)],['ROI',fmtPct(t.roi)],['Units',safe(t.profit_units,0)],['Avg CLV',safe(t.clv_avg,0)]])}${statCard('Automation',[['Odds',safe((DATA.data_health||{}).odds)],['Props',safe((DATA.data_health||{}).props)],['Line Shop',safe((DATA.data_health||{}).line_shopping)],['Games',safe((DATA.data_health||{}).games,0)],['Best Bets',(DATA.best_bets||[]).length]])}${statCard('EV Engine',[['A/B Bets',(DATA.best_bets||[]).filter(b=>['A','B'].includes(b.grade)).length],['Top EV',(DATA.best_bets||[])[0]?.ev_pct?((DATA.best_bets||[])[0].ev_pct+'%'):'—'],['Top Grade',(DATA.best_bets||[])[0]?.grade||'—'],['Kelly Units',(DATA.best_bets||[])[0]?.units||'—']])}${statCard('Model Counts',[['Spreads',(DATA.data_health||{}).spreads_found||0],['Totals',(DATA.data_health||{}).totals_found||0],['Props',(DATA.data_health||{}).props_found||0],['Line Rows',(DATA.data_health||{}).line_shopping_rows||0],['High Bets',(DATA.data_health||{}).high_bets||0]])}</section><div class="section-title">Performance by Market</div><div class="board">${typeRows}</div><div class="section-title">Confidence Breakdown</div><div class="board">${confRows}</div><div class="section-title">Recent Graded Bets</div><div class="board">${recent}</div>`;
  };
})();
</script>
