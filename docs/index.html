<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#07080f">
<title>WNBA Betting Model</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{background:#07080f;color:#e2e8f0;font-family:'Courier New',monospace;min-height:100vh}.header{background:#0a0b15;border-bottom:1px solid #ffffff0d;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}.title-sm{font-size:9px;color:#60a5fa;letter-spacing:2.5px;font-weight:800;margin-bottom:3px}.title-lg{font-size:18px;font-weight:900}.muted{color:#64748b}.live-pill{display:inline-flex;gap:6px;align-items:center;background:#00e5a012;color:#00e5a0;border:1px solid #00e5a030;border-radius:20px;padding:4px 12px;font-size:10px;font-weight:900}.dot{width:5px;height:5px;border-radius:50%;background:#00e5a0;animation:blink 2s infinite}.ribbon,.nav{background:#0a0b15;border-bottom:1px solid #ffffff0d;padding:8px 18px;display:flex;gap:18px;overflow-x:auto}.ribbon-label{font-size:9px;font-weight:900;letter-spacing:1.5px;margin-right:7px}.ribbon-val{font-size:11px;color:#94a3b8}.nav{padding:0 18px}.nav-btn{padding:12px 14px;font-size:10px;letter-spacing:1.2px;font-weight:900;background:none;border:0;color:#475569;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}.nav-btn.active{color:#60a5fa;border-bottom-color:#60a5fa}.content{padding:16px 18px;max-width:980px;margin:auto}.health-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}.card,.health-card,.game-card,.stat-card,.best-bet,.note-box,.no-games{background:#0d0f1a;border:1px solid #ffffff0d;border-radius:10px}.health-card{padding:11px 12px}.health-label,.section-title,.stat-label,.model-lbl{font-size:9px;color:#475569;letter-spacing:1.5px;font-weight:900;text-transform:uppercase}.health-value{font-size:15px;font-weight:900;margin:5px 0}.small{font-size:10px}.games-grid{display:grid;grid-template-columns:230px 1fr;gap:16px}.game-card{padding:12px 14px;cursor:pointer;margin-bottom:8px}.game-card.active{background:#1e2235;border-color:#60a5fa55}.game-tip{font-size:10px;color:#475569;margin-bottom:3px}.game-teams{font-size:14px;font-weight:900}.tag,.pill,.bet-edge{border-radius:5px;padding:3px 8px;font-size:10px;font-weight:900;display:inline-block}.detail-matchup{font-size:20px;font-weight:900;margin:8px 0 6px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.stat-card{padding:14px}.stat-main{font-size:17px;font-weight:900;margin:8px 0 4px}.stat-sub{font-size:11px;color:#64748b;line-height:1.55}.section-title{margin:16px 0 10px}.best-bet{padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:32px 70px 1fr 108px;gap:12px;align-items:center}.bet-num{font-size:22px;font-weight:900;color:#1a1f30}.bet-play{font-size:14px;font-weight:900;margin-bottom:3px}.bet-game{font-size:11px;color:#64748b}.model-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.model-card{background:#0d0f1a;border:1px solid #ffffff0d;border-radius:10px;padding:14px}.model-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid #ffffff0d}.model-key{font-size:10px;color:#64748b}.model-val{font-size:11px;font-weight:700;text-align:right}.note-box{padding:13px 16px;margin-top:12px;font-size:11px;color:#64748b;line-height:1.75}.no-games{padding:38px;text-align:center;color:#64748b;font-size:13px}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}@media(max-width:760px){.content{padding:14px}.health-grid{grid-template-columns:1fr 1fr}.games-grid,.detail-grid,.model-grid{grid-template-columns:1fr}.best-bet{grid-template-columns:28px 58px 1fr}.best-bet>div:last-child{grid-column:3;text-align:left!important}.detail-matchup{font-size:18px}}
</style>
</head>
<body>
<div class="header"><div><div class="title-sm">WNBA BETTING MODEL</div><div class="title-lg">Daily Report</div></div><div style="text-align:right"><div class="small muted" id="report-date"></div><div class="live-pill"><span class="dot"></span><span id="header-count">0 GAMES</span></div></div></div>
<div class="ribbon"><div><span class="ribbon-label" style="color:#60a5fa">SPREAD</span><span class="ribbon-val" id="spread-stats"></span></div><div><span class="ribbon-label" style="color:#c084fc">TOTALS</span><span class="ribbon-val" id="totals-stats"></span></div><div><span class="ribbon-label" style="color:#fb923c">PROPS</span><span class="ribbon-val" id="props-stats"></span></div></div>
<div class="nav"><button class="nav-btn active" onclick="switchTab('games',this)">GAMES</button><button class="nav-btn" onclick="switchTab('bets',this)">BEST BETS</button><button class="nav-btn" onclick="switchTab('stats',this)">STATS</button></div>
<div class="content"><div id="health"></div><div id="tab-games"></div><div id="tab-bets" style="display:none"></div><div id="tab-stats" style="display:none"></div></div>
<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const DATA = {"date":"","generated":null,"games":[],"best_bets":[],"model_stats":{},"data_health":{"odds":"missing","spreads_found":0,"totals_found":0,"games":0,"actionable_bets":0,"high_bets":0},"record":{"overall":"0-0","win_pct":0,"total_bets":0,"by_type":{},"by_conf":{},"recent_10":[]}};

const CC={HIGH:'#00e5a0',MED:'#f5c518',LOW:'#555577'},TC={SPREAD:'#60a5fa',TOTAL:'#c084fc',PROP:'#fb923c'};let activeGame=0;function safe(v,d='—'){return v===null||v===undefined||v===''?d:v}function pct(x){return typeof x==='number'?(x*100).toFixed(0)+'%':'—'}function money(n){return typeof n==='number'?(n>0?'+'+n:n):'—'}function colorConf(c){return CC[c]||CC.LOW}function colorType(t){return TC[t]||TC.SPREAD}function stars(n){let c=n===3?CC.HIGH:n===2?CC.MED:CC.LOW;return[1,2,3].map(i=>'<span style="color:'+(i<=n?c:'#222')+'">★</span>').join('')}function pill(label,color){return'<span class="pill" style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44">'+label+'</span>'}function fmtTime(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}catch(e){return iso}}
window.onload=function(){let g=DATA.games||[],b=DATA.best_bets||[],m=DATA.model_stats||{};document.getElementById('report-date').textContent=DATA.date||'';document.getElementById('header-count').textContent=g.length+' GAMES · '+b.filter(x=>x.stars===3).length+' HIGH';if(m.spread)document.getElementById('spread-stats').textContent=pct(m.spread.dir_acc)+' dir · '+pct(m.spread.strong_ats)+' strong';if(m.totals)document.getElementById('totals-stats').textContent=pct(m.totals.ou_acc)+' O/U · '+pct(m.totals.strong_ou)+' strong';if(m.props)document.getElementById('props-stats').textContent=pct(m.props.hit_rate)+' hit · '+pct(m.props.strong_hr)+' strong';renderHealth();renderGames();renderBets();renderStats()}
function switchTab(tab,btn){['games','bets','stats'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
function renderHealth(){let h=DATA.data_health||{},r=DATA.record||{},ok=h.odds==='loaded',oc=ok?CC.HIGH:'#f87171';document.getElementById('health').innerHTML='<div class="health-grid"><div class="health-card" style="border-color:'+oc+'33"><div class="health-label">ODDS</div><div class="health-value" style="color:'+oc+'">'+(ok?'LOADED':'MISSING')+'</div><div class="small muted">'+safe(h.spreads_found,0)+' spreads · '+safe(h.totals_found,0)+' totals</div></div><div class="health-card"><div class="health-label">ACTIONABLE</div><div class="health-value">'+safe(h.actionable_bets,(DATA.best_bets||[]).length)+'</div><div class="small muted">MED/HIGH only</div></div><div class="health-card"><div class="health-label">RECORD</div><div class="health-value">'+safe(r.overall,'0-0')+'</div><div class="small muted">'+pct(r.win_pct)+' · '+safe(r.total_bets,0)+' bets</div></div><div class="health-card"><div class="health-label">UPDATED</div><div class="health-value">'+fmtTime(h.last_updated_utc||DATA.generated)+'</div><div class="small muted">GitHub Actions</div></div></div>'}
function renderGames(){let games=DATA.games||[];if(!games.length){document.getElementById('tab-games').innerHTML='<div class="no-games">No games today.</div>';return}let side='';games.forEach((g,i)=>{let t=g.totals||{},s=g.spread||{},best=(t.stars||1)>=(s.stars||1)?t:s,c=colorConf(best.conf),tag=t.line?(safe(t.play,'TOTAL')+' '+t.line):(s.play||s.model_line||'WAIT');side+='<div class="game-card '+(i===activeGame?'active':'')+'" onclick="selectGame('+i+')"><div class="game-tip">'+fmtTime(g.tip)+'</div><div style="display:flex;justify-content:space-between;gap:10px"><div class="game-teams">'+g.away.abbr+' <span style="color:#333">@</span> '+g.home.abbr+'</div><div style="text-align:right"><span class="tag" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'33">'+tag+'</span><br>'+stars(best.stars||1)+'</div></div>'+((g.flags||[]).map(f=>'<span class="tag" style="background:#f8717122;color:#f87171;border:1px solid #f8717133;margin-right:4px;margin-top:6px">'+f+'</span>').join(''))+'</div>'});document.getElementById('tab-games').innerHTML='<div class="games-grid"><div>'+side+'</div><div id="game-detail">'+gameDetail(games[activeGame])+'</div></div>'}
function selectGame(i){activeGame=i;document.getElementById('game-detail').innerHTML=gameDetail((DATA.games||[])[i]);document.querySelectorAll('.game-card').forEach((el,j)=>el.classList.toggle('active',j===i))}
function gameDetail(g){if(!g)return'';let s=g.spread||{},t=g.totals||{},m=g.market||{},sc=colorConf(s.conf),tc=colorConf(t.conf);return'<div><div class="small muted">'+fmtTime(g.tip)+' · Books: '+safe(m.books,0)+'</div><div class="detail-matchup">'+g.away.name+' <span style="color:#1e2235">@</span> '+g.home.name+'</div><div class="small muted">'+g.away.abbr+' net '+safe(g.away.net_rtg,0)+' · '+g.home.abbr+' net '+safe(g.home.net_rtg,0)+'</div><div class="detail-grid"><div class="stat-card" style="border-color:'+sc+'2a"><div style="display:flex;justify-content:space-between"><div class="stat-label">SPREAD</div>'+pill(s.conf||'LOW',sc)+'</div><div class="stat-main">'+safe(s.play||s.model_line)+'</div><div class="stat-sub">Market: '+safe(s.posted_line,'No line')+'<br>Model: '+safe(s.model_line)+'<br>'+(s.edge_abs!==null&&s.edge_abs!==undefined?'Edge: '+money(s.edge_abs)+' pts':'Waiting for posted line')+'</div></div><div class="stat-card" style="border-color:'+tc+'2a"><div style="display:flex;justify-content:space-between"><div class="stat-label">TOTAL</div>'+pill(t.conf||'LOW',tc)+'</div><div class="stat-main">'+(t.line?safe(t.play)+' '+t.line:'Model: '+safe(t.pred))+'</div><div class="stat-sub">Market: '+safe(t.line,'No line')+'<br>Model: '+safe(t.pred)+'<br>'+(t.edge!==null&&t.edge!==undefined?'Edge: '+money(t.edge)+' pts':'Waiting for posted line')+'</div></div></div></div>'}
function betCard(b,i,dim){let c=colorConf(b.conf),e=typeof b.edge==='number'?b.edge:null;return'<div class="best-bet" style="border-color:'+c+'22;opacity:'+(dim?0.72:1)+'"><div class="bet-num">'+String(i+1).padStart(2,'0')+'</div><div>'+pill(b.type,colorType(b.type))+'</div><div><div class="bet-play">'+safe(b.play)+'</div><div class="bet-game">'+safe(b.game)+'</div></div><div style="text-align:right"><div class="bet-edge" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'44">'+(e!==null?money(e)+' pts':'WAIT')+'</div><div>'+stars(b.stars||1)+'</div></div></div>'}
function renderBets(){let bets=DATA.best_bets||[],action=bets.filter(b=>(b.stars||1)>=2),watch=[];(DATA.games||[]).forEach(g=>{let matchup=g.away.name+' @ '+g.home.name,s=g.spread||{},t=g.totals||{};if((s.stars||1)<2)watch.push({type:'SPREAD',game:matchup,play:s.play||s.model_line||'Spread watch',edge:s.edge_abs,conf:s.conf||'LOW',stars:s.stars||1});if((t.stars||1)<2)watch.push({type:'TOTAL',game:matchup,play:t.line?(safe(t.play)+' '+t.line):('Model total '+safe(t.pred)),edge:t.edge,conf:t.conf||'LOW',stars:t.stars||1})});let html='<div class="section-title">Actionable Bets — MED/HIGH only</div>';html+=action.length?action.map((b,i)=>betCard(b,i,false)).join(''):'<div class="no-games">No actionable plays. Do not force bets.</div>';html+='<div class="section-title">Watchlist — LOW confidence / incomplete lines</div>';html+=watch.length?watch.slice(0,10).map((b,i)=>betCard(b,i,true)).join(''):'<div class="no-games">No watchlist items.</div>';html+='<div class="note-box"><b style="color:#f5c518">Rule:</b> 3★ strongest · 2★ actionable · 1★ pass/watch. Track CLV before trusting win rate.</div>';document.getElementById('tab-bets').innerHTML=html}
function renderStats(){let m=DATA.model_stats||{},r=DATA.record||{};let cards=[['SPREAD','#60a5fa',[['Algorithm',m.spread&&m.spread.algo],['CV MAE',m.spread&&m.spread.cv_mae+' pts'],['Directional',pct(m.spread&&m.spread.dir_acc)],['Strong ATS',pct(m.spread&&m.spread.strong_ats)]]],['TOTALS','#c084fc',[['Algorithm',m.totals&&m.totals.algo],['CV MAE',m.totals&&m.totals.cv_mae+' pts'],['O/U Acc',pct(m.totals&&m.totals.ou_acc)],['Strong O/U',pct(m.totals&&m.totals.strong_ou)]]],['PROPS','#fb923c',[['Algorithm',m.props&&m.props.algo],['CV MAE',m.props&&m.props.cv_mae+' pts'],['Hit Rate',pct(m.props&&m.props.hit_rate)],['Strong HR',pct(m.props&&m.props.strong_hr)]]],['RESULTS','#00e5a0',[['Overall',r.overall||'0-0'],['Win %',pct(r.win_pct)],['Total Bets',r.total_bets||0],['MED',(r.by_conf||{}).MED],['HIGH',(r.by_conf||{}).HIGH]]]];document.getElementById('tab-stats').innerHTML='<div class="model-grid">'+cards.map(c=>'<div class="model-card" style="border-color:'+c[1]+'22"><div class="model-lbl" style="color:'+c[1]+'">'+c[0]+'</div>'+c[2].map(row=>'<div class="model-row"><span class="model-key">'+row[0]+'</span><span class="model-val">'+safe(row[1])+'</span></div>').join('')+'</div>').join('')+'</div>'}
</script>
</body>
</html>
