function sortRows(rows){if(!propSort.key)return rows;return [...rows].sort((a,b)=>{let x=sortValue(a,propSort.key),y=sortValue(b,propSort.key);return (typeof x==='string'?x.localeCompare(y):x-y)*propSort.dir})}
function sortLabel(key,label){let mark=propSort.key===key?(propSort.dir>0?' ▲':' ▼'):'';return `<button class="${propSort.key===key?'sortActive':''}" onclick="setPropSort('${key}')">${label}${mark}</button>`}

function propRow(r){let team=teamFor(r),side=S(r.signal||r.side,'OVER'),line=Number(S(r.line||r.consensus_line,0)),hist5=actualHistory(r,5),hist10=actualHistory(r,10),v5=hist5.map(x=>x.value),v10=hist10.map(x=>x.value),h5=historyHit(r,5,line,side),h10=historyHit(r,10,line,side),conf=Number(r.confidence||r.final_score||0),valueClass=conf>=80?'value-high':conf>=65?'value-medium':'value-low',ob=r.best_over_book||r.book||'',ub=r.best_under_book||r.book||'',avg5=v5.length?(v5.reduce((a,b)=>a+b,0)/v5.length).toFixed(1):'-';return `<div class="propRow ${valueClass}"><div class="player"><div class="logo mono">${r.team_logo?`<img src="${E(r.team_logo)}" alt="${E(abbr(team))}">`:E(abbr(team).slice(0,2)||String(r.player||'?').slice(0,2))}</div><div><div class="name">${E(r.player)}</div><div class="team mono">${E(r.team_abbr||abbr(team))}</div></div></div><div class="stat mono">${E(r.stat)}</div><div class="lineVal mono">${E(S(r.line||r.consensus_line))}</div><div class="odds mono">${priceHtml(ob,r.best_over_price||r.over_price)}</div><div class="odds mono">${priceHtml(ub,r.best_under_price||r.under_price)}</div><div class="hist">${hist5.length?`<div class="boxes">${hist5.map(x=>`<div class="box ${isHit(x.value,line,side)?'':'miss'}" title="${E(x.game_date)} vs ${E(x.opponent_abbr)}"><div class="num mono">${E(x.value)}</div><div class="opp mono">${E(x.opponent_abbr)}</div></div>`).join('')}</div><div class="avg mono">L5 ${E(r.stat)} avg ${avg5}</div>`:'<div class="historyMissing mono">No completed game history</div>'}</div><div class="hit ${h5.n&&h5.p<50?'bad':''} mono"><div class="pct">${h5.n?h5.p+'%':'-'}</div><div>${h5.n?E(side):''}</div><div class="rec">${h5.n?h5.h+'/'+h5.n:''}</div></div><div class="hit ${h10.n&&h10.p<50?'bad':''} mono"><div class="pct">${h10.n?h10.p+'%':'-'}</div><div>${h10.n?E(side):''}</div><div class="rec">${h10.n?h10.h+'/'+h10.n:''}</div></div><div class="small mono match">${E(S(conf||'-'))}</div></div>`}
function props(){let gl=gamesList(), stats=[...new Set(propsRaw().map(p=>p.stat).filter(Boolean))].sort(), books=[...new Set(propsRaw().map(p=>p.book||p.best_book||p.best_over_book).filter(Boolean))].sort();return `<div class="section"><h2 class="mono">Player Props V4</h2><div class="small mono">All props display by default. Tap a game to filter that game's props.</div><div class="gameChips"><button class="gameChip ${activeGame===''?'a':''}" onclick="setGame('')">All Games</button>${gl.map(g=>`<button class="gameChip ${activeGame===g?'a':''}" onclick="setGame('${String(g).replace(/'/g,"\\'")}')">${E(g)}</button>`).join('')}</div><div class="tools"><input id="fPlayer" placeholder="Player" oninput="drawProps()"><select id="fStat" onchange="drawProps()"><option value="">All Stats</option>${stats.map(x=>`<option>${E(x)}</option>`).join('')}</select><select id="fSide" onchange="drawProps()"><option value="">All Sides</option><option>OVER</option><option>UNDER</option><option>PASS</option></select><select id="fBook" onchange="drawProps()"><option value="">All Books</option>${books.map(x=>`<option>${E(x)}</option>`).join('')}</select><input id="fSearch" placeholder="Search" oninput="drawProps()"></div><div class="propMeta"><div class="small mono" id="propCount"></div><div class="sortNote mono">Tap a header to sort</div></div><div class="propScroll"><div class="propHead mono"><div>${sortLabel('player','Player')}</div><div>${sortLabel('stat','Stat')}</div><div>${sortLabel('line','Line')}</div><div>${sortLabel('over','Over')}</div><div>${sortLabel('under','Under')}</div><div>L5 Stats</div><div>${sortLabel('l5','L5 Hit')}</div><div>${sortLabel('l10','L10 Hit')}</div><div>${sortLabel('match','Match')}</div></div><div id="propRows"></div></div></div>`}
function gameTeams(g){return String(g||'').split(' @ ').map(x=>x.trim()).filter(Boolean)}
function sameGame(a,b){if(!a||!b)return false;if(a===b)return true;let aa=gameTeams(a),bb=gameTeams(b);return aa.length===2&&bb.length===2&&aa.includes(bb[0])&&aa.includes(bb[1])}
function propMatchesGame(r,g){if(!g)return true;if(sameGame(r.game,g))return true;let teams=gameTeams(g),pt=String(r.player_team||r.team||''),op=String(r.opponent||'');return teams.includes(pt)&&(!op||teams.includes(op))}
function drawProps(){let all=propsRaw(),p=S(q('fPlayer')?.value,'').toLowerCase(),st=S(q('fStat')?.value,''),si=S(q('fSide')?.value,''),b=S(q('fBook')?.value,''),se=S(q('fSearch')?.value,'').toLowerCase();let rows=all.filter(r=>propMatchesGame(r,activeGame)&&(!p||String(r.player||'').toLowerCase().includes(p))&&(!st||r.stat===st)&&(!si||(r.signal||r.side)===si)&&(!b||[r.book,r.best_book,r.best_over_book,r.best_under_book].includes(b))&&(!se||JSON.stringify(r).toLowerCase().includes(se)));rows=sortRows(rows);q('propCount').textContent=`Showing ${rows.length} of ${all.length} unique props${activeGame?' · '+activeGame:''}`;q('propRows').innerHTML=rows.map(propRow).join('')||'<div class="empty mono">No current props are available for this game.</div>'} function setGame(g){activeGame=g;render('props')}
function books(){let m=A(DATA.sportsbook?.markets);return `<div class="section"><h2 class="mono">Sportsbook Line Shopping</h2><table><thead><tr><th>Player</th><th>Game</th><th>Stat</th><th>Line</th><th>Best Over</th><th>Best Under</th><th>Books</th></tr></thead><tbody>${m.map(x=>`<tr><td>${E(x.player)}</td><td>${E(x.game)}</td><td>${E(x.stat)}</td><td>${E(x.consensus_line)}</td><td>${E(x.best_over_book)} ${E(x.best_over_price)}</td><td>${E(x.best_under_book)} ${E(x.best_under_price)}</td><td>${E(A(x.books).join(', '))}</td></tr>`).join('')}</tbody></table></div>`}
function best(){let b=A(DATA.master?.best_bets);return `<div class="grid2">${b.map(x=>`<div class="card"><div class="label mono">${E(S(x.final_action,'BET'))}</div><h2 class="mono">${E(x.player)} ${E(x.stat)} ${E(x.signal)}</h2><div class="small mono">${E(x.game)} · ${E(x.book||x.best_book)}</div><span class="chip mono">Score ${E(S(x.final_score||x.confidence))}</span><span class="chip mono">Line ${E(S(x.line))}</span><span class="chip mono">Proj ${E(S(x.projection||x.pred))}</span></div>`).join('')||'<div class="empty mono">No best bets.</div>'}</div>`}
function portfolio(){let r=DATA.risk||{}, a=A(r.allocation||DATA.portfolio?.recommended_card);return kpis()+`<div class="section"><h2 class="mono">Portfolio</h2>${a.map(x=>`<div class="gameCard"><b>${E(x.player)} ${E(x.stat)} ${E(x.signal)}</b><div class="small mono">${E(x.game)} · stake ${E(S(x.capped_amount||x.capped_stake||x.recommended_stake))}</div></div>`).join('')||'<div class="empty mono">No allocation yet.</div>'}</div>`}
function ai(){return `<div class="grid3"><div class="card"><div class="label mono">Monte Carlo</div><div class="big mono">${S(DATA.monte?.summary?.rows,0)}</div></div><div class="card"><div class="label mono">Projection</div><div class="big mono">${S(DATA.projection?.summary?.rows,0)}</div></div><div class="card"><div class="label mono">Market</div><div class="big mono">${S(DATA.market?.summary?.rows,0)}</div></div></div>`}
function results(){let d=window.WNBA_RESULTS_DATA||{},p=d.phase5||{},perf=p.performance||{},cal=p.calibration||{},bt=d.backtest||{},graded=A(p.recent_graded||p.graded_bets||[]), fmtPct=v=>v===null||v===undefined?'—':(Number(v)*100).toFixed(1)+'%', outcomeClass=o=>o==='WIN'?'term-good':o==='LOSS'?'term-bad':'term-warn';let cards=`<div class="grid"><div class="card"><div class="label mono">Graded Bets</div><div class="big mono">${S(perf.graded,0)}</div></div><div class="card"><div class="label mono">Win Rate</div><div class="big mono">${fmtPct(perf.win_rate)}</div></div><div class="card"><div class="label mono">ROI</div><div class="big mono">${fmtPct(perf.roi)}</div></div><div class="card"><div class="label mono">Units</div><div class="big mono">${S(perf.units_profit,0)}</div></div><div class="card"><div class="label mono">Avg CLV</div><div class="big mono">${S(perf.average_clv,'—')}</div></div><div class="card"><div class="label mono">CLV Samples</div><div class="big mono">${S(perf.clv_samples,0)}</div></div><div class="card"><div class="label mono">Calibration</div><div class="big mono">${E(S(bt.learning_status,p.status||'collecting'))}</div></div><div class="card"><div class="label mono">Backtest Rows</div><div class="big mono">${S(bt.binary_rows,0)}</div></div></div>`;let rows=graded.map(r=>`<div class="gameCard"><div class="row"><div><b class="mono">${E(r.player)} ${E(r.stat)} ${E(r.signal)}</b><div class="small mono">${E(S(r.game))} · ${E(S(r.sportsbook))} ${E(S(r.american_odds))}</div></div><div class="score mono ${outcomeClass(r.outcome)}">${E(S(r.outcome))}</div></div><span class="chip mono">Line ${E(S(r.line))}</span><span class="chip mono">Actual ${E(S(r.actual))}</span><span class="chip mono">CLV ${E(S(r.clv))}</span></div>`).join('');let bins=A(cal.bins).filter(x=>x.n>0).map(x=>`<tr><td>${E(x.bin)}</td><td>${x.n}</td><td>${fmtPct(x.predicted_rate)}</td><td>${fmtPct(x.actual_rate)}</td><td>${x.wins}-${x.losses}</td></tr>`).join('');let stats=A(bt.performance_by_stat).slice(0,15).map(x=>`<tr><td>${E(x.stat)}</td><td>${x.n}</td><td>${fmtPct(x.win_rate)}</td><td>${fmtPct(x.roi)}</td><td>${S(x.units,0)}</td></tr>`).join('');return cards+`<div class="grid2"><div class="section"><h2 class="mono">Graded Bets</h2>${rows||'<div class="empty mono">Waiting for completed wagers.</div>'}</div><div class="section"><h2 class="mono">Calibration</h2><table><thead><tr><th>Confidence</th><th>N</th><th>Expected</th><th>Actual</th><th>Record</th></tr></thead><tbody>${bins}</tbody></table><h2 class="mono" style="margin-top:24px">Performance by Stat</h2><table><thead><tr><th>Stat</th><th>N</th><th>Win%</th><th>ROI</th><th>Units</th></tr></thead><tbody>${stats}</tbody></table></div></div>`}
function health(){let v=DATA.v4||{}, mods=A(v.modules);return kpis()+`<div class="section"><h2 class="mono">V4 Module Health</h2><div class="small mono">${E(v.mission||'')}</div><table><thead><tr><th>ID</th><th>Module</th><th>Status</th><th>Runtime</th><th>Rows</th></tr></thead><tbody>${mods.map(m=>`<tr><td>${E(m.id)}</td><td>${E(m.name)}</td><td>${E(m.status)}</td><td>${E(m.runtime_status)}</td><td>${E(S(m.rows,0))}</td></tr>`).join('')}</tbody></table></div>`}
function render(t='games'){q('tabs').innerHTML=tabs.map(x=>`<button class="tab ${x[0]===t?'a':''}" onclick="render('${x[0]}')">${x[1]}</button>`).join('');q('sub').textContent=`Slate ${S(DATA.master?.target_date,'-')} · Updated ${fmt(DATA.generated_at_utc)}`;q('badge').textContent=`V4 · ${S(summary().sportsbook_markets,0)} odds markets`;q('root').innerHTML={games,props,books,best,portfolio,ai,results,health}[t]();if(t==='props')drawProps();scrollTo(0,0)} render();
</script></body></html>
