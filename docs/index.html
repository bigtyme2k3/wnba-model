function renderGames(){const games=DATA.games||[];if(!games.length){document.getElementById('tab-games').innerHTML='<div class="empty">No games today.</div>';return}document.getElementById('tab-games').innerHTML=`<section class="games-layout"><aside class="sidebar">${games.map((g,i)=>gameCard(g,i)).join('')}</aside><section id="game-detail" class="panel">${gameDetail(games[activeGame])}</section></section>`}function gameCard(g,i){const sp=g.spread||{},tot=g.totals||{},best=(tot.stars||1)>=(sp.stars||1)?tot:sp,tag=tot.line?`${safe(tot.play,'TOTAL')} <span class="mono">${tot.line}</span>`:(sp.play||sp.model_line||'Waiting');return `<article class="game-card ${i===activeGame?'active':''}" onclick="selectGame(${i})"><div class="game-meta"><time class="game-time">${fmtTime(g.tip)}</time><div>${stars(best.stars||1)}</div></div><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><div class="team-line">${g.away.abbr}<span class="at">@</span>${g.home.abbr}</div><span class="tag">${tag}</span></div>${(g.flags||[]).map(f=>`<span class="flag">${f}</span>`).join('')}</article>`}function selectGame(i){activeGame=i;document.getElementById('game-detail').innerHTML=gameDetail((DATA.games||[])[i]);document.querySelectorAll('.game-card').forEach((el,j)=>el.classList.toggle('active',j===i))}
function gameDetail(g){if(!g)return'';const sp=g.spread||{},tot=g.totals||{},m=g.market||{};return `<div class="panel-top"><div><div class="eyebrow"><time>${fmtTime(g.tip)}</time></div><div class="matchup">${g.away.name} <span style="color:var(--muted-2);font-weight:500">@</span> ${g.home.name}</div><div class="team-context"><span class="context-pill"><span class="mono">${g.away.abbr}</span> net <span class="mono">${safe(g.away.net_rtg,0)}</span></span><span class="context-pill"><span class="mono">${g.home.abbr}</span> net <span class="mono">${safe(g.home.net_rtg,0)}</span></span></div></div><div class="market-pill">Books <span class="mono">${safe(m.books,0)}</span></div></div><div class="prediction-grid">${predictionCard('Spread',sp.conf,sp.play||sp.model_line,sp.posted_line,sp.model_line,sp.edge_abs)}${predictionCard('Total',tot.conf,tot.line?`${safe(tot.play)} <span class="num mono">${tot.line}</span>`:`Model <span class="num mono">${safe(tot.pred)}</span>`,tot.line,tot.pred,tot.edge)}</div>`}function predictionCard(label,conf,main,market,model,edge){return `<article class="prediction-card"><div class="card-head"><div class="card-label">${label}</div><span class="confidence ${confClass(conf||'LOW')}">${conf||'LOW'}</span></div><div class="prediction-main">${safe(main)}</div><div class="data-row"><span>Market</span><span>${safe(market,'No line')}</span></div><div class="data-row"><span>Model</span><span>${safe(model)}</span></div><div class="data-row"><span>Edge</span><span class="${edgeClass(edge)}">${edge!==null&&edge!==undefined?money(edge)+' pts':'Waiting'}</span></div></article>`}
function spreadBoard(){return DATA.spread_board||((DATA.games||[]).map(g=>({game:g.away.name+' @ '+g.home.name,tip:g.tip,play:(g.spread||{}).play||(g.spread||{}).model_line,market_line:(g.spread||{}).posted_line,model_line:(g.spread||{}).model_line,edge:(g.spread||{}).edge_abs,conf:(g.spread||{}).conf||'LOW',stars:(g.spread||{}).stars||1,status:((g.spread||{}).stars||1)>=2?'BET':'WATCH',books:(g.market||{}).books||0})))}function renderSpreads(){const rows=spreadBoard();document.getElementById('tab-spreads').innerHTML=`<div class="section-title">Spread Board</div><div class="board">${rows.length?rows.map(r=>`<article class="board-row"><div><div class="board-main">${safe(r.play)}</div><div class="board-sub">${safe(r.game)} · ${fmtTime(r.tip)}</div></div><div><div class="board-label">Market</div><div class="board-value">${safe(r.market_line,'No line')}</div></div><div><div class="board-label">Model</div><div class="board-value">${safe(r.model_line)}</div></div><div><div class="board-label">Edge</div><div class="board-value ${edgeClass(r.edge)}">${r.edge!==null&&r.edge!==undefined?money(r.edge):'WAIT'}</div></div><div><div class="board-label">Status</div><div>${stars(r.stars||1)}</div></div></article>`).join(''):'<div class="empty">No spread markets yet.</div>'}</div>`}
function renderProps(){const rows=DATA.props_board||[];document.getElementById('tab-props').innerHTML=`<div class="section-title">Player Props Market Board</div><div class="board">${rows.length?rows.map(p=>`<article class="board-row"><div><div class="board-main">${safe(p.player)}</div><div class="board-sub">${safe(p.team)} vs ${safe(p.opp)} · ${fmtTime(p.game_time)}</div></div><div><div class="board-label">Stat</div><div class="board-value">${safe(p.stat)}</div></div><div><div class="board-label">Line</div><div class="board-value">${safe(p.line)}</div></div><div><div class="board-label">Type</div><div class="board-value">${safe(p.odds_type)}</div></div><div><div class="board-label">Source</div><div class="board-value">${safe(p.source)}</div></div></article>`).join(''):'<div class="empty">No props loaded yet. Next pipeline run will populate PrizePicks markets.</div>'}</div><div class="note">Props board starts as a market board. Model edges appear when posted PrizePicks lines match players in the props model.</div>`}
function betCard(b,i,watch=false){const edge=typeof b.edge==='number'?b.edge:null;return `<article class="board-row ${watch?'watch':''}" style="grid-template-columns:42px 90px 1fr 120px"><div class="bet-rank mono">${String(i+1).padStart(2,'0')}</div><div><span class="type-pill">${b.type}</span></div><div><div class="board-main">${safe(b.play)}</div><div class="board-sub">${safe(b.game)}</div></div><div><span class="edge-badge">${edge!==null?money(edge)+' pts':'WAIT'}</span><div class="stars">${stars(b.stars||1)}</div></div></article>`}function renderBets(){const bets=DATA.best_bets||[],action=bets.filter(b=>(b.stars||1)>=2),watch=[];(DATA.games||[]).forEach(g=>{const matchup=g.away.name+' @ '+g.home.name,sp=g.spread||{},tot=g.totals||{};if((sp.stars||1)<2)watch.push({type:'SPREAD',game:matchup,play:sp.play||sp.model_line||'Spread watch',edge:sp.edge_abs,conf:sp.conf||'LOW',stars:sp.stars||1});if((tot.stars||1)<2)watch.push({type:'TOTAL',game:matchup,play:tot.line?`${safe(tot.play)} ${tot.line}`:`Model total ${safe(tot.pred)}`,edge:tot.edge,conf:tot.conf||'LOW',stars:tot.stars||1})});document.getElementById('tab-bets').innerHTML=`<div class="section-title">Actionable Bets</div><div class="board">${action.length?action.map((b,i)=>betCard(b,i,false)).join(''):'<div class="empty">No actionable MED/HIGH plays yet.</div>'}</div><div class="section-title">Watchlist</div><div class="board">${watch.length?watch.slice(0,10).map((b,i)=>betCard(b,i,true)).join(''):'<div class="empty">No watchlist items.</div>'}</div><div class="note">3★ strongest · 2★ actionable · 1★ pass/watch. Use CLV and graded results before trusting raw win rate.</div>`}
function renderStats(){const m=DATA.model_stats||{},r=DATA.record||{};const cards=[['Spread',m.spread,[['Algorithm',m.spread&&m.spread.algo],['CV MAE',m.spread&&m.spread.cv_mae+' pts'],['Directional',pct(m.spread&&m.spread.dir_acc)],['Strong ATS',pct(m.spread&&m.spread.strong_ats)]]],['Totals',m.totals,[['Algorithm',m.totals&&m.totals.algo],['CV MAE',m.totals&&m.totals.cv_mae+' pts'],['O/U Acc',pct(m.totals&&m.totals.ou_acc)],['Strong O/U',pct(m.totals&&m.totals.strong_ou)]]],['Props',m.props,[['Algorithm',m.props&&m.props.algo],['CV MAE',m.props&&m.props.cv_mae+' pts'],['Hit Rate',pct(m.props&&m.props.hit_rate)],['Strong HR',pct(m.props&&m.props.strong_hr)]]],['Results',r,[['Overall',r.overall||'0-0'],['Win %',pct(r.win_pct)],['Total Bets',r.total_bets||0],['MED',(r.by_conf||{}).MED],['HIGH',(r.by_conf||{}).HIGH]]]];document.getElementById('tab-stats').innerHTML='<section class="stats-grid">'+cards.map(c=>`<article class="stat-model"><div class="model-title">${c[0]}</div>${c[2].map(row=>`<div class="model-row"><span class="model-key">${row[0]}</span><span class="model-val">${safe(row[1])}</span></div>`).join('')}</article>`).join('')+'</section>'}
</script>
</body>
</html>
