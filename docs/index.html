<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#07080f">
<title>WNBA Betting Model</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07080f;color:#e2e8f0;font-family:'Courier New',monospace;min-height:100vh}
.header{background:#0a0b15;border-bottom:1px solid #ffffff0d;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:5}
.title-sm{font-size:9px;color:#60a5fa;letter-spacing:2.5px;font-weight:700;margin-bottom:3px;text-transform:uppercase}.title-lg{font-size:18px;font-weight:800;letter-spacing:-0.5px}.muted{color:#64748b}.live-pill{display:inline-flex;align-items:center;gap:6px;background:#00e5a012;color:#00e5a0;border:1px solid #00e5a030;border-radius:20px;padding:4px 12px;font-size:10px;font-weight:800}.dot{width:5px;height:5px;border-radius:50%;background:#00e5a0;animation:blink 2s infinite;display:inline-block}.ribbon{background:#0a0b15;border-bottom:1px solid #ffffff0d;padding:8px 18px;display:flex;gap:20px;overflow-x:auto}.ribbon-item{white-space:nowrap}.ribbon-label{font-size:9px;font-weight:800;letter-spacing:1.5px;margin-right:8px}.ribbon-val{font-size:11px;color:#94a3b8}.nav{border-bottom:1px solid #ffffff0d;padding:0 18px;display:flex;overflow-x:auto}.nav-btn{padding:12px 14px;font-size:10px;letter-spacing:1.2px;font-weight:800;background:none;border:none;cursor:pointer;color:#475569;border-bottom:2px solid transparent;transition:all .12s;font-family:inherit;white-space:nowrap}.nav-btn.active{color:#60a5fa;border-bottom-color:#60a5fa}.content{padding:16px 18px;max-width:980px;margin:0 auto}.health-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}.health-card{background:#0d0f1a;border:1px solid #ffffff0d;border-radius:10px;padding:11px 12px}.health-label{font-size:9px;color:#475569;letter-spacing:1.5px;font-weight:800;margin-bottom:6px}.health-value{font-size:14px;font-weight:900}.games-grid{display:grid;grid-template-columns:230px 1fr;gap:16px}.game-card{border:1px solid #ffffff0d;border-radius:10px;padding:12px 14px;cursor:pointer;margin-bottom:8px;transition:all .15s;background:#090b14}.game-card.active{background:#1e2235;border-color:#60a5fa55}.game-card-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:5px}.game-tip{font-size:10px;color:#475569;margin-bottom:3px}.game-teams{font-size:14px;font-weight:800}.tot-pill,.side-pill{border-radius:5px;padding:3px 8px;font-size:11px;font-weight:900;display:inline-block;margin-bottom:4px}.detail-header{margin-bottom:16px}.detail-matchup{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.stat-card{background:#0d0f1a;border-radius:10px;padding:14px}.stat-label{font-size:9px;letter-spacing:1.5px;font-weight:800;color:#475569;margin-bottom:8px}.stat-main{font-size:17px;font-weight:900;margin-bottom:4px}.stat-sub{font-size:11px;color:#64748b;line-height:1.5}.pill{border-radius:4px;padding:2px 8px;font-size:10px;font-weight:900}.best-bet{background:#0d0f1a;border-radius:10px;padding:14px 16px;margin-bottom:8px;display:grid;grid-template-columns:32px 72px 1fr 112px;gap:12px;align-items:center}.bet-num{font-size:22px;font-weight:900;color:#1a1f30}.bet-play{font-size:14px;font-weight:900;margin-bottom:3px}.bet-game{font-size:11px;color:#64748b}.bet-edge{border-radius:5px;padding:3px 10px;font-size:13px;font-weight:900;display:inline-block;margin-bottom:4px}.section-title{font-size:9px;color:#475569;letter-spacing:1.5px;font-weight:900;margin:16px 0 10px;text-transform:uppercase}.note-box{margin-top:14px;padding:13px 16px;background:#0d0f1a;border:1px solid #ffffff0d;border-radius:9px;font-size:11px;color:#64748b;line-height:1.8}.model-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.model-card{background:#0d0f1a;border-radius:10px;padding:14px}.model-lbl{font-size:9px;letter-spacing:1.8px;font-weight:900;margin-bottom:10px}.model-row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid #ffffff0d}.model-key{font-size:10px;color:#64748b}.model-val{font-size:11px;font-weight:700;text-align:right}.no-games{color:#64748b;padding:40px;text-align:center;font-size:13px;background:#0d0f1a;border:1px solid #ffffff0d;border-radius:10px}.small{font-size:10px}.warn{color:#f5c518}.good{color:#00e5a0}.bad{color:#f87171}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}.fade{animation:fadeIn .2s ease}@media(max-width:720px){.header{padding:12px 14px}.content{padding:14px}.health-grid{grid-template-columns:1fr 1fr}.games-grid{grid-template-columns:1fr}.detail-grid,.model-grid{grid-template-columns:1fr}.best-bet{grid-template-columns:28px 58px 1fr;gap:9px}.best-bet>div:last-child{grid-column:3;text-align:left!important}.detail-matchup{font-size:18px}}
</style>
</head>
<body>
<div class="header"><div><div class="title-sm">WNBA BETTING MODEL</div><div class="title-lg">Daily Report</div></div><div style="text-align:right"><div style="font-size:11px;color:#475569;margin-bottom:5px" id="report-date"></div><div class="live-pill"><span class="dot"></span><span id="header-count">0 GAMES</span></div></div></div>
<div class="ribbon"><div class="ribbon-item"><span class="ribbon-label" style="color:#60a5fa">SPREAD</span><span class="ribbon-val" id="spread-stats"></span></div><div class="ribbon-item"><span class="ribbon-label" style="color:#c084fc">TOTALS</span><span class="ribbon-val" id="totals-stats"></span></div><div class="ribbon-item"><span class="ribbon-label" style="color:#fb923c">PROPS</span><span class="ribbon-val" id="props-stats"></span></div></div>
<div class="nav"><button class="nav-btn active" onclick="switchTab('games',this)">GAMES</button><button class="nav-btn" onclick="switchTab('bets',this)">BEST BETS</button><button class="nav-btn" onclick="switchTab('stats',this)">STATS</button></div>
<div class="content"><div id="health"></div><div id="tab-games"></div><div id="tab-bets" style="display:none"></div><div id="tab-stats" style="display:none"></div></div>
<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const DATA = {"date":"","generated":null,"games":[],"best_bets":[],"model_stats":{},"data_health":{"odds":"missing","spreads_found":0,"totals_found":0,"games":0,"actionable_bets":0,"high_bets":0},"record":{"overall":"0-0","win_pct":0,"total_bets":0,"by_type":{},"by_conf":{},"recent_10":[]}};

// ── Helpers ───────────────────────────────────────────────────────────────────
const CC={HIGH:'#00e5a0',MED:'#f5c518',LOW:'#555577'};const TC={SPREAD:'#60a5fa',TOTAL:'#c084fc',PROP:'#fb923c'};function cc(c){return CC[c]||CC.LOW}function tc(t){return TC[t]||TC.SPREAD}function money(n){return typeof n==='number'?(n>0?'+'+n:n):'—'}function pct(x){return typeof x==='number'?`${(x*100).toFixed(0)}%`:'—'}function safe(v,d='—'){return(v===null||v===undefined||v==='')?d:v}function stars(n){const c=n===3?CC.HIGH:n===2?CC.MED:CC.LOW;return[1,2,3].map(i=>`<span style="color:${i<=n?c:'#222'}">★</span>`).join('')}function pill(label,color){return`<span class="pill" style="background:${color}22;color:${color};border:1px solid ${color}44">${label}</span>`}function fmtTime(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}catch(e){return iso}}function oddsStatus(){const h=DATA.data_health||{};const ok=h.odds==='loaded';return {label:ok?'LOADED':'MISSING',color:ok?CC.HIGH:'#f87171'}}
let activeGame=0;

window.onload=function(){const games=DATA.games||[],best=DATA.best_bets||[],ms=DATA.model_stats||{},date=DATA.date||'';document.getElementById('report-date').textContent=date;const hi=best.filter(b=>b.stars===3).length;document.getElementById('header-count').textContent=`${games.length} GAMES · ${hi} HIGH`;if(ms.spread)document.getElementById('spread-stats').textContent=`${pct(ms.spread.dir_acc)} dir · ${pct(ms.spread.strong_ats)} strong`;if(ms.totals)document.getElementById('totals-stats').textContent=`${pct(ms.totals.ou_acc)} O/U · ${pct(ms.totals.strong_ou)} strong`;if(ms.props)document.getElementById('props-stats').textContent=`${pct(ms.props.hit_rate)} hit · ${pct(ms.props.strong_hr)} strong`;renderHealth();renderGames();renderBets();renderStats()};
function switchTab(tab,btn){['games','bets','stats'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}

function renderHealth(){const h=DATA.data_health||{},r=DATA.record||{},os=oddsStatus();document.getElementById('health').innerHTML=`<div class="health-grid"><div class="health-card" style="border-color:${os.color}33"><div class="health-label">ODDS</div><div class="health-value" style="color:${os.color}">${os.label}</div><div class="small muted">${safe(h.spreads_found,0)} spreads · ${safe(h.totals_found,0)} totals</div></div><div class="health-card"><div class="health-label">ACTIONABLE</div><div class="health-value">${safe(h.actionable_bets,(DATA.best_bets||[]).length)}</div><div class="small muted">MED/HIGH only</div></div><div class="health-card"><div class="health-label">RECORD</div><div class="health-value">${safe(r.overall,'0-0')}</div><div class="small muted">${pct(r.win_pct)} · ${safe(r.total_bets,0)} bets</div></div><div class="health-card"><div class="health-label">UPDATED</div><div class="health-value">${fmtTime(h.last_updated_utc||DATA.generated)}</div><div class="small muted">Auto GitHub Actions</div></div></div>`}

function renderGames(){const games=DATA.games||[];if(!games.length){document.getElementById('tab-games').innerHTML='<div class="no-games">No games today.</div>';return}let sidebar='';games.forEach((g,i)=>{const tot=g.totals||{},sp=g.spread||{},best=tot.stars>=sp.stars?tot:sp,c=cc(best.conf);const tag=tot.line?`${tot.play||'TOTAL'} ${tot.line}`:sp.play||sp.model_line||'WAIT';sidebar+=`<div class="game-card ${i===activeGame?'active':''}" onclick="selectGame(${i})"><div class="game-card-row"><div><div class="game-tip">${fmtTime(g.tip)}</div><div class="game-teams">${g.away.abbr} <span style="color:#333;font-weight:300">@</span> ${g.home.abbr}</div></div><div style="text-align:right"><div class="tot-pill" style="background:${c}18;color:${c};border:1px solid ${c}33">${tag}</div><div>${stars(best.stars||1)}</div></div></div>${(g.flags||[]).map(f=>`<span style="background:#f8717122;color:#f87171;border:1px solid #f8717133;border-radius:3px;padding:1px 6px;font-size:9px;margin-right:4px">${f}</span>`).join('')}</div>`});document.getElementById('tab-games').innerHTML=`<div class="games-grid"><div>${sidebar}</div><div id="game-detail" class="fade">${gameDetail(games[activeGame])}</div></div>`}
function selectGame(i){activeGame=i;const det=document.getElementById('game-detail');if(det){det.innerHTML=gameDetail((DATA.games||[])[i]);det.className='fade'}document.querySelectorAll('.game-card').forEach((el,j)=>el.classList.toggle('active',j===i))}
function gameDetail(g){if(!g)return'';const spread=g.spread||{},totals=g.totals||{},props=g.props||[],market=g.market||{};const sc=cc(spread.conf||'LOW'),tc2=cc(totals.conf||'LOW');let propsHtml='';if(props.length){propsHtml='<div class="section-title">Player Props</div>';props.forEach(p=>{const propCells=['pts','reb','ast','threes','pra'].map(prop=>{const d=(p.props||{})[prop]||{},hs=!!d.signal,clr=d.signal==='OVER'?'#4ade80':d.signal==='UNDER'?'#f87171':'#475569';return`<div style="background:${hs?clr+'12':'#ffffff05'};border:1px solid ${hs?clr+'44':'#ffffff08'};border-radius:6px;padding:7px 5px;text-align:center"><div style="font-size:9px;color:#475569;margin-bottom:3px">${prop.toUpperCase()}</div><div style="font-size:13px;font-weight:800;color:${hs?clr:'#e2e8f0'}">${safe(d.pred)}</div>${d.line?`<div style="font-size:9px;color:#475569">Line ${d.line}</div>`:''}${d.signal?`<div style="font-size:9px;font-weight:900;color:${clr}">${d.signal} ${money(d.edge)}</div>`:''}</div>`}).join('');propsHtml+=`<div style="background:#0d0f1a;border:1px solid #ffffff0d;border-radius:9px;padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div><span style="font-weight:800">${p.player}</span><span style="color:#475569;font-size:11px;margin-left:8px">${p.pos} · ${p.proj_min}min</span></div><span style="font-size:11px;color:#475569">${p.opp}</span></div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px">${propCells}</div></div>`})}return`<div><div class="detail-header"><div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap"><span style="color:#475569;font-size:11px">${fmtTime(g.tip)}</span>${(g.flags||[]).map(f=>`<span style="background:#f8717122;color:#f87171;border:1px solid #f8717133;border-radius:3px;padding:1px 6px;font-size:9px">${f}</span>`).join('')}</div><div class="detail-matchup">${g.away.name} <span style="color:#1e2235;font-weight:200;margin:0 8px">@</span> ${g.home.name}</div><div style="display:flex;gap:14px;margin-top:4px;flex-wrap:wrap">${[g.away,g.home].map(t=>`<span style="font-size:11px;color:#475569">${t.abbr} <span style="color:${t.net_rtg>=0?'#00e5a0':'#f87171'}">${t.net_rtg>=0?'+':''}${t.net_rtg} net</span></span>`).join('')}<span style="font-size:11px;color:#475569">Books: ${safe(market.books,0)}</span></div></div><div class="detail-grid"><div class="stat-card" style="border:1px solid ${sc}2a"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="stat-label">SPREAD</span>${pill(spread.conf||'LOW',sc)}</div><div class="stat-main">${spread.play||spread.model_line||'—'}</div><div class="stat-sub">Market: ${spread.posted_line!==null&&spread.posted_line!==undefined?spread.posted_line:'No line'}<br>Model: ${safe(spread.model_line)}<br>${spread.edge_abs!==null&&spread.edge_abs!==undefined?`Edge: ${money(spread.edge_abs)} pts`:'Waiting for posted line'}</div></div><div class="stat-card" style="border:1px solid ${tc2}2a"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="stat-label">TOTAL</span>${pill(totals.conf||'LOW',tc2)}</div><div class="stat-main">${totals.line?`${totals.play} ${totals.line}`:`Model: ${safe(totals.pred)}`}</div><div class="stat-sub">Market: ${safe(totals.line,'No line')}<br>Model: ${safe(totals.pred)}<br>${totals.edge!==null&&totals.edge!==undefined?`Edge: ${money(totals.edge)} pts`:'Waiting for posted line'}</div></div></div>${propsHtml}</div>`}

function renderBets(){const bets=DATA.best_bets||[];const actionable=bets.filter(b=>(b.stars||1)>=2);const watch=[];(DATA.games||[]).forEach(g=>{const matchup=`${g.away.name} @ ${g.home.name}`;const sp=g.spread||{},tot=g.totals||{};if((sp.stars||1)<2)watch.push({type:'SPREAD',game:matchup,play:sp.play||sp.model_line||'Spread watch',edge:sp.edge_abs,conf:sp.conf||'LOW',stars:sp.stars||1});if((tot.stars||1)<2)watch.push({type:'TOTAL',game:matchup,play:tot.line?`${tot.play} ${tot.line}`:`Model total ${safe(tot.pred)}`,edge:tot.edge,conf:tot.conf||'LOW',stars:tot.stars||1})});let html='<div class="section-title">Actionable Bets — MED/HIGH only</div>';if(!actionable.length)html+='<div class="no-games">No actionable MED/HIGH plays yet. Do not force bets.</div>';else actionable.forEach((b,i)=>html+=betCard(b,i));html+='<div class="section-title">Watchlist — LOW confidence / incomplete lines</div>';if(!watch.length)html+='<div class="no-games">No watchlist items.</div>';else watch.slice(0,10).forEach((b,i)=>html+=betCard(b,i,true));html+=`<div class="note-box"><span style="color:#f5c518;font-weight:900">Rule:</span> 3★ = strongest, 2★ = actionable, 1★ = pass/watch. Track CLV before trusting raw win rate.</div>`;document.getElementById('tab-bets').innerHTML=html}
function betCard(b,i,watch=false){const c=cc(b.conf),e=typeof b.edge==='number'?b.edge:null;return`<div class="best-bet" style="border:1px solid ${c}22;opacity:${watch?.72:1}"><div class="bet-num">${String(i+1).padStart(2,'0')}</div><div>${pill(b.type,tc(b.type))}</div><div><div class="bet-play">${safe(b.play)}</div><div class="bet-game">${safe(b.game)}</div></div><div style="text-align:right"><div class="bet-edge" style="background:${c}18;color:${c};border:1px solid ${c}44">${e!==null?money(e)+' pts':'WAIT'}</div><div>${stars(b.stars||1)}</div></div></div>`}

function renderStats(){const ms=DATA.model_stats||{},r=DATA.record||{};const cards=[{l:'SPREAD',c:'#60a5fa',rows:[['Algorithm',ms.spread?.algo],['CV MAE',ms.spread?`${ms.spread.cv_mae} pts`:null],['Directional',pct(ms.spread?.dir_acc)],['Strong ATS',pct(ms.spread?.strong_ats)]]},{l:'TOTALS',c:'#c084fc',rows:[['Algorithm',ms.totals?.algo],['CV MAE',ms.totals?`${ms.totals.cv_mae} pts`:null],['O/U Acc',pct(ms.totals?.ou_acc)],['Strong O/U',pct(ms.totals?.strong_ou)]]},{l:'PROPS',c:'#fb923c',rows:[['Algorithm',ms.props?.algo],['CV MAE',ms.props?`${ms.props.cv_mae} pts`:null],['Hit Rate',pct(ms.props?.hit_rate)],['Strong HR',pct(ms.props?.strong_hr)]]},{l:'RESULTS',c:'#00e5a0',rows:[['Overall',r.overall||'0-0'],['Win %',pct(r.win_pct)],['Total Bets',r.total_bets||0],['MED Conf',(r.by_conf||{}).MED||'—'],['HIGH Conf',(r.by_conf||{}).HIGH||'—']]}];document.getElementById('tab-stats').innerHTML=`<div class="model-grid">${cards.map(m=>`<div class="model-card" style="border:1px solid ${m.c}22"><div class="model-lbl" style="color:${m.c}">${m.l}</div>${m.rows.map(([k,v])=>`<div class="model-row"><span class="model-key">${k}</span><span class="model-val">${safe(v)}</span></div>`).join('')}</div>`).join('')}</div>${recentResults()}`}
function recentResults(){const r=(DATA.record||{}).recent_10||[];if(!r.length)return'<div class="note-box">No graded results yet. The tracker will populate this after final scores are available.</div>';return`<div class="section-title">Recent Results</div>${r.slice().reverse().map(x=>`<div class="note-box" style="margin-top:8px"><b>${x.result}</b> · ${x.type} · ${x.play}<br><span class="muted">${x.date} · edge ${money(x.edge)}</span></div>`).join('')}`}
</script>
</body>
</html>
