function safe(v,d='—'){return v===null||v===undefined||v===''?d:v}function pct(x){return typeof x==='number'?Math.round(x*100)+'%':'—'}function money(n){return typeof n==='number'?(n>0?'+'+n:n):'—'}function fmtTime(iso){if(!iso)return'—';try{return new Date(iso).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}catch(e){return iso}}function stars(n){let c=n===3?'var(--high)':n===2?'var(--med)':'var(--low)';return'<span style="color:'+c+'">'+[1,2,3].map(i=>i<=n?'★':'☆').join('')+'</span>'}function edgeClass(e){return typeof e==='number'?(e>=0?'edge-pos':'edge-neg'):''}function arr(v){if(Array.isArray(v))return v;if(!v)return[];try{let p=JSON.parse(v);return Array.isArray(p)?p:[]}catch(e){return[]}}
window.onload=init;function init(){let g=DATA.games||[],b=DATA.best_bets||[],m=DATA.model_stats||{};document.getElementById('header-count').textContent=g.length+' games · '+b.filter(x=>x.stars===3).length+' high';if(m.spread)document.getElementById('spread-stats').textContent=pct(m.spread.dir_acc)+' dir · '+pct(m.spread.strong_ats)+' strong';if(m.totals)document.getElementById('totals-stats').textContent=pct(m.totals.ou_acc)+' O/U · '+pct(m.totals.strong_ou)+' strong';if(m.props)document.getElementById('props-stats').textContent=pct(m.props.hit_rate)+' hit · '+pct(m.props.strong_hr)+' strong';renderHealth();renderGames();renderSpreads();renderProps();renderBets();renderStats()}

function renderHealth(){let h=DATA.data_health||{},ok=h.odds==='loaded',pk=(DATA.props||[]).length>0;document.getElementById('health').innerHTML=`<div class="metric"><div class="metric-label">Odds</div><div class="metric-value ${ok?'good':'bad'}">${ok?'Loaded':'Missing'}</div><div class="metric-sub">${safe(h.spreads_found,0)} spreads · ${safe(h.totals_found,0)} totals</div></div><div class="metric"><div class="metric-label">Props</div><div class="metric-value ${pk?'good':'warn'}">${pk?'Loaded':'Queue'}</div><div class="metric-sub">${(DATA.props||[]).length} markets</div></div><div class="metric"><div class="metric-label">Actionable</div><div class="metric-value">${safe(h.actionable_bets,(DATA.best_bets||[]).length)}</div><div class="metric-sub">MED/HIGH only</div></div><div class="metric"><div class="metric-label">Updated</div><div class="metric-value" style="font-size:18px">${fmtTime(h.last_updated_utc||DATA.generated)}</div><div class="metric-sub">GitHub Actions</div></div>`}
function renderGames(){let games=DATA.games||[];if(!games.length){document.getElementById('tab-games').innerHTML='<div class="empty">No games today.</div>';return}document.getElementById('tab-games').innerHTML=`<section class="games-layout"><aside class="sidebar">${games.map((g,i)=>gameCard(g,i)).join('')}</aside><section id="game-detail" class="panel">${gameDetail(games[activeGame])}</section></section>`}function gameCard(g,i){let sp=g.spread||{},tot=g.totals||{},best=(tot.stars||1)>=(sp.stars||1)?tot:sp,tag=tot.line?`${safe(tot.play,'TOTAL')} ${tot.line}`:(sp.play||sp.model_line||'Waiting');return`<article class="game-card ${i===activeGame?'active':''}" onclick="selectGame(${i})"><div class="game-time">${fmtTime(g.tip)}</div><div style="display:flex;justify-content:space-between;gap:10px;margin-top:6px"><div class="team-line">${g.away.abbr} @ ${g.home.abbr}</div><span class="tag">${tag}</span></div><div class="stars">${stars(best.stars||1)}</div></article>`}function selectGame(i){activeGame=i;document.getElementById('game-detail').innerHTML=gameDetail((DATA.games||[])[i]);document.querySelectorAll('.game-card').forEach((el,j)=>el.classList.toggle('active',j===i))}
function gameDetail(g){if(!g)return'';let sp=g.spread||{},tot=g.totals||{},m=g.market||{};return`<div class="game-time">${fmtTime(g.tip)} · Books ${safe(m.books,0)}</div><div class="matchup">${g.away.name} @ ${g.home.name}</div><div class="context"><span class="pill">${g.away.abbr} net ${safe(g.away.net_rtg,0)}</span><span class="pill">${g.home.abbr} net ${safe(g.home.net_rtg,0)}</span></div><div class="pred-grid">${predCard('Spread',sp.conf,sp.play||sp.model_line,sp.posted_line,sp.model_line,sp.edge_abs)}${predCard('Total',tot.conf,tot.line?`${safe(tot.play)} ${tot.line}`:`Model ${safe(tot.pred)}`,tot.line,tot.pred,tot.edge)}</div>`}function predCard(label,conf,main,market,model,edge){return`<article class="pred-card"><div><span class="card-label">${label}</span><span class="conf ${conf||'LOW'}">${conf||'LOW'}</span></div><div class="pred-main">${safe(main)}</div><div class="data-row"><span>Market</span><span>${safe(market,'No line')}</span></div><div class="data-row"><span>Model</span><span>${safe(model)}</span></div><div class="data-row"><span>Edge</span><span class="${edgeClass(edge)}">${edge!==null&&edge!==undefined?money(edge)+' pts':'Waiting'}</span></div></article>`}
function spreadBoard(){return DATA.spread_board||((DATA.games||[]).map(g=>({game:g.away.name+' @ '+g.home.name,tip:g.tip,play:(g.spread||{}).play||(g.spread||{}).model_line,market_line:(g.spread||{}).posted_line,model_line:(g.spread||{}).model_line,edge:(g.spread||{}).edge_abs,conf:(g.spread||{}).conf||'LOW',stars:(g.spread||{}).stars||1,status:((g.spread||{}).stars||1)>=2?'BET':'WATCH'})))}function renderSpreads(){let rows=spreadBoard();document.getElementById('tab-spreads').innerHTML=`<div class="section-title">Spread Board</div><div class="board">${rows.length?rows.map(r=>`<article class="board-row"><div><div class="board-main">${safe(r.play)}</div><div class="board-sub">${safe(r.game)} · ${fmtTime(r.tip)}</div></div><div><div class="board-label">Market</div><div class="board-value">${safe(r.market_line,'No line')}</div></div><div><div class="board-label">Model</div><div class="board-value">${safe(r.model_line)}</div></div><div><div class="board-label">Edge</div><div class="board-value ${edgeClass(r.edge)}">${r.edge!==null&&r.edge!==undefined?money(r.edge):'WAIT'}</div></div><div>${stars(r.stars||1)}</div></article>`).join(''):'<div class="empty">No spread markets yet.</div>'}</div>`}
function gameKeyFromTeams(away,home){return away+' @ '+home}function rowGameKey(p){let team=(p.team||'').toUpperCase(),opp=(p.opp||'').toUpperCase();for(const g of (DATA.games||[])){let a=(g.away.abbr||'').toUpperCase(),h=(g.home.abbr||'').toUpperCase(),an=(g.away.name||'').toUpperCase(),hn=(g.home.name||'').toUpperCase();if((team===a||team===an)&&((opp===h)||opp===hn||opp.includes(hn)||opp.includes(h)))return gameKeyFromTeams(g.away.name,g.home.name);if((team===h||team===hn)&&((opp===a)||opp===an||opp.includes(an)||opp.includes(a)))return gameKeyFromTeams(g.away.name,g.home.name)}return p.game||'UNKNOWN'}
function setPropsGame(k){propsGame=k;renderProps()}function setPropsStat(s){propsStat=s;renderProps()}function rankClass(r){r=Number(r||8);return r<=5?'rank-tough':r<=10?'rank-mid':'rank-easy'}function statClass(p){return p.conf==='HIGH'?'stat-pill high':'stat-pill'}function hitLabel(v,signal){return signal?`${pct(v)} ${signal}`:'—'}function l5Boxes(p){let vals=arr(p.last5_vals).slice(0,5),opps=arr(p.last5_opps).slice(0,5),line=Number(p.line),sig=p.signal;if(!vals.length)return'—';return`<div class="l5-wrap">${vals.map((v,i)=>{let cls='l5-neutral';if(sig){let hit=sig==='UNDER'?v<line:v>line;cls=hit?'l5-hit':'l5-miss'}return`<div class="l5-box"><div class="l5-num ${cls}">${v}</div><div class="l5-opp">${safe(opps[i],'')}</div></div>`}).join('')}</div>`}
function renderProps(){let props=(DATA.props||DATA.player_points||DATA.props_board||[]).filter(p=>p.line!==null&&p.line!==undefined&&p.line!=='');let games=DATA.games||[];let gameCards=`<article class="props-game all ${propsGame==='ALL'?'active':''}" onclick="setPropsGame('ALL')"><div class="game-time">ALL</div><div class="team-line">All Players</div></article>`+games.map(g=>{let k=gameKeyFromTeams(g.away.name,g.home.name);return`<article class="props-game ${propsGame===k?'active':''}" onclick="setPropsGame('${k.replace(/'/g,"\\'")}')"><div class="game-time">${fmtTime(g.tip)}</div><div class="team-line">${g.away.abbr} @ ${g.home.abbr}</div><div class="board-sub">${g.away.name} @ ${g.home.name}</div></article>`}).join('');let stats=['ALL','PTS','REB','AST','3PM','PRA'];let filtered=props.map(p=>Object.assign({},p,{_game:rowGameKey(p)})).filter(p=>(propsGame==='ALL'||p._game===propsGame)&&(propsStat==='ALL'||String(p.stat).toUpperCase()===propsStat));filtered.sort((a,b)=>(b.conf==='HIGH')-(a.conf==='HIGH')||(b.conf==='MED')-(a.conf==='MED')||Math.abs(b.edge||0)-Math.abs(a.edge||0));let table=filtered.length?`<div class="props-scroll"><div class="props-table"><div class="props-head"><div>Player</div><div>Stat</div><div>Line</div><div>Over</div><div>Under</div><div>Projected</div><div>Last 5</div><div>L5 Hit</div><div>L10 Hit</div><div>H2H L5</div><div>Opp Rank</div></div>${filtered.map(p=>`<article class="prop-row ${p.conf||'LOW'}"><div><div class="player-name">${safe(p.player)}</div><div class="player-meta">${safe(p.team)} · ${safe(p.pos)} · vs ${safe(p.opp)}</div></div><div><span class="${statClass(p)}">${safe(p.stat)}</span></div><div class="board-value">${safe(p.line)}</div><div class="signal-over">${p.signal==='OVER'?'OVER':'—'}</div><div class="signal-under">${p.signal==='UNDER'?'UNDER':'—'}</div><div class="${p.line?'proj-bright':'proj-dim'}">${safe(p.pred)}</div><div>${l5Boxes(p)}</div><div>${hitLabel(p.last5_hit,p.signal)}</div><div>${hitLabel(p.last10_hit,p.signal)}</div><div>${arr(p.h2h_last5).length?arr(p.h2h_last5).join(', '):'—'}</div><div class="${rankClass(p.opp_rank)}">${safe(p.opp_rank)}</div></article>`).join('')}</div></div>`:'<div class="empty">No props available — PrizePicks lines post closer to tip off</div>';document.getElementById('tab-props').innerHTML=`<div class="section-title">Today\'s Games</div><div class="props-games">${gameCards}</div><div class="section-title">Filters</div><div class="filter-bar">${stats.map(s=>`<button class="filter-btn ${propsStat===s?'active':''}" onclick="setPropsStat('${s}')">${s}</button>`).join('')}</div><div class="section-title">Props Table</div>${table}`}
function betCard(b,i,dim=false){let edge=typeof b.edge==='number'?b.edge:null;return`<article class="board-row" style="opacity:${dim?0.65:1};grid-template-columns:42px 85px 1fr 110px"><div class="board-value">${String(i+1).padStart(2,'0')}</div><div><span class="tag">${b.type}</span></div><div><div class="board-main">${safe(b.play)}</div><div class="board-sub">${safe(b.game)}</div></div><div><span class="edge-badge">${edge!==null?money(edge)+' pts':'WAIT'}</span><div>${stars(b.stars||1)}</div></div></article>`}function renderBets(){let bets=DATA.best_bets||[],action=bets.filter(b=>(b.stars||1)>=2);document.getElementById('tab-bets').innerHTML=`<div class="section-title">Actionable Bets</div><div class="board">${action.length?action.map((b,i)=>betCard(b,i)).join(''):'<div class="empty">No actionable MED/HIGH plays yet.</div>'}</div><div class="note">3★ strongest · 2★ actionable · 1★ pass/watch.</div>`}
function renderStats(){let m=DATA.model_stats||{},r=DATA.record||{};let cards=[['Spread',m.spread,[['Algorithm',m.spread&&m.spread.algo],['CV MAE',m.spread&&m.spread.cv_mae+' pts'],['Directional',pct(m.spread&&m.spread.dir_acc)],['Strong ATS',pct(m.spread&&m.spread.strong_ats)]]],['Totals',m.totals,[['Algorithm',m.totals&&m.totals.algo],['CV MAE',m.totals&&m.totals.cv_mae+' pts'],['O/U Acc',pct(m.totals&&m.totals.ou_acc)],['Strong O/U',pct(m.totals&&m.totals.strong_ou)]]],['Props',m.props,[['Algorithm',m.props&&m.props.algo],['CV MAE',m.props&&m.props.cv_mae+' pts'],['Hit Rate',pct(m.props&&m.props.hit_rate)],['Strong HR',pct(m.props&&m.props.strong_hr)]]],['Results',r,[['Overall',r.overall||'0-0'],['Win %',pct(r.win_pct)],['Total Bets',r.total_bets||0]]]];document.getElementById('tab-stats').innerHTML='<section class="stats-grid">'+cards.map(c=>`<article class="stat-card"><div class="stat-title">${c[0]}</div>${c[2].map(row=>`<div class="stat-line"><span>${row[0]}</span><span>${safe(row[1])}</span></div>`).join('')}</article>`).join('')+'</section>'}
</script>




<script id="model-tracking-override">
(function(){
  const tabs=document.querySelectorAll('.tab');
  tabs.forEach(t=>{ if(t.textContent.trim()==='Stats') t.textContent='Model Tracking'; });
  window.renderStats=function(){
    const t=DATA.tracking||DATA.model_tracking||{};
    const byType=t.by_type||{}, byConf=t.by_conf||{};
    const fmtPct=v=>typeof v==='number'?Math.round(v*1000)/10+'%':'—';
    const safe=(v,d='—')=>v===null||v===undefined||v===''?d:v;
    const statCard=(title,rows)=>`<article class="stat-card"><div class="stat-title">${title}</div>${rows.map(r=>`<div class="stat-line"><span>${r[0]}</span><span>${safe(r[1])}</span></div>`).join('')}</article>`;
    const typeRows=Object.keys(byType).length?Object.entries(byType).map(([k,v])=>`<article class="board-row"><div><div class="board-main">${k}</div><div class="board-sub">${v.bets||0} tracked bets</div></div><div><div class="board-label">Record</div><div class="board-value">${safe(v.record)}</div></div><div><div class="board-label">Win %</div><div class="board-value">${fmtPct(v.win_pct)}</div></div><div></div><div></div></article>`).join(''):'<div class="empty">No graded bets yet. Tracking starts once games finish.</div>';
    const confRows=Object.keys(byConf).length?Object.entries(byConf).map(([k,v])=>`<article class="board-row"><div><div class="board-main">${k}</div><div class="board-sub">Confidence bucket</div></div><div><div class="board-label">Record</div><div class="board-value">${safe(v.record)}</div></div><div><div class="board-label">Win %</div><div class="board-value">${fmtPct(v.win_pct)}</div></div><div></div><div></div></article>`).join(''):'<div class="note">Confidence tracking appears after bets are graded.</div>';
    const recent=(t.recent_10||[]).slice(-10).map(b=>`<article class="board-row"><div><div class="board-main">${safe(b.play)}</div><div class="board-sub">${safe(b.date)} · ${safe(b.game)}</div></div><div><div class="board-label">Type</div><div class="board-value">${safe(b.type)}</div></div><div><div class="board-label">Result</div><div class="board-value ${b.result==='WIN'?'good':b.result==='LOSS'?'bad':'warn'}">${safe(b.result)}</div></div><div><div class="board-label">Units</div><div class="board-value">${safe(b.profit_units)}</div></div><div></div></article>`).join('')||'<div class="empty">No recent graded bets yet.</div>';
    document.getElementById('tab-stats').innerHTML=`<div class="section-title">Model Tracking</div><section class="stats-grid">${statCard('Overall',[['Record',t.overall||'0-0-0'],['Win %',fmtPct(t.win_pct)],['ROI',fmtPct(t.roi)],['Units',safe(t.profit_units,0)],['Avg CLV',safe(t.clv_avg,0)]])}${statCard('Automation',[['Odds',safe((DATA.data_health||{}).odds)],['Props',safe((DATA.data_health||{}).props)],['Games',safe((DATA.data_health||{}).games,0)],['Best Bets',(DATA.best_bets||[]).length]])}${statCard('EV Engine',[['A/B Bets',(DATA.best_bets||[]).filter(b=>['A','B'].includes(b.grade)).length],['Top EV',(DATA.best_bets||[])[0]?.ev_pct?((DATA.best_bets||[])[0].ev_pct+'%'):'—'],['Top Grade',(DATA.best_bets||[])[0]?.grade||'—'],['Kelly Units',(DATA.best_bets||[])[0]?.units||'—']])}${statCard('Model Counts',[['Spreads',(DATA.data_health||{}).spreads_found||0],['Totals',(DATA.data_health||{}).totals_found||0],['Props',(DATA.data_health||{}).props_found||0],['High Bets',(DATA.data_health||{}).high_bets||0]])}</section><div class="section-title">Performance by Market</div><div class="board">${typeRows}</div><div class="section-title">Confidence Breakdown</div><div class="board">${confRows}</div><div class="section-title">Recent Graded Bets</div><div class="board">${recent}</div>`;
  };
})();
</script>
