name: WNBA Daily Pipeline

on:
  schedule:
    - cron: '0 13 * * *'   # 9 AM ET
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for today'
        required: false
        default: ''

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set target date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            echo "TARGET=${{ github.event.inputs.date }}" >> $GITHUB_ENV
          else
            echo "TARGET=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          fi
          echo "YESTERDAY=$(date -u -d 'yesterday' +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)" >> $GITHUB_ENV
          echo "YEAR=$(date -u +%Y)" >> $GITHUB_ENV

      # ── Step 1: Stats ────────────────────────────────────────────────────
      - name: Collect wehoop data
        run: python collect_wehoop.py --current --out data/raw
        continue-on-error: true

      # ── Step 2: Odds ─────────────────────────────────────────────────────
      - name: Scrape odds (save opening snapshot)
        run: |
          python scrape_odds.py --date ${{ env.TARGET }} --out data/raw
          python line_movement.py --opening --date ${{ env.TARGET }}
        continue-on-error: true

      # ── Step 3: Props ────────────────────────────────────────────────────
      - name: Scrape PrizePicks props
        run: python scrape_props.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      # ── Step 4: Scores ───────────────────────────────────────────────────
      - name: Scrape ESPN scores
        run: python scrape_scores.py --date ${{ env.TARGET }} --out data/raw --boxscores
        continue-on-error: true

      # ── Step 5: Injuries ─────────────────────────────────────────────────
      - name: Fetch injury report
        run: python scrape_injuries.py --date ${{ env.TARGET }} --out data/raw
        continue-on-error: true

      # ── Step 6: Referee assignments ──────────────────────────────────────
      - name: Fetch referee assignments
        run: python scrape_refs.py --out data/raw
        continue-on-error: true

      # ── Step 7: Merge ────────────────────────────────────────────────────
      - name: Merge data
        run: python merge_data.py --year all --raw data/raw --out data/processed

      # ── Step 8: Retrain (Mondays only) ───────────────────────────────────
      - name: Retrain models (Monday only)
        if: ${{ github.event.schedule == '0 13 * * 1' }}
        run: |
          python spread_model.py --mode train --data data/processed/master_all.csv
          python totals_model.py --mode train --data data/processed/master_all.csv
          python props_model.py  --mode train

      # ── Step 9: Predictions ──────────────────────────────────────────────
      - name: Generate predictions
        run: |
          python daily_runner.py \
            --date ${{ env.TARGET }} \
            --out predictions/predictions_${{ env.TARGET }}.json

      # ── Step 10: Track results ───────────────────────────────────────────
      - name: Track yesterday's results
        run: python results_tracker.py --date ${{ env.YESTERDAY }}
        continue-on-error: true

      # ── Step 11: Line movement + CLV ─────────────────────────────────────
      - name: Compute line movement and CLV
        run: python line_movement.py --date ${{ env.YESTERDAY }}
        continue-on-error: true

      # ── Step 12: Build dashboard ─────────────────────────────────────────
      - name: Build dashboard
        run: python build_dashboard.py

      # ── Step 13: Print summary ───────────────────────────────────────────
      - name: Print best bets
        run: |
          python - << 'PYEOF'
          import json, glob
          files = sorted(glob.glob("predictions/predictions_*.json"))
          if not files: print("No predictions found"); exit()
          with open(files[-1]) as f: d = json.load(f)
          print(f"\n{'='*60}\nWNBA Best Bets — {d['date']}")
          rec = d.get('record',{})
          if rec: print(f"Record: {rec.get('overall','0-0')} ({rec.get('win_pct',0):.1%})")
          print('='*60)
          for b in d.get('best_bets',[]):
              e = f"+{b['edge']}" if b.get('edge',0) and b['edge']>0 else str(b.get('edge',''))
              u = b.get('units', 0)
              unit_str = f" [{u:.1f}u]" if u > 0 else ""
              print(f"  #{b['rank']} [{b['type']:<6}] {b['play']:<38} {e:>6}{unit_str}  {'★'*b['stars']}")
          print(f"\n  {len(d.get('games',[]))} games | {sum(1 for b in d.get('best_bets',[]) if b.get('stars',0)==3)} HIGH conf")
          PYEOF

      # ── Step 14: Commit ──────────────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.name  "WNBA Model Bot"
          git config user.email "actions@github.com"
          git add data/ predictions/ docs/ models/
          git diff --cached --quiet || git commit -m "🏀 Daily update — ${{ env.TARGET }}"
          git push
